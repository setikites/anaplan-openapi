  /2/0/models/{modelId}/versions/{versionId}/switchover:
    put:
      summary: Set version switchover date
      parameters: []
      responses:
        '200':
          description: Response 200
          content:
            application/json:
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/objects/switchover
                status:
                  code: 200
                  message: Success
                versionSwitchover:
                  periodText: May 13
                  date: '2013-05-01'
                  calendarType: Calendar Months/Quarters/Years
              schema:
                type: object
                properties:
                  meta:
                    type: object
                  status:
                    type: object
                  versionSwitchover:
                    $ref: '#/components/schemas/Switchover'
      tags:
      - Transactional Write
      description: "## Set version switchover date\n\n`/models/{modelId}/versions/{versionId}/switchover`  \n\nUse this call\
        \ to set the switchover date for a version. The response contains the response code, as well as the date and human-readable\
        \ date period as shown in the UI.\n\n**Notes:**\n\n*   To use this call, you must be a [Workspace Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html).\n\
        *   To apply a switchover date, ensure the `versionID` corresponds to a version in Anaplan that is set to either `forecast`\
        \ or `variance`.\n*   Ensure the switchover date is after the existing version switchover date.\n*   To reset the\
        \ switchover date to Blank, pass an empty string in the request body.\n*   In the future, use of this call may be\
        \ rate limited.\n    \n\n### Request\n\n```\ncurl -X PUT 'https://api.anaplan.com/2/0/models/{modelId}/versions/{versionId}/switchover'\
        \ \\\n-H 'Authorization: AnaplanAuthToken {anaplan_auth_token}' \\\n-H 'Accept: application/json' \\\n-H 'Content-Type:\
        \ application/json' \\\n-d '{\"date\":\"{newSwitchoverDate}\"}'\n```\n\n### Request body\n\n```\n{\n    \"date\" :\
        \ \"{date}\"\n}\n\n```\n\n| **JSON element** | **Details** |\n| --- | --- |\n| `date` | <br><br>*   Required<br>*\
        \   Description: An ISO-formatted (YYYY-MM-DD) date string is used to set the switchover date. An empty string resets\
        \ the switchover date.  <br>    Dates earlier than the current switchover date (for example, `2021-01-01` when the\
        \ current switchover is `2021-06-01`) or dates outside the current model year return a `400 Bad Request` response.<br>*\
        \   Example: `2021-06-01`<br><br> |\n\n### Request headers\n\n| **Header** | **Details** |\n| --- | --- |\n| `Authorization:\
        \ AnaplanAuthToken {anaplan_auth_token}` | <br><br>*   Required<br>*   Description: the Anaplan authentication token<br><br>\
        \ |\n| `Content-Type: application/json` | <br><br>*   Required<br>*   Description: This indicates the request format\
        \ is `application/json`.<br><br> |\n| `Accept: application/json` | <br><br>*   Required<br>*   Description: This indicates\
        \ the preferred response is either `application/json` format. Note that this call only outputs in `application/json`\
        \ format.<br><br> |\n\n### Request parameters\n\n| **Parameter** | **Details** |\n| --- | --- |\n| `{modelId}` | <br><br>*\
        \   Required<br>*   Type: String<br>*   Description: the model ID<br>*   Example: `75A40874E6B64FA3AE074327899685`<br><br>\
        \ |\n| `{versionId}` | <br><br>*   Required<br>*   Type: String<br>*   Description: the version ID. The ID of the\
        \ actual version returns a `400 Bad Request` response<br>*   Example: `107000000002`<br><br> |\n\n### Response header\n\
        \n`Content-Type: application/json`"
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Schema2'
            example:
              date: '2021-06-03'
    parameters:
    - name: modelId
      in: path
      required: true
      schema:
        type: string
        pattern: ^[0-9A-F]{32}$
      example: 4261ECE4389B45E18915B5EB72F7510B
      description: Model identifier (32-character uppercase hex string).
    - name: versionId
      in: path
      required: true
      schema:
        type: string
      example: '{{versionId}}'
  /2/0/models/{modelId}/currentPeriod:
    put:
      summary: Set current period
      parameters:
      - name: date
        in: query
        required: false
        schema:
          type: string
          format: date
          pattern: ^\d{4}-\d{2}-\d{2}$
        example: '2020-05-20'
        description: The date used to set the current period (YYYY-MM-DD). Leave blank (?date=) to reset the current period.
          Accepted as either a query parameter or a request body field, but not both simultaneously. Returns 400 if the format
          is invalid or the date falls outside the model timescale.
      responses:
        '200':
          description: Response 200
          headers:
            Content-Type:
              schema:
                type: string
              example: application/json
          content:
            application/json:
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/objects/currentPeriod
                status:
                  code: 200
                  message: Success
                currentPeriod:
                  periodText: May 20
                  lastDay: '2020-05-31'
                  calendarType: Calendar Months/Quarters/Years
              schema:
                type: object
                properties:
                  meta:
                    type: object
                  status:
                    type: object
                  currentPeriod:
                    $ref: '#/components/schemas/CurrentPeriod'
        '429':
          description: more detail in path description
        '400':
          description: 'Bad request. Occurs when: (1) the date is not in YYYY-MM-DD format — "Invalid ISO date format ''{date}''.
            Date should match format YYYY-MM-DD"; (2) the date falls outside the model timescale — "Specified date ''{date}''
            is out of timescale range {start} - {end}"; (3) date is supplied as both a query parameter and a request body
            field simultaneously.'
      tags:
      - Transactional Write
      description: "## Set current period\n\n`/workspaces/{workspaceId}/models/{modelId}/currentPeriod`  \n\nUse this call\
        \ to change or reset the current period in Anaplan. When this call contains a specified date (for example, 2020-05-20),\
        \ the API determines what period range contains the specified data and sets that range as the current period.  When\
        \ the date value is set to blank in this call, the API resets the current period to blank.\n\n**Warning**: A change\
        \ to your time settings is a potentially destructive action and may lead to data loss.  The new range of time periods\
        \ may not include previous time periods. Any data in the removed time periods is deleted from the model.\n\n**Notes**:\n\
        \n*   To use this call, you must be a [Workspace Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html)\n\
        *   Use of this call may be rate limited. If you call too frequently, you may receive a `429` response\n    \n\n###\
        \ Request\n\n```\ncurl -X PUT https://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/currentPeriod\\\
        \n-H 'Accept: application/json' \\\n-H 'Authorization: AnaplanAuthToken {anaplan_auth_token}' \\\n-H 'Content-Type:\
        \ application/json' \n\n```\n\n### Request headers\n\n| **Header** | **Details** |\n| --- | --- |\n| `Authorization:\
        \ AnaplanAuthToken {anaplan_auth_token}` | <br><br>*   Required<br>*   Description: the Anaplan authentication token<br><br>\
        \ |\n| `Accept: application/json` | <br><br>*   Required<br>*   Description: This indicates the preferred response\
        \ is `application/json` format.<br><br> |\n| `Content-Type: application/json` | <br><br>*   Required<br>*   Description:\
        \ This indicates the call uses a content type of `application/json`.<br><br> |\n\n### Request parameter\n\n| **Parameter**\
        \ | **Details** |\n| --- | --- |\n| `{workspaceId}` | <br><br>*   Required<br>*   Type: String<br>*   Description:\
        \ The workspace ID<br>*   Example: `8a8196b15b7dbae6015b8694411d13fe`<br><br> |\n| `{modelId}` | <br><br>*   Required<br>*\
        \   Type: String<br>*   Description: the ID for the model<br>*   Example: `75A40874E6B64FA3AE074327899685`<br><br>\
        \ |\n\n### Request body\n\n| **Body** | **Details** |\n| --- | --- |\n| `{date}` | <br><br>*   Required<br>*   Type:\
        \ String<br>*   Description: The date to use to set, or reset, the current period. The date format is YYYY-MM-DD.\
        \  <br>    If the `date` parameter is left blank (for example, `/currentperiod?date=`) the current period resets.\
        \  <br>    If the date is not provided in the YYYY-MM-DD format, the call returns a `400 Bad Request` response with\
        \ this message: `Invalid ISO date format '{date}'. Date should match format YYYY-MM-DD`  <br>    If this value falls\
        \ outside of a valid range, the call returns a `400 Bad Request` response with this message: `Specified date '{date}'\
        \ is out of timescale range {start of timescale} - {end of timescale}`.<br>*   Example: 2010-05-20<br><br> |\n\n###\
        \ Example of request body\n\n```\n{\n       \"date\":\"2020-05-20\"\n    }\n\n```"
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Schema2'
