      schema:
        type: string
      example: ''
    delete:
      summary: Delete Read Request
      description: |-
        ## Delete read requests

        Use this call to delete or cancel an initiated read request. This removes all the pages from the file store and stops the ongoing read request.

        **Notes**:

        *   To use this call, you must be a [**Workspace Administrator**](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html).
        *   As a best practice, use this call to clear all pages from completed exports as soon as you download all pages. Doing so will make space available for future exports.
        *   The system will automatically reclaim space for read requests not accessed for over 30 minutes. The same applies to failed read requests.


        ## Request supporting this feature

        ```
        curl -X DELETE 'https://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/views/{viewId}/readRequests/{requestId}' \
        -H 'Authorization: AnaplanAuthToken {anaplan_auth_token}' \
        -H 'Accept: application/json'

        ```

        ## Request headers

        | **Header** | **Details** |
        | --- | --- |
        | `Authorization: AnaplanAuthToken {anaplan_auth_token}` | <br><br>*   Required<br>*   Description: the Anaplan authentication token.<br><br> |
        | `Accept: application/json` | <br><br>*   Optional<br>*   Description: This indicates the preferred response is `application/json` format.<br><br> |

        ## Request parameters

        | **Parameters** | **Details** |
        | --- | --- |
        | `{workspaceId}` | <br><br>*   Required in the first supported request (see Requests supporting this feature)<br>*   Type: `String`<br>*   Description: The workspace ID<br>*   Example: `8a8196b15b7dbae6015b8694411d13fe`<br><br> |
        | `{modelId}` | <br><br>*   Required<br>*   Type: `String`<br>*   Description: The model ID<br>*   Example: `75A40874E6B64FA3AE0743278996850F`<br><br> |
        | `{viewId}` | <br><br>*   Required<br>*   Type: `Number`<br>*   Description: The view ID.<br>*   Example: `101000000001`<br><br> |
        | `{requestId}` | <br><br>*   Required<br>*   Type: `String`<br>*   Description: The request ID<br>*   Example: `0A06B0739F0E47BB92E2326C603D86EC`<br><br> |

        ## Response 200 body

        When the delete request completes, the API returns the following response:

        ```
        {
            "meta": {
                "schema": "https://api.anaplan.com/2/0/objects/viewReadRequest"
            },
            "status": {
                "code": 200,
                "message": "Success"
            },
            "viewReadRequest": {
                "requestId": "0A06B0739F0E47BB92E2326C603D86EC",
                "viewId": 101000000014,
                "requestState": "COMPLETE",
                "url": "https://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/views/{viewId}/readRequests/{requestId}",
                "successful": true
            }
        }



        ```

        If the read request is in progress and you initiate the delete call, the read request will be canceled and the pages will cleared. The API returns the following response:

        ```
        {
            "meta": {
                "schema": "https://api.anaplan.com/2/0/objects/viewReadRequest"
            },
            "status": {
                "code": 200,
                "message": "Success"
            },
            "viewReadRequest": {
                "requestId": "0A06B0739F0E47BB92E2326C603D86EC",
                "viewId": 101000000014,
                "requestState": "CANCELLED",
                "url": "https://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/views/{viewIdƒ}/readRequests/{requestId}",
                "successful": true
            }
        }


        ```
      tags:
      - Transactional Read
      responses:
        '200':
          description: 'TODO: document response'
  /workspaces/{workspaceId}/models/{modelId}/views/{viewId}/readRequests/{requestId}/pages/{pageNo}:
    get:
      summary: Download Pages
      description: |-
        ## Download pages

        Use this call to download the available pages, either when the read request is in progress, or when the request is completed. This request returns a CSV format response of the export list items.

        You can download pages while the export is in progress. You can download up to `availablePages` number of pages returned by the export status API.

        Note that page numbers start with zero. That means if 10 pages are available, you can download from page=0 through page=9

        **Note:**

        *   To use this call, you must be a [**Workspace Administrator**](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html).
        *   As a best practice, use the [**Delete read requests**](https://anaplanbulkapi20.docs.apiary.io/#DeleteReadRequestsVD) call to clear all pages from completed exports as soon as you download all pages. Doing so will make space available for future exports.


        ## Request supporting this feature

        ```
        curl --{location} \
        -X GET 'http://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/views/{viewId}/readRequests/{requestId}/pages/{pageNo}' \
        -H 'Authorization: AnaplanAuthToken {anaplan_auth_token}' \
        -H 'Accept-Encoding: gzip, deflate' \
        -H 'Accept: text/csv'
        ```

        ## Request headers

        | **Header** | **Details** |
        | --- | --- |
        | `Authorization: AnaplanAuthToken {anaplan_auth_token}` | <br><br>*   Required<br>*   Description: the Anaplan authentication token.<br><br> |
        | `Accept-Encoding: gzip` | <br><br>*   Optional<br>*   Description: You can use it to compress the response. This usually improves performance, but then you may have to uncompress it before using it.<br><br> |
        | `Accept: text/csv` | <br><br>*   Required<br>*   Description: This indicates the preferred response is `text/csv` format.<br><br> |

        ## Request parameters

