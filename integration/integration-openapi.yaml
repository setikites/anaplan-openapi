                    $ref: '#/components/schemas/Task'
      tags:
      - Bulk Other
      description: "## Monitor the process tasks\n\n`/workspaces/{workspaceId}/models/{modelId}/processes/{processId}/tasks/{taskId}`\
        \  \n\n### Get the status of a process task\n\nIn the response:\n\n*   `currentStep` is the task associated with the\
        \ specified `taskID`.\n*   `taskState` is the status of the process task.\n*   `progress` is a double that is typically\
        \ 1.0.\n*   `result` is a JSON object that indicates whether a failure dump file was created, the `objectID`, and\
        \ whether the task succeeded.\n*   `failureDumpAvailable` indicates whether this process container or an action within\
        \ it has a failure dump file. **Note:** For a deletion action, `failureDumpAvailable` is always false.\n*   `nestedResults`\
        \ indicates whether the actions carried out in the process were successful. This contains details in the form of a\
        \ JSON array, which also contains some debug information when failures occur. [Get the failure dump file](https://anaplanbulkapi20.docs.apiary.io/ListProcessDefinitions#Check-for-process-failures)\
        \ to view the complete debug information.\n*   `objectID` is the identifier of the process task or a task that it\
        \ includes. For instance, if `nestedResults` has `failureDumpAvailable` true, you need the `objectID` within that\
        \ section to obtain the related 'dump' file.\n*   `taskID` is the ID that you specified in the request.\n    \n\n\
        Here is a list of each possible `taskState`:\n\n| **Status** | **Description** |\n| --- | --- |\n| NOT_STARTED | The\
        \ task is scheduled to run, but has not started yet. |\n| IN_PROGRESS | The task is currently running. |\n| COMPLETE\
        \ | The task has finished running whether successful or not. |\n| CANCELLING | The task is currently being canceled.\
        \ Cancellation is not yet complete. |\n| CANCELLED | The task has been canceled and the changes have been rolled back.\
        \ |\n\n#### Request\n\n```\ncurl -X GET /\nhttps://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/processes/{processId}/tasks/{taskId}\
        \ \\\n-H 'authorization: AnaplanAuthToken {anaplan_auth_token}' \\\n-H \"Content-Type:application/json\"\n```\n\n\
