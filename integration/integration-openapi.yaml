                      - '0'
                      - successUpdateCount
                      - '90'
                      - warningsRowCount
                      - '0'
                      - warningsCreateCount
                      - '0'
                      - warningsUpdateCount
                      - '0'
                      - failedCount
                      - '0'
                      - ignoredCount
                      - '5'
                      - totalRowCount
                      - '95'
