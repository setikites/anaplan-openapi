    delete:
      summary: Delete Read Request
      parameters: []
      responses:
        '200':
          description: 'TODO: document response'
      tags:
      - Transactional Read
      description: "## Delete read requests\n\nUse this call to delete or cancel an initiated read request. This removes all\
        \ the pages from the file store and stops the ongoing read request.\n\n**Notes**:\n\n*   To use this call, you must\
        \ be a [**Workspace Administrator**](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html).\n\
        *   As a best practice, use this call to clear all pages from completed exports as soon as you download all pages.\
        \ Doing so will make space available for future exports.\n*   The system will automatically reclaim space for read\
        \ requests not accessed for over 30 minutes. The same applies to failed read requests.\n    \n\n## Request supporting\
        \ this feature\n\n```\ncurl -X DELETE 'https://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/views/{viewId}/readRequests/{requestId}'\
        \ \\\n-H 'Authorization: AnaplanAuthToken {anaplan_auth_token}' \\\n-H 'Accept: application/json'\n\n```\n\n## Request\
        \ headers\n\n| **Header** | **Details** |\n| --- | --- |\n| `Authorization: AnaplanAuthToken {anaplan_auth_token}`\
        \ | <br><br>*   Required<br>*   Description: the Anaplan authentication token.<br><br> |\n| `Accept: application/json`\
        \ | <br><br>*   Optional<br>*   Description: This indicates the preferred response is `application/json` format.<br><br>\
        \ |\n\n## Request parameters\n\n| **Parameters** | **Details** |\n| --- | --- |\n| `{workspaceId}` | <br><br>*   Required\
        \ in the first supported request (see Requests supporting this feature)<br>*   Type: `String`<br>*   Description:\
        \ The workspace ID<br>*   Example: `8a8196b15b7dbae6015b8694411d13fe`<br><br> |\n| `{modelId}` | <br><br>*   Required<br>*\
        \   Type: `String`<br>*   Description: The model ID<br>*   Example: `75A40874E6B64FA3AE0743278996850F`<br><br> |\n\
        | `{viewId}` | <br><br>*   Required<br>*   Type: `Number`<br>*   Description: The view ID.<br>*   Example: `101000000001`<br><br>\
        \ |\n| `{requestId}` | <br><br>*   Required<br>*   Type: `String`<br>*   Description: The request ID<br>*   Example:\
        \ `0A06B0739F0E47BB92E2326C603D86EC`<br><br> |\n\n## Response 200 body\n\nWhen the delete request completes, the API\
        \ returns the following response:\n\n```\n{\n    \"meta\": {\n        \"schema\": \"https://api.anaplan.com/2/0/objects/viewReadRequest\"\
        \n    },\n    \"status\": {\n        \"code\": 200,\n        \"message\": \"Success\"\n    },\n    \"viewReadRequest\"\
        : {\n        \"requestId\": \"0A06B0739F0E47BB92E2326C603D86EC\",\n        \"viewId\": 101000000014,\n        \"requestState\"\
        : \"COMPLETE\",\n        \"url\": \"https://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/views/{viewId}/readRequests/{requestId}\"\
        ,\n        \"successful\": true\n    }\n}\n\n\n\n```\n\nIf the read request is in progress and you initiate the delete\
        \ call, the read request will be canceled and the pages will cleared. The API returns the following response:\n\n\
        ```\n{\n    \"meta\": {\n        \"schema\": \"https://api.anaplan.com/2/0/objects/viewReadRequest\"\n    },\n   \
        \ \"status\": {\n        \"code\": 200,\n        \"message\": \"Success\"\n    },\n    \"viewReadRequest\": {\n  \
        \      \"requestId\": \"0A06B0739F0E47BB92E2326C603D86EC\",\n        \"viewId\": 101000000014,\n        \"requestState\"\
        : \"CANCELLED\",\n        \"url\": \"https://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/views/{viewIdƒ}/readRequests/{requestId}\"\
        ,\n        \"successful\": true\n    }\n}\n\n\n```"
