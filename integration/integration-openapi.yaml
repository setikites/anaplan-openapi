  /workspaces/{workspaceId}/models/{modelId}/views/{viewId}/readRequests:
    post:
      summary: Initiate long read request
      description: |-
        ## Initiate large read request

        Use this call to initiate a large volume read request of view data. This enables you to read data from views that are larger than a million cell count.

        **Note:**

        *   To use this call, you must be a [Workspace Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html).
        *   As a best practice, use the [Delete read requests](https://anaplanbulkapi20.docs.apiary.io/#DeleteReadRequestsVD) call to clear all pages from completed exports as soon as you download all pages. Doing so will make space available for future exports.


        ### Request supporting this feature

        * * *

        ```
        curl --location --request POST 'https://api.anaplan.com/2/0/workspaces/2c9ba1b673981e510173d99b11722e1e/models/61F974EB186D40C1A66B7D309AD714B8/views/101000000000/readRequests/' \
        --header 'Authorization: AnaplanAuthToken AnaplanToken' \
        --data-raw '{
        "exportType" : "TABULAR_MULTI_COLUMN"
        }'

        ```

        ### Request Body

        * * *

        This API supports exporting data in the following formats:

        | **Type** | **Description** | **More information** |
        | --- | --- | --- |
        | `GRID_ALL_PAGES` | This layout respects the existing sorting and filtering you have imposed on a data grid before you launch the export. | [Export grid](https://help.anaplan.com/Import_and_Export/Export_Layouts/Export_Data_in_Grid_Layout.html) |
        | `TABULAR_SINGLE_ITEMS` | This layout takes all dimensions and puts them in columns, with the final column reserved for data. | [Export tabular single column](https://help.anaplan.com/Import_and_Export/Export_Layouts/Export_Data_in_Tabular_Single_Column_Layout.html) |
        | `TABULAR_MULTI_COLUMN` | This layout enables you to export multiple data columns. If you set up a Boolean line item, you can use it as a filter to control which data is exported. This is especially useful when exporting from large modules. It saves the manual task of marking data cells for export. | [Export Tabular Multiple Column](https://help.anaplan.com/Import_and_Export/Export_Layouts/Export_Data_in_Tabular_Multiple_Column_Layout.html) |

        ```
        {
            "exportType" : "{TABULAR_SINGLE_ITEMS || TABULAR_MULTI_COLUMN || GRID_ALL_PAGES}"
        }

        ```

        ### Request headers

        * * *

        | **Header** | **Details** |
        | --- | --- |
        | `Authorization: AnaplanAuthToken {anaplan_auth_token}` | <br><br>*   Required<br>*   Description: the Anaplan authentication token<br><br> |
        | `Content-Type: application/json` | <br><br>*   Required<br>*   Description: This indicates the request format is `application/json`.<br><br> |
        | `Accept: application/json` | <br><br>*   Optional<br>*   Description: This indicates the preferred response is `application/json` format.<br><br> |

        ### Request parameters

        * * *

        | **Parameters** | **Details** |
        | --- | --- |
        | `{workspaceId}` | <br><br>*   Required in the first supported request (see Requests supporting this feature)<br>*   Type: `String`<br>*   Description: The workspace ID<br>*   Example: `8a8196b15b7dbae6015b8694411d13fe`<br><br> |
        | `{modelId}` | <br><br>*   Required<br>*   Type: `String`<br>*   Description: The model ID<br>*   Example: `75A40874E6B64FA3AE0743278996850F`<br><br> |
        | `{viewId}` | <br><br>*   Required<br>*   Type: `Number`<br>*   Description: The view ID.<br>*   Example: `101000000001`<br><br> |
      tags:
      - Transactional Read
      responses:
        '200':
          description: Response 200
          content:
            application/json:
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/objects/viewReadRequest
                status:
                  code: 200
                  message: Success
                viewReadRequest:
                  requestId: 0A06B0739F0E47BB92E2326C603D86EC
                  requestState: IN_PROGRESS
                  url: https://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/views/{viewId}/readRequests/{requestId}
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  viewReadRequest:
                    $ref: '#/components/schemas/ViewReadRequest'
    parameters:
    - name: workspaceId
      in: path
      description: Workspace identifier (32-character lowercase hex string).
      required: true
      schema:
        type: string
        pattern: ^[0-9a-f]{32}$
      example: 8a868cda7c8b28f5017c9a4b2d8341cd
    - name: modelId
      in: path
      description: Model identifier (32-character uppercase hex string).
      required: true
      schema:
        type: string
        pattern: ^[0-9A-F]{32}$
      example: 4261ECE4389B45E18915B5EB72F7510B
    - name: viewId
