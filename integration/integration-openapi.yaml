        \ `116000000001`<br><br> |\n| `taskId` | <br><br>*   Required<br>*   Type: string<br>*   Description: The task ID<br>*\
        \   Example: `81374848BFED4C52A9927048FA77AA05`<br><br> |\n\n#"
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Schema2'
