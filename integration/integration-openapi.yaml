      description: |-
        ### Get a list of the import tasks

        *   Request


        ```
        curl -X GET \
        https://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/imports/{importId}/tasks \
        -H 'authorization: AnaplanAuthToken {anaplan_auth_token}' \
