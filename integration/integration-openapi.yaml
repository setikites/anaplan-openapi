        \ the model-level call, see [Retrieve all items in a dimension](https://anaplanbulkapi20.docs.apiary.io/#RetrieveItemsDimension).\n\
        *   This call only supports the retrieval of dimension items where the dimension contains a maximum of 1,000,000 items.\
