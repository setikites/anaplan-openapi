      description: "## Start the import\n\n`/workspaces/{workspaceId}/models/{modelId}/imports/{importId}/tasks/`  \n\nYou\
        \ start the import using the POST command. This also receives the task ID value as a JSON object. Once you have started\
        \ the import, you can use GET to receive a list of the import tasks as a JSON array. You can use this to monitor the\
        \ status of the import tasks.\n\n**Note:** If GET does not return any tasks, the import is not running or might have\
        \ completed. Tasks sort in ascending order of creation time, with the newest task at the top of the list. To sort\
        \ in descending order, append `?sort =- creationTime` to the URL.\n\n### Run the import\n\n*   Request\n    \n\n```\n\
        curl -X POST \\\nhttps://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/imports/{importId}/tasks \\\
        \n-H 'authorization: AnaplanAuthToken {anaplan_auth_token}' \\\n-H \"Content-Type:application/json\" \\\n-d \"{\\\"\
        localeName\\\": \\\"en_US\\\"}\"\n```\n\n#### Request headers\n\n| **Header** | **Details** |\n| --- | --- |\n| `Authorization:AnaplanAuthToken\
        \ {anaplan_auth_token}` | <br><br>*   Required<br>*   Description: The Anaplan authentication token<br><br> |\n| `Content-Type:application/json`\
        \ | <br><br>*   Required<br>*   Description: Specifies the content type as `application/json`<br><br> |\n\n#### Request\
        \ Parameters\n\n| **Parameter** | **Description** |\n| --- | --- |\n| `workspaceId` | <br><br>*   Required<br>*  \
        \ Type: string<br>*   Description: The workspace ID<br>*   Example: `8a8b8c8d8e8f8g8i`<br><br> |\n| `modelId` | <br><br>*\
        \   Required<br>*   Type: string<br>*   Description: The model ID<br>*   Example: `75A40874E6B64FA3AE0743278996850F`<br><br>\
        \ |\n| `importId` | <br><br>*   Required<br>*   Type: number<br>*   Description: The model ID<br>*   Example: `112000000007`<br><br>\
        \ |\n\n#### Request Body\n\n| **Body** | **Description** |\n| --- | --- |\n| `{\"localeName\": \"en_US\"}` | <br><br>*\
        \   Required<br>*   Description: Specifies the language to use for task status and error messages. `en_US` is the\
        \ only supported language type.<br><br> |\n\n#"
