  /workspaces/{workspaceId}/models/{modelId}/currentPeriod:
    parameters:
    - $ref: '#/components/parameters/WorkspaceId'
    - $ref: '#/components/parameters/ModelId'
    get:
      summary: Retrieve current period
      description: |-
        Use this call to determine the value of the current period in Anaplan.

        If the current period is not set in Anaplan, this call returns empty strings for the `periodText` and `lastDay` values of the `currentPeriod`.

        **Notes**:

        *   To use this call, you must be a [Workspace Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html).
        *   Use of this call may be rate limited. If you call too frequently, you may receive a `429` response.
      tags:
      - Model Metadata
      - Model Setting Metadata
      responses:
        '200':
          description: The model's current period.
          headers:
            Content-Type:
              schema:
                type: string
              example: application/json
          content:
            application/json:
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/objects/currentPeriod
                status:
                  code: 200
                  message: Success
                currentPeriod:
                  periodText: May 20
                  lastDay: '2020-05-31'
                  calendarType: Calendar Months/Quarters/Years
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  currentPeriod:
                    $ref: '#/components/schemas/CurrentPeriod'
        '429':
          description: Rate limited — too many requests. Retry after a delay.
    put:
      summary: Set current period (workspace-scoped)
      description: |-
        Workspace-scoped alternate URL form — identical behaviour to `/models/{modelId}/currentPeriod` PUT.

        Use this call to change or reset the current period in Anaplan. When this call contains a specified date (for example, 2020-05-20), the API determines what period range contains the specified data and sets that range as the current period.  When the date value is set to blank in this call, the API resets the current period to blank.

        **Warning**: A change to your time settings is a potentially destructive action and may lead to data loss.  The new range of time periods may not include previous time periods. Any data in the removed time periods is deleted from the model.

        **Notes**:

        *   To use this call, you must be a [Workspace Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html)
        *   Use of this call may be rate limited. If you call too frequently, you may receive a `429` response

        ### Request body

        | **Body** | **Details** |
        | --- | --- |
        | `{date}` | <br><br>*   Required<br>*   Type: String<br>*   Description: The date to use to set, or reset, the current period. The date format is YYYY-MM-DD.  <br>    If the `date` parameter is left blank (for example, `/currentperiod?date=`) the current period resets.  <br>    If the date is not provided in the YYYY-MM-DD format, the call returns a `400 Bad Request` response with this message: `Invalid ISO date format '{date}'. Date should match format YYYY-MM-DD`  <br>    If this value falls outside of a valid range, the call returns a `400 Bad Request` response with this message: `Specified date '{date}' is out of timescale range {start of timescale} - {end of timescale}`.<br>*   Example: 2010-05-20<br><br> |
      tags:
      - Transactional Write
      parameters:
      - name: date
        in: query
        description: The date used to set the current period (YYYY-MM-DD). Leave blank (?date=) to reset the current period.
          Accepted as either a query parameter or a request body field, but not both simultaneously. Returns 400 if the format
          is invalid or the date falls outside the model timescale.
        required: false
        schema:
          type: string
          format: date
          pattern: ^\d{4}-\d{2}-\d{2}$
        example: '2020-05-20'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DateRequest'
            example:
              date: '2020-07-03'
      responses:
        '200':
          description: The updated current period.
          headers:
            Content-Type:
              schema:
                type: string
              example: application/json
          content:
            application/json:
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/objects/currentPeriod
                status:
                  code: 200
                  message: Success
                currentPeriod:
                  periodText: May 20
                  lastDay: '2020-05-31'
                  calendarType: Calendar Months/Quarters/Years
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  currentPeriod:
                    $ref: '#/components/schemas/CurrentPeriod'
        '429':
          description: Rate limited — too many requests. Retry after a delay.
        '400':
          description: 'Bad request. Occurs when: (1) the date is not in YYYY-MM-DD format — "Invalid ISO date format ''{date}''.
            Date should match format YYYY-MM-DD"; (2) the date falls outside the model timescale — "Specified date ''{date}''
            is out of timescale range {start} - {end}"; (3) date is supplied as both a query parameter and a request body
            field simultaneously.'
