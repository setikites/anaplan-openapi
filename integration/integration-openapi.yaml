            application/json:
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/objects/dimension
                status:
                  code: 200
                  message: Success
                items:
                - code: N
                  id: '200000000001'
                  name: North
                - code: E
                  id: '200000000002'
                  name: East
                - code: S
                  id: '200000000003'
                  name: South
                - code: W
                  id: '200000000004'
                  name: West
                - id: '200000000000'
                  name: Total Company
              schema:
                type: object
