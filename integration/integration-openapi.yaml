        \n### Get the status of an export task\n\nYou can get the status of a specific export task. In the response:\n\n*\
        \   `currentStep` is the task associated with the specified `taskID`.\n*   `taskState` is the status of that export\
        \ task.\n*   `progress` is a double that is typically 1.0.\n*   `result` is a JSON object that indicates the object\
        \ ID, and whether the task succeeded.\n*   `taskId` is the ID that you specified in the request.\n    \n\nHere is\
        \ a list of each possible `taskState`:\n\n| **Status** | **Description** |\n| --- | --- |\n| NOT_STARTED | The task\
        \ is scheduled to run, but has not started yet. |\n| IN_PROGRESS | The task is currently running. |\n| COMPLETE |\
        \ The task has finished running whether successful or not. |\n| CANCELLING | The task is currently being canceled.\
        \ Cancellation is not yet complete. |\n| CANCELLED | The task has been canceled and the changes have been rolled back.\
        \ |\n\nIf failures occur during the export task `details` contains a JSON array that contains debug information\n\n\
