      description: "## Retrieve IDs and names for views in a module\n\n`/models/{modelId}/modules/{moduleId}/views`\n\nUse\
        \ this call to retrieve all view IDs and names for a specified module. This call also returns the default view for\
        \ the module. If the user adds the query parameter includesubsidiaryviews=true, unsaved subsidiary views will also\
        \ be included in the results.\n\n**Notes**:\n\n*   To use this call, you must be a [Workspace Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html)\n\
        *   For the default view, the `{viewId}` is the same as the `{moduleId}`\n*   Use of this call may be rate limited.\
        \ If you call too frequently, you may receive a `429` response\n*   For unsaved subsidiary views, the `{viewId}` and\
        \ `{viewName}` are the same as the `{lineItemId}` and `{lineItemName}` that the subsidiary view is created from\n\
        \    \n\n### Request\n\n```\ncurl -X GET 'https://api.anaplan.com/2/0/models/{modelId}/modules/{moduleId}/views' \\\
        \n-H 'Authorization: AnaplanAuthToken {anaplan_auth_token}' \\\n-H 'Accept: application/json'\n```\n\n### Request\
        \ headers\n\n| **Header** | **Details** |\n| --- | --- |\n| `Authorization: AnaplanAuthToken {anaplan_auth_token}`\
        \ | <br><br>*   Required<br>*   Description: the Anaplan authentication token<br><br> |\n| `Accept: application/json`\
        \ | <br><br>*   Required<br>*   Description: This indicates the preferred response is `application/json` format.<br><br>\
        \ |\n\n### Request parameters\n\n| **Parameter** | **Details** |\n| --- | --- |\n| `{modelId}` | <br><br>*   Required<br>*\
        \   Type: String<br>*   Description: the ID for the model<br>*   Example: `75A40874E6B64FA3AE074327899685`<br><br>\
        \ |\n| `{moduleId}` | <br><br>*   Required<br>*   Type: number<br>*   Description: the ID for the module<br>*   Example:\
        \ `102000000028`<br><br> |\n| `{includesubsidiaryviews}` | <br><br>*   Optional (default false)<br>*   Type: String<br>*\
        \   Description: Whether the response should include unsaved subsidiary views. The field is interpreted as false if\
        \ anything other than `true` is specified<br>*   Example: `?includesubsidiaryviews=true`<br><br> |\n\n### Response\
        \ header\n\n`Content-Type: application/json`"
