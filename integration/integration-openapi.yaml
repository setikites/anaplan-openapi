openapi: 3.0.0
info:
  title: Official Anaplan Collection
  version: 1.0.0
  description: 'The Anaplan Integration API v2 provides REST endpoints for programmatic access to Anaplan resources: workspaces,
    models, files, imports, exports, processes, actions, lists, and modules. Use this API to automate data movement and model
    operations.'
servers:
- url: https://api.anaplan.com/2/0
  description: US1, US2, US5, US7, EU1, EU2, EU4, AP1
- url: https://us9.api.anaplan.com/2/0
  description: US9
- url: https://eu3.api.anaplan.com/2/0
  description: EU3
- url: https://eu5.api.anaplan.com/2/0
  description: EU5
- url: https://gb1.api.anaplan.com/2/0
  description: GB1
- url: https://ca1a.api.anaplan.com/2/0
  description: CA1
- url: https://sg1.api.anaplan.com/2/0
  description: SG1
- url: https://ae1.api.anaplan.com/2/0
  description: AE1
- url: https://in1.api.anaplan.com/2/0
  description: IN1
- url: https://id1.api.anaplan.com/2/0
  description: ID1
- url: https://me1.api.anaplan.com/2/0
  description: ME1
- url: https://au1a.api2.anaplan.com/2/0
  description: AU1
security:
- AnaplanAuthToken: []
- BearerAuth: []
paths:
  /models:
    get:
      summary: List user models
      description: Retrieves information about all models in the user's default tenant.
      tags:
      - General Workspace & Model Metadata
      parameters:
      - name: modelDetails
        in: query
        description: When true, includes available model memory usage in bytes in the response.
        schema:
          type: boolean
        example: true
      - $ref: '#/components/parameters/Search'
      - name: sort
        in: query
        description: Sort results by object properties. Prefix with `+` for ascending or `-` for descending order.
        schema:
          type: string
        example: +name
      responses:
        '200':
          description: All models in the user's default tenant.
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  models:
                    type: array
                    items:
                      $ref: '#/components/schemas/Model'
  /models/{modelId}:
    parameters:
    - $ref: '#/components/parameters/ModelId'
    get:
      summary: Get single model metadata
      tags:
      - General Workspace & Model Metadata
      parameters:
      - name: modelDetails
        in: query
        schema:
          type: boolean
        example: true
      responses:
        '200':
          description: Metadata for the model.
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  model:
                    $ref: '#/components/schemas/Model'
  /models/{modelId}/actions:
    parameters:
    - $ref: '#/components/parameters/ModelId'
    get:
      summary: List the actions in the model as a JSON array
      description: Model-direct form of `GET /workspaces/{workspaceId}/models/{modelId}/actions`. Returns the same response
        shape without requiring a workspace ID. Lists delete actions available for the specified model.
      tags:
      - Model Metadata
      - Action Metadata
      parameters:
      - name: sort
        in: query
        description: Sort results by object properties. Prefix with `+` for ascending or `-` for descending order.
        schema:
          type: string
        example: +name
      responses:
        '200':
          description: Actions retrieved successfully
          content:
            application/json:
              example:
                meta:
                  paging:
                    currentPageSize: 3
                    offset: 0
                    totalSize: 3
                  schema: https://api.anaplan.com/2/0/models/D4E5F6A1B2C3D4E5F6A1B2C3D4E5F6A1/objects/action
                status:
                  code: 200
                  message: Success
                actions:
                - id: '117000000019'
                  actionType: DELETE_BY_SELECTION
                  name: Delete Flat New SKU List
                - id: '117000000018'
                  actionType: DELETE_BY_SELECTION
                  name: Delete Flat New SKU List After Import
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  actions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Action'
  /models/{modelId}/currentPeriod:
    parameters:
    - $ref: '#/components/parameters/ModelId'
    get:
      summary: Get current period (model-scoped)
      tags:
      - Model Settings
      responses:
        '200':
          description: The model's current period.
          content:
            application/json:
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/objects/currentPeriod
                status:
                  code: 200
                  message: Success
                currentPeriod:
                  periodText: May 20
                  lastDay: '2020-05-31'
                  calendarType: Calendar Months/Quarters/Years
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  currentPeriod:
                    $ref: '#/components/schemas/CurrentPeriod'
    put:
      summary: Set current period
      description: |-
        Use this call to change or reset the current period in Anaplan. When this call contains a specified date (for example, 2020-05-20), the API determines what period range contains the specified data and sets that range as the current period.  When the date value is set to blank in this call, the API resets the current period to blank.

        **Warning**: A change to your time settings is a potentially destructive action and may lead to data loss.  The new range of time periods may not include previous time periods. Any data in the removed time periods is deleted from the model.

        **Notes**:

        *   To use this call, you must be a [Workspace Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html)
        *   Use of this call may be rate limited. If you call too frequently, you may receive a `429` response

        ### Request body

        | **Body** | **Details** |
        | --- | --- |
        | `{date}` | <br><br>*   Required<br>*   Type: String<br>*   Description: The date to use to set, or reset, the current period. The date format is YYYY-MM-DD.  <br>    If the `date` parameter is left blank (for example, `/currentperiod?date=`) the current period resets.  <br>    If the date is not provided in the YYYY-MM-DD format, the call returns a `400 Bad Request` response with this message: `Invalid ISO date format '{date}'. Date should match format YYYY-MM-DD`  <br>    If this value falls outside of a valid range, the call returns a `400 Bad Request` response with this message: `Specified date '{date}' is out of timescale range {start of timescale} - {end of timescale}`.<br>*   Example: 2010-05-20<br><br> |
      tags:
      - Transactional Write
      parameters:
      - name: date
        in: query
        description: The date used to set the current period (YYYY-MM-DD). Leave blank (?date=) to reset the current period.
          Accepted as either a query parameter or a request body field, but not both simultaneously. Returns 400 if the format
          is invalid or the date falls outside the model timescale.
        required: false
        schema:
          type: string
          format: date
          pattern: ^\d{4}-\d{2}-\d{2}$
        example: '2020-05-20'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DateRequest'
            example:
              date: '2020-07-03'
      responses:
        '200':
          description: The updated current period.
          headers:
            Content-Type:
              schema:
                type: string
              example: application/json
          content:
            application/json:
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/objects/currentPeriod
                status:
                  code: 200
                  message: Success
                currentPeriod:
                  periodText: May 20
                  lastDay: '2020-05-31'
                  calendarType: Calendar Months/Quarters/Years
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  currentPeriod:
                    $ref: '#/components/schemas/CurrentPeriod'
        '429':
          description: Rate limited — too many requests. Retry after a delay.
        '400':
          description: 'Bad request. Occurs when: (1) the date is not in YYYY-MM-DD format — "Invalid ISO date format ''{date}''.
            Date should match format YYYY-MM-DD"; (2) the date falls outside the model timescale — "Specified date ''{date}''
            is out of timescale range {start} - {end}"; (3) date is supplied as both a query parameter and a request body
            field simultaneously.'
  /models/{modelId}/dimensions/{dimensionId}/items:
    parameters:
    - $ref: '#/components/parameters/ModelId'
    - $ref: '#/components/parameters/DimensionId'
    get:
      summary: 'Model-direct form: Retrieve all items in a dimension'
      description: |-
        Alternate URL form — response is equivalent to `/workspaces/{workspaceId}/models/{modelId}/dimensions/{dimensionId}/items`.

        Use this call to retrieve the IDs, codes, and names for items in a specified dimension. The dimension must be a list, a list subset, a line item subset, or the Users dimension.

        Calls at model-level do not support the Time dimension. The calls return a `400` response. To avoid this, use the view dimension instead.

        **Notes**:

        *   To use this call, you must be a [Workspace Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html).
        *   This call is on the model-level. It returns all dimension items as it does not have view-level hiding, filtering, or [Selective Access](https://help.anaplan.com/anapedia/Content/Modeling/Users/Selective_Access.html). For the view-level endpoint, see Retrieve selected items in a dimension.
        *   If codes have not been set for an item, then the response excludes the `code` field.
        *   This call only supports the retrieval of dimensions and items from a dimension that contains a maximum of 1,000,000 items.
            The call returns a `400` response for any more than that number of items.
        *   Use of this call may be rate limited. If you call too frequently, you may receive a `429` response.
      tags:
      - Model Metadata
      - List Metadata
      responses:
        '200':
          description: Items of the dimension.
          headers:
            Content-Type:
              schema:
                type: string
              example: application/json
          content:
            application/json:
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/objects/dimension
                status:
                  code: 200
                  message: Success
                items:
                - code: N
                  id: '200000000001'
                  name: North
                - code: E
                  id: '200000000002'
                  name: East
                - code: S
                  id: '200000000003'
                  name: South
                - code: W
                  id: '200000000004'
                  name: West
                - id: '200000000000'
                  name: Total Company
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Dimension'
        '400':
          description: Bad request — check the request parameters and body.
        '429':
          description: Rate limited — too many requests. Retry after a delay.
    post:
      summary: 'Model-direct form: Lookup dimension items by name or code'
      description: |-
        Model-direct alternate URL form — identical behaviour to `/workspaces/{workspaceId}/models/{modelId}/dimensions/{dimensionId}/items` POST.

        Retrieve the items from a dimension that match one of a list of names or a list or codes.

        ** Notes: **

        *   To use this call, you must be a [Workspace Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html).
        *   This call does not return results for names or codes for which an item does not exist.
        *   If the given workspace, model, or dimension do not exist, this call returns a `404` code.
        *   If the dimension does not support codes and codes are provided, this call returns a `400` code.
        *   In the future, use of this call may be rate limited.

        ### Request body

        | **JSON Element** | **Description** |
        | --- | --- |
        | `names` | The case-insensitive strings that match the name of a returned item. |
        | `codes` | The case-insensitive strings that match the code of a returned item. |

        Note that the `names`, `codes`, or both fields in the request body must contain a non-empty value. If the request body does not include at least one of these fields, the response returns an error.
      tags:
      - Model Metadata
      - List Metadata
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                codes:
                  type: array
                  items:
                    type: string
                    format: utc-millisec
                names:
                  type: array
                  items:
                    type: string
            example:
              codes:
              - '2'
              names:
              - Test1
      responses:
        '200':
          description: Matching items from the dimension.
          content:
            application/json:
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/objects/dimension
                status:
                  code: 200
                  message: Success
                items:
                - name: South
                  id: '208000000001'
                  code: S
                - name: West
                  id: '208000000004'
                  code: W
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Dimension'
        '404':
          description: Not found — the referenced resource does not exist.
        '400':
          description: Bad request — check the request parameters and body.
  /models/{modelId}/exports:
    parameters:
    - $ref: '#/components/parameters/ModelId'
    get:
      summary: List the available export definitions as a JSON array
      description: Model-direct form of `GET /workspaces/{workspaceId}/models/{modelId}/exports`. Returns the same response
        shape without requiring a workspace ID. Lists export definitions available for the specified model.
      tags:
      - Model Metadata
      - Action Metadata
      parameters:
      - name: sort
        in: query
        description: Sort results by object properties. Prefix with `+` for ascending or `-` for descending order.
        schema:
          type: string
        example: +name
      responses:
        '200':
          description: Exports retrieved successfully
          content:
            application/json:
              example:
                meta:
                  paging:
                    currentPageSize: 2
                    offset: 0
                    totalSize: 2
                  schema: https://api.anaplan.com/2/0/models/A1B2C3D4E5F6A1B2C3D4E5F6A1B2C3D4/objects/export
                status:
                  code: 200
                  message: Success
                exports:
                - id: '116000000000'
                  name: Export Grid.xls
                  exportType: GRID_CURRENT_PAGE
                  exportFormat: text/csv
                  layout: GRID_CURRENT_PAGE
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  exports:
                    type: array
                    items:
                      $ref: '#/components/schemas/Export'
  /models/{modelId}/exports/{exportId}:
    parameters:
    - $ref: '#/components/parameters/ModelId'
    - $ref: '#/components/parameters/ExportId'
    get:
      summary: Get the metadata for an export definition
      description: Model-direct form of `GET /workspaces/{workspaceId}/models/{modelId}/exports/{exportId}`. Returns the same
        `exportMetadata` response shape without requiring a workspace ID.
      tags:
      - Model Metadata
      - Action Metadata
      responses:
        '200':
          description: Metadata for the export definition.
          content:
            application/json:
              example:
                meta:
                  schema: https://api-stg.anaplan.com/2/0/models/28D168FB7385407A8AC0026487733564/objects/exportMetadata
                status:
                  code: 200
                  message: Success
                exportMetadata:
                  columnCount: 16
                  dataTypes:
                  - ENTITY
                  - MIXED
                  - MIXED
                  - MIXED
                  - MIXED
                  delimiter: '"'
                  encoding: UTF-8
                  exportFormat: text/csv
                  headerNames:
                  - ListWithSemiColonAsSeparator
                  - Parent
                  - Code
                  - DepProjects
                  - col1
                  - col2
                  - col3
                  - col4
                  - data
                  - delete
                  listNames:
                  - ''
                  - ''
                  - ''
                  - ''
                  rowCount: 20432
                  separator: ','
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  exportMetadata:
                    $ref: '#/components/schemas/ExportMetadata'
  /models/{modelId}/files:
    parameters:
    - $ref: '#/components/parameters/ModelId'
    get:
      summary: Get a list of files
      description: |-
        To upload a file, you need its ID in Anaplan:

        *   `id` is the ID that you need to upload the file.
        *   `name` is the filename of the file.
        *   `chunkCount` is the number of chunks in the file.
        *   `delimiter` is double-quotes for columns and fields. For example, "Versions","Opportunities"," "Version 1","Opportunity 0001".
        *   `encoding` determines the way in which bytes in a file map to Unicode character code points. See [Common Character Encodings](https://en.wikipedia.org/wiki/Character_encoding#Common_character_encodings) on Wikipedia.
        *   `firstDataRow` is the first row after the row containing column names.
        *   `format` is text, as opposed to a binary stream.
        *   `headerRow` is the row that contains column names.
        *   `separator` is the token that separates fields. This is typically a comma, for example, "Versions","Opportunities"," "Version 1","Opportunity 0001".

        ### Headers

        *   `Authorization:AnaplanAuthToken {anaplan_auth_token}`
        *   `Accept:application/json`
      tags:
      - Model Metadata
      - File Metadata
      parameters:
      - name: sort
        in: query
        description: Sort results by object properties. Prefix with `+` for ascending or `-` for descending order.
        schema:
          type: string
        example: +name
      responses:
        '200':
          description: Files in the model, each with the ID needed to upload.
          content:
            application/json:
              example:
                meta:
                  paging:
                    currentPageSize: 9
                    offset: 0
                    totalSize: 9
                  schema: https://api.anaplan.com//2/0/models/A1B2C3D4E5F6A1B2C3D4E5F6A1B2C3D4/objects/file
                status:
                  code: 200
                  message: Success
                files:
                - id: '113000000000'
                  name: '#T & #R.csv'
                  chunkCount: 0
                  delimiter: '"'
                  encoding: ISO-8859-1
                  firstDataRow: 2
                  format: txt
                  headerRow: 1
                  separator: ','
                - id: '113000000001'
                  name: '#T & #R-1.csv'
                  chunkCount: 0
                  delimiter: '"'
                  encoding: ISO-8859-1
                  firstDataRow: 2
                  format: txt
                  headerRow: 1
                  separator: ','
                - id: '113000000002'
                  name: Sales metrics (1) - POC load.csv
                  chunkCount: 0
                  delimiter: '"'
                  encoding: UTF-8
                  firstDataRow: 2
                  format: txt
                  headerRow: 1
                  separator: ','
                - id: '116000000001'
                  name: ExportGrid - ORG2Test.xls
                  chunkCount: 1
                  firstDataRow: 0
                  headerRow: 0
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  files:
                    type: array
                    items:
                      $ref: '#/components/schemas/File'
  /models/{modelId}/files/{fileId}/chunks:
    parameters:
    - $ref: '#/components/parameters/ModelId'
    - $ref: '#/components/parameters/FileId'
    get:
      summary: Get Chunks Details (model-direct)
      description: 'Model-direct equivalent of `GET /workspaces/{workspaceId}/models/{modelId}/files/{fileId}/chunks`. Returns
        the same response shape: a `chunks` array of `{id, name}` objects (key omitted entirely when `chunkCount` is 0).'
      tags:
      - Bulk Read
      responses:
        '200':
          description: Chunk IDs and names for the file.
          content:
            application/json:
              example:
                meta:
                  paging:
                    currentPageSize: 4
                    offset: 0
                    totalSize: 4
                  schema: https://api.anaplan.com//2/0/models/A1B2C3D4E5F6A1B2C3D4E5F6A1B2C3D4/objects/chunk
                status:
                  code: 200
                  message: Success
                chunks:
                - id: '0'
                  name: Chunk 0
                - id: '1'
                  name: Chunk 1
                - id: '2'
                  name: Chunk 2
                - id: '3'
                  name: Chunk 3
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  chunks:
                    type: array
                    items:
                      $ref: '#/components/schemas/Chunk'
  /models/{modelId}/imports:
    parameters:
    - $ref: '#/components/parameters/ModelId'
    get:
      summary: Get a list of import actions
      description: Model-direct form of `GET /workspaces/{workspaceId}/models/{modelId}/imports`. Returns the same response
        shape without requiring a workspace ID. Lists import definitions available for the specified model.
      tags:
      - Model Metadata
      - Action Metadata
      parameters:
      - name: sort
        in: query
        description: Sort results by object properties. Prefix with `+` for ascending or `-` for descending order.
        schema:
          type: string
        example: +name
      responses:
        '200':
          description: Imports retrieved successfully
          content:
            application/json:
              example:
                meta:
                  paging:
                    currentPageSize: 8
                    offset: 0
                    totalSize: 8
                  schema: https://api.anaplan.com/2/0/models/A1B2C3D4E5F6A1B2C3D4E5F6A1B2C3D4/objects/import
                status:
                  code: 200
                  message: Success
                imports:
                - id: '112000000007'
                  name: ORG2Test from Organization.txt
                  importDataSourceId: '113000000006'
                  importType: HIERARCHY_DATA
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  imports:
                    type: array
                    items:
                      $ref: '#/components/schemas/Import'
  /models/{modelId}/imports/{importId}:
    parameters:
    - $ref: '#/components/parameters/ModelId'
    - $ref: '#/components/parameters/ImportId'
    get:
      summary: Get the metadata for an import definition
      description: Model-direct form of `GET /workspaces/{workspaceId}/models/{modelId}/imports/{importId}`. Returns the same
        `importMetadata` response shape without requiring a workspace ID.
      tags:
      - Model Metadata
      - Action Metadata
      responses:
        '200':
          description: Metadata for the import definition.
          content:
            application/json:
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/models/A1B2C3D4E5F6A1B2C3D4E5F6A1B2C3D4/objects/importMetadata
                status:
                  code: 200
                  message: Success
                importMetadata:
                  name: Employees from Employees.txt
                  type: FILE
                  source:
                    textEncoding: ISO-8859-1
                    columnSeparator: "\t"
                    textDelimiter: '"'
                    headerRow: 1
                    firstDataRow: 2
                    decimalSeparator: .
                    headerNames:
                    - Name
                    - Sales Region
                    - Parent
                    - Code
                    - Sales Team
                    - Start Date
                    - Leave Date
                    - Salary
                    - Address
                    - Quota
                    - Bonus %
                    - Sales Rep
                    - Staff
                    - Exec
                    columnCount: 14
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  importMetadata:
                    $ref: '#/components/schemas/ImportMetadata'
  /models/{modelId}/lineItems:
    parameters:
    - $ref: '#/components/parameters/ModelId'
    get:
      summary: Retrieve all line items in a model
      description: |-
        Use this call to retrieve identifiers of all line items in a model.

        **Notes**:

        *   To use this call, you must be a [Workspace Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html).
        *   The returned line items are restricted just to those in modules to which the model role of the user has Read access.
        *   The response returns Items within a [flat list](https://help.anaplan.com/anapedia/Content/Modeling/Dimensions/Lists.html) (no hierarchy).
        *   This returns all the line items in the model. For line items in a specific module see Retrieve Line Items For a Module.
        *   Use of this call may be rate limited. If you call too frequently, you may receive a `429` response
      tags:
      - Model Metadata
      - Line Item Metadata
      responses:
        '200':
          description: All line items in the model.
          headers:
            Content-Type:
              schema:
                type: string
              example: application/json
          content:
            application/json:
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/objects/lineItem
                status:
                  code: 200
                  message: Success
                items:
                - moduleId: '102000000000'
                  moduleName: Sales Entry
                  id: '206000000000'
                  name: Quantity Sold
