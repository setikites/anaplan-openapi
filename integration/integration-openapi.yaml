        ### Headers

        *   `Authorization:AnaplanAuthToken {anaplan_auth_token}`
        *   `Content-Type:application/json`

        ### Parameters

        #
      tags:
      - Model Metadata
      - File Metadata
      responses:
        '204':
          description: File deleted successfully. No response body.
