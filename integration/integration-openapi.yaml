        | --- | --- |
        | `{modelId}` | <br><br>*   Required<br>*   Type: `String`<br>*   Description: the ID for the model<br>*   Example: `75A40874E6B64FA3AE0743278996850F`<br><br> |
        | `{lineItemId}` | <br><br>*   Required<br>*   Type: `Number`<br>*   Description: the line item ID<br>*   Example: `208000000000`<br><br> |
        | `{dimensionId}` | <br><br>*   Required<br>*   Type: `Number`<br>*   Description: the dimension ID<br>*   Example: `101000000028`<br><br> |
      tags:
      - Model Metadata
      - Line Item Metadata
      responses:
