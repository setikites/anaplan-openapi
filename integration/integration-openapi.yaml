  /workspaces/{workspaceId}/models/{modelId}/views/{viewId}/readRequests:
    parameters:
    - $ref: '#/components/parameters/WorkspaceId'
    - $ref: '#/components/parameters/ModelId'
    - $ref: '#/components/parameters/ViewId'
    post:
      summary: Initiate long read request
      description: |-
        Use this call to initiate a large volume read request of view data. This enables you to read data from views that are larger than a million cell count.

        **Note:**

        *   To use this call, you must be a [Workspace Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html).
        *   As a best practice, use the Delete read requests call to clear all pages from completed exports as soon as you download all pages. Doing so will make space available for future exports.

        ### Request Body

        This API supports exporting data in the following formats:

        | **Type** | **Description** | **More information** |
        | --- | --- | --- |
        | `GRID_ALL_PAGES` | This layout respects the existing sorting and filtering you have imposed on a data grid before you launch the export. | [Export grid](https://help.anaplan.com/Import_and_Export/Export_Layouts/Export_Data_in_Grid_Layout.html) |
        | `TABULAR_SINGLE_ITEMS` | This layout takes all dimensions and puts them in columns, with the final column reserved for data. | [Export tabular single column](https://help.anaplan.com/Import_and_Export/Export_Layouts/Export_Data_in_Tabular_Single_Column_Layout.html) |
        | `TABULAR_MULTI_COLUMN` | This layout enables you to export multiple data columns. If you set up a Boolean line item, you can use it as a filter to control which data is exported. This is especially useful when exporting from large modules. It saves the manual task of marking data cells for export. | [Export Tabular Multiple Column](https://help.anaplan.com/Import_and_Export/Export_Layouts/Export_Data_in_Tabular_Multiple_Column_Layout.html) |
      tags:
      - Transactional Read
      responses:
        '200':
          description: The created read request, including the URL to poll for status.
          content:
            application/json:
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/objects/viewReadRequest
                status:
                  code: 200
                  message: Success
                viewReadRequest:
                  requestId: 0A06B0739F0E47BB92E2326C603D86EC
                  requestState: IN_PROGRESS
                  url: https://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/views/{viewId}/readRequests/{requestId}
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  viewReadRequest:
                    $ref: '#/components/schemas/ViewReadRequest'
  /workspaces/{workspaceId}/models/{modelId}/views/{viewId}/readRequests/{requestId}:
    parameters:
    - $ref: '#/components/parameters/WorkspaceId'
    - $ref: '#/components/parameters/ModelId'
    - $ref: '#/components/parameters/ViewId'
    - $ref: '#/components/parameters/RequestId'
    get:
      summary: Retrieve status of large read request
      description: |-
        Use this call to check the status of an export action after a bulk data long request is initiated. You can use it to check how many pages are available to download.

        **Note:** To use this call, you must be a [Workspace Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html).

        ### Response scenarios

        *   When `requestState` is `COMPLETE` and `successful` is `true` , the export has completed successfully and the user can download all the pages.
        *   When `requestState` is `IN_PROGRESS` and `successful` is `false`, the export has not yet completed. You can download the available pages indicated by the `availablePages` field.
        *   When `requestState` is `COMPLETE` and `successful` is `false`, this means the export failed. Retry and initiate a new export.
        *   When 'requestState' is 'NOT_STARTED' then simply check the status again.
        *   When requestState' is 'CANCELLED' then this request is completed by a 'DELETE' call.


        We recommend you delete the last failed export before initiating a new export, using the delete export endpoint.
      tags:
      - Transactional Read
      responses:
        '200':
          description: Status of the read request, including available page count.
          content:
            application/json:
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/objects/viewReadRequest
                status:
                  code: 200
                  message: Success
                viewReadRequest:
                  requestId: 0A06B0739F0E47BB92E2326C603D86EC
                  viewId: 101000000014
                  requestState: COMPLETE
                  url: https://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/views/{viewId}/readRequests/{requestId}
                  availablePages: 100
                  successful: true
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  viewReadRequest:
                    $ref: '#/components/schemas/ViewReadRequest'
    delete:
      summary: Delete Read Request
      description: |-
        Use this call to delete or cancel an initiated read request. This removes all the pages from the file store and stops the ongoing read request.

        **Notes**:

        *   To use this call, you must be a [**Workspace Administrator**](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html).
        *   As a best practice, use this call to clear all pages from completed exports as soon as you download all pages. Doing so will make space available for future exports.
        *   The system will automatically reclaim space for read requests not accessed for over 30 minutes. The same applies to failed read requests.

        ### Response 200 body
      tags:
      - Transactional Read
      responses:
        '200':
          description: Read request cancelled or removed; pages cleared from file store.
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  viewReadRequest:
                    $ref: '#/components/schemas/ViewReadRequest'
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/objects/viewReadRequest
                status:
                  code: 200
                  message: Success
                viewReadRequest:
                  requestId: F296566FA2CE4468925D8B85F2402541
                  viewId: 102000001443
                  requestState: CANCELLED
                  url: https://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/views/{viewId}/readRequests/{requestId}
  /workspaces/{workspaceId}/models/{modelId}/views/{viewId}/readRequests/{requestId}/pages/{pageNo}:
    parameters:
    - $ref: '#/components/parameters/WorkspaceId'
    - $ref: '#/components/parameters/ModelId'
    - $ref: '#/components/parameters/ViewId'
    - $ref: '#/components/parameters/RequestId'
    - $ref: '#/components/parameters/PageNo'
    get:
      summary: Download Pages
      description: |-
        Use this call to download the available pages, either when the read request is in progress, or when the request is completed. This request returns a CSV format response of the export list items.

        You can download pages while the export is in progress. You can download up to `availablePages` number of pages returned by the export status API.

        Note that page numbers start with zero. That means if 10 pages are available, you can download from page=0 through page=9

        **Note:**

        *   To use this call, you must be a [**Workspace Administrator**](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html).
        *   As a best practice, use the **Delete read requests** call to clear all pages from completed exports as soon as you download all pages. Doing so will make space available for future exports.
      tags:
      - Transactional Read
      parameters:
      - name: Accept-Encoding
        in: header
        schema:
          type: string
        example: csv
      responses:
        '200':
          description: One page of view data as CSV.
          content:
            text/csv:
              schema:
                type: string
  /workspaces/{workspaceId}/visitors:
    parameters:
    - $ref: '#/components/parameters/WorkspaceId'
    get:
      summary: List workspace visitors
      description: Returns all visitors for a workspace. Requires tenant admin privilege; workspace admin access alone is
        insufficient.
      tags:
      - General Workspace & Model Metadata
      responses:
        '200':
          description: Visitors retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  visitors:
                    type: array
                    items:
                      $ref: '#/components/schemas/Visitor'
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/objects/visitor
                  paging:
                    currentPageSize: 0
                    totalSize: 0
                    offset: 0
                status:
                  code: 200
                  message: Success
                visitors: []
        '404':
          description: Workspace not found.
components:
  parameters:
    ModelId:
      name: modelId
      in: path
      description: Model identifier (32-character uppercase hex string). From GET /models.
      required: true
      schema:
        type: string
        pattern: ^[0-9A-F]{32}$
      example: A1B2C3D4E5F6A1B2C3D4E5F6A1B2C3D4
    DimensionId:
      name: dimensionId
      in: path
      required: true
      schema:
        type: string
      example: '{{dimensionId}}'
    ExportId:
      name: exportId
      in: path
      description: Export definition identifier (12-digit numeric, prefix 116).
      required: true
      schema:
        type: string
      example: '116000000108'
    FileId:
      name: fileId
      in: path
      required: true
      schema:
        type: string
      example: '{{fileId}}'
    ImportId:
      name: importId
      in: path
      description: Import definition identifier (12-digit numeric, prefix 112).
      required: true
      schema:
        type: string
      example: '112000001286'
    LineItemId:
      name: lineItemId
      in: path
      required: true
      schema:
        type: string
      example: '{{lineItemId}}'
    ListId:
      name: listId
      in: path
      description: List identifier (12-digit numeric string, prefix 101). From GET /models/{modelId}/lists.
      required: true
      schema:
        type: string
      example: '101000000000'
    ModuleId:
      name: moduleId
      in: path
      required: true
      schema:
        type: string
      example: '{{moduleId}}'
    ProcessId:
      name: processId
      in: path
      description: Process identifier (12-digit numeric, prefix 118).
      required: true
      schema:
        type: string
      example: '{{processId}}'
    VersionId:
      name: versionId
      in: path
      required: true
      schema:
        type: string
      example: '{{versionId}}'
    ViewId:
      name: viewId
      in: path
      description: View identifier. From GET /models/{modelId}/views (or a lineItemId from GET /models/{modelId}/modules/{moduleId}/lineItems
        — a line item with a subsidiary view returns that view's data).
      required: true
      schema:
        type: string
      example: ''
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        pattern: ^[0-9a-f]{32}$
      example: '{{userId}}'
    WorkspaceId:
      name: workspaceId
      in: path
      description: Workspace identifier (32-character lowercase hex string).
      required: true
      schema:
        type: string
        pattern: ^[0-9a-f]{32}$
      example: c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6
    ActionId:
      name: actionId
      in: path
      required: true
      schema:
        type: string
      example: '{{processId}}'
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: string
      example: F37EA1512BC448D3B223431C33B844B6
    RequestId:
      name: requestId
      in: path
      required: true
      schema:
        type: string
      example: ''
    PageNo:
      name: pageNo
      in: path
      required: true
      schema:
        type: string
      example: ''
    Search:
      name: s
      in: query
      description: Search string
      required: false
      schema:
        type: string
    TenantDetails:
      name: tenantDetails
      in: query
      required: false
      schema:
        type: boolean
      example: true
    IncludeAll:
      name: includeAll
      in: query
      required: false
      schema:
        type: boolean
      example: true
  securitySchemes:
    AnaplanAuthToken:
      type: apiKey
      in: header
      name: Authorization
      description: 'Anaplan authentication token. Format: `AnaplanAuthToken {token}`'
    BearerAuth:
      type: http
      scheme: bearer
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          pattern: ^[0-9a-fA-F]{32}$
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          pattern: ^[_A-Za-z0-9-\\+]+(\\.[_A-Za-z0-9-]+)*@[A-Za-z0-9-]+(\\.[A-Za-z0-9]+)*(\\.[A-Za-z]{2,})$
        active:
          type: boolean
        lastLoginDate:
          type: string
          format: date-time
        emailOptIn:
          type: boolean
        customerId:
          type: string
    Admin:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          pattern: ^[_A-Za-z0-9-\\+]+(\\.[_A-Za-z0-9-]+)*@[A-Za-z0-9-]+(\\.[A-Za-z0-9]+)*(\\.[A-Za-z]{2,})$
        active:
          type: boolean
        otherWorkspaces:
          type: array
          items:
            type: string
    Visitor:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          pattern: ^[_A-Za-z0-9-\\+]+(\\.[_A-Za-z0-9-]+)*@[A-Za-z0-9-]+(\\.[A-Za-z0-9]+)*(\\.[A-Za-z]{2,})$
        active:
          type: boolean
        otherWorkspaces:
          type: array
          items:
            type: string
    Model:
      type: object
      properties:
        id:
          type: string
          pattern: ^[0-9a-fA-F]{32}$
        name:
          type: string
        activeState:
          type: string
          enum:
          - MAINTENANCE
          - UNLOCKED
          - PRODUCTION
          - ARCHIVED
          - PRODUCTION_MAINTENANCE
          - LOCKED
        currentWorkspaceId:
          type: string
        currentWorkspaceName:
          type: string
        modelUrl:
          type: string
        categoryValues:
          type: array
          items:
            $ref: '#/components/schemas/CategoryValue'
        isoCreationDate:
          type: string
        lastModified:
          type: string
        lastModifiedByUserGuid:
          type: string
        lastSavedSerialNumber:
          type: string
        memoryUsage:
          type: number
        modelTransactionRunning:
          type: boolean
    Workspace:
      type: object
      properties:
        id:
          type: string
          pattern: ^[0-9a-fA-F]{32}$
        name:
          type: string
        active:
          type: boolean
        sizeAllowance:
          type: integer
        currentSize:
          type: integer
    CategoryValue:
      type: object
      properties:
        id:
          type: string
        attribute:
          type: string
        categoryId:
          type: string
        categoryName:
          type: string
        customerId:
          type: string
    BulkDeleteModels:
      type: object
      description: Result of bulk deleting models.
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        status:
          $ref: '#/components/schemas/Status'
        modelsDeleted:
          type: integer
          description: Number of models successfully deleted.
        bulkDeleteModelsFailures:
          type: array
          description: Models that could not be deleted, with failure reasons. Omitted from the response when all requested
            deletions succeed.
          items:
            type: object
            properties:
              modelId:
                type: string
              message:
                type: string
    Module:
      properties:
        code:
          type: string
        id:
          type: string
          description: 12-digit numeric identifier. The prefix 102 marks this as a module.
        name:
          type: string
    View:
      properties:
        code:
          type: string
        id:
          type: string
          description: 12- or 13-digit numeric identifier. Default views share the module prefix 102; named saved views use
            higher-range prefixes (up to 13 digits).
        moduleId:
          type: string
        name:
          type: string
    Dimension:
      properties:
        code:
          type: string
        id:
          type: string
        name:
          type: string
    CurrentPeriod:
      properties:
        calendarType:
          type: string
        lastDay:
          type: string
        periodText:
          type: string
          description: Human-readable label for the current period. Empty string when no current period is set.
          example: Jan 24
    Process:
      properties:
        code:
          type: string
        id:
          type: string
          description: 12-digit numeric identifier. The prefix 118 marks this as a process.
        name:
          type: string
    Action:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        code:
          type: string
        actionType:
          type: string
          description: Category of action. Observed values include DELETE_BY_SELECTION. Distinguishes deletion actions from
            imports, exports, and processes.
    Dashboard:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        code:
          type: string
    ModelCalendar:
      properties:
        calendarType:
          type: string
          description: Calendar model used in this model. Determines the period hierarchy and week-based options.
          example: Calendar Months
        currentPeriod:
          properties:
            lastDay:
              type: string
            periodText:
              type: string
          type: object
        extraWeekMonth:
          type: integer
          description: For 4-4-5 calendars, the month index (1–12) that receives the extra week in a 53-week year.
        fiscalYear:
          properties:
            endDate:
              type: string
            fiscalYearLabel:
              type: string
            startDate:
              type: string
          type: object
        futureYearsCount:
          type: integer
        pastYearsCount:
          type: integer
        startDate:
          type: string
        totalsSelection:
          properties:
            extraMonthQuarter:
              type: integer
            isHalfYearTotals:
              type: boolean
            isQuarterTotals:
              type: boolean
            isTotalOfAllPeriods:
              type: boolean
            isYearToDateSummary:
              type: boolean
            isYearToGoSummary:
              type: boolean
          type: object
        weekFormat:
          type: string
        weekGrouping:
          type: string
        weeksCount:
          type: integer
    List:
      properties:
        code:
          type: string
        id:
          type: string
          description: 12-digit numeric identifier. The prefix 101 marks this as a list.
        name:
          type: string
    ListMetadata:
      type: object
      description: Full metadata for a single list, returned by GET .../lists/{listId}. Metadata entries that are not set
        for a list (for example, no parent or no top level item) are omitted from the response.
      properties:
        category:
          type: string
          description: The category to which the list is assigned.
        dataTags:
          type: array
          description: The data tags associated with the list.
          items:
            type: string
        hasSelectiveAccess:
          type: boolean
          description: true if this list uses selective access.
        id:
          type: string
          description: The list ID. Corresponds to the listId path parameter. 12-digit numeric, prefix 101.
        itemCount:
          type: integer
          description: The number of list items present in the list.
        managedBy:
          type: string
          description: Not currently used.
        name:
          type: string
          description: The list name.
        nextitemIndex:
          type: integer
          description: Index of the next new item in the list. Used only by numbered lists.
        numberedList:
          type: boolean
          description: true if this is a numbered list.
        parent:
          type: object
          description: The parent hierarchy list, when this list is part of a hierarchy.
          properties:
            id:
              type: string
            name:
              type: string
        permittedItems:
          type: integer
          description: How many more items you can add to the list. Changes as the number of items in the list changes.
        productionData:
          type: boolean
          description: true if this is a production list in Application Lifecycle Management (ALM).
        properties:
          type: array
          description: The list properties.
          items:
            type: object
            properties:
              name:
                type: string
              dataTags:
                type: array
                items:
                  type: string
              format:
                type: string
              formula:
                type: string
              notes:
                type: string
              referencedBy:
                type: string
        subsets:
          type: array
          description: The subsets associated with the list hierarchy.
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
        topLevelItem:
          type: object
          description: If present, the top level item in a hierarchy.
          properties:
            id:
              type: string
            name:
              type: string
        useTopLevelAsPageDefault:
          type: boolean
          description: true if this list is the default item in a page selector.
        workflowEnabled:
          type: boolean
          description: true if this list is enabled for Workflow.
    ListItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        code:
          type: string
        parent:
          type: string
        parentId:
          type: string
        listId:
          type: string
          description: Anaplan ID of the parent hierarchy list this item belongs to. Only present when the list has a Parent
            Hierarchy configured.
        listName:
          type: string
          description: Name of the parent hierarchy list this item belongs to. Only present when the list has a Parent Hierarchy
            configured.
        subsets:
          type: object
          description: Subset membership flags keyed by subset name. true means the item belongs to that subset. Only present
            when includeAll=true.
          additionalProperties:
            type: boolean
        properties:
          type: object
          description: Custom list property values keyed by property name. Values are string-encoded regardless of the underlying
            property type. Only present when includeAll=true.
          additionalProperties:
            type: string
    ListReadRequest:
      description: Async read-request token returned by POST .../lists/{listId}/readRequests. Poll the returned url to retrieve
        results when requestState is COMPLETE.
      type: object
      properties:
        requestId:
          type: string
        requestState:
          type: string
          description: Current state of the async read operation.
          example: IN_PROGRESS
        url:
          type: string
          description: URL to poll for the read-request result or download pages.
        availablePages:
          type: integer
        listId:
          type: string
        successful:
          type: boolean
    Version:
      description: The version of data being used in an Anaplan model
      properties:
        code:
          type: string
        editFrom:
          $ref: '#/components/schemas/Period'
        editTo:
          $ref: '#/components/schemas/Period'
        formula:
          type: string
        id:
          type: string
        isActual:
          type: boolean
          description: Whether this version holds actual (historical) data rather than forecast data.
        isCurrent:
          type: boolean
          description: Whether this is the currently active version, i.e. the version whose data covers the current period.
        name:
          type: string
        notes:
          type: string
        switchover:
          $ref: '#/components/schemas/Period'
    Switchover:
      description: The date that the version switches over from actual to forecast
      properties:
        calendarType:
          type: string
        code:
          type: string
        date:
          type: string
        id:
          type: string
        name:
          type: string
        periodText:
          type: string
    ViewData:
      description: 'JSON-formatted view cell data returned when Accept: application/json and format=v1 are set on GET /models/{modelId}/views/{viewId}/data.'
      type: object
      properties:
        pages:
          type: array
          items:
            type: string
          description: Selected item labels for each page-axis dimension; empty when no page dimensions exist.
        columnCoordinates:
          type: array
          items:
            type: array
            items:
              type: string
          description: Coordinate labels for each column; each inner array has one entry per column dimension.
        rows:
          type: array
          items:
            $ref: '#/components/schemas/ViewDataRow'
    ViewDataRow:
      description: One row of view cell data.
      type: object
      properties:
        rowCoordinates:
          type: array
          items:
            type: string
          description: Coordinate labels for this row; one entry per row dimension.
        cells:
          type: array
          items:
            type: string
          description: Cell values in column order; positions correspond to columnCoordinates.
    ViewReadRequest:
      description: Result record for a large-view read operation. Tracks the asynchronous read state and provides a URL for
        downloading the data once it is ready.
      properties:
        availablePages:
          type: integer
        requestId:
          type: string
        requestState:
          enum:
          - NOT_STARTED
          - IN_PROGRESS
          - COMPLETE
          - CANCELLING
          - CANCELLED
        successful:
          type: boolean
        url:
          type: string
        viewId:
          type: integer
    Chunk:
      description: A unit of partial file content
      properties:
        code:
          type: string
        id:
          type: string
        name:
          type: string
    Export:
      properties:
        code:
          type: string
        exportType:
          type: string
          description: Shape and scope of the exported data.
          enum:
          - AUDIT_LOG
          - GRID_CURRENT_PAGE
          - TABULAR_ALL_LINE_ITEMS
          - TABULAR_CURRENT_LINE_ITEM
          - TABULAR_MULTI_COLUMN
        id:
          type: string
          description: 12-digit numeric identifier. The prefix 116 marks this as an export definition; the export output file
            shares this same ID.
        name:
          type: string
        encoding:
          type: string
        exportFormat:
          type: string
        layout:
          type: string
    ExportMetadata:
      properties:
        columnCount:
          type: integer
        dataTypes:
          items:
            enum:
            - NONE
            - NUMBER
            - ENTITY
            - DATE
            - TEXT
            - BOOLEAN
            - FORMAT
            - SUMMARY
            - MULTISELECT_HIERARCHY
            - MULTISELECT_USER
            - MULTISELECT_ENTITY
            - MULTISELECT_MODULE
            - ACTION_DEFINITION
            - MIXED
            - TIME_ENTITY
            - REMOTE_MODEL_DEFINITION
            - MULTISELECT_TAG
          type: array
        delimiter:
          type: string
        encoding:
          type: string
        exportFormat:
          type: string
        headerNames:
          items:
            type: string
          type: array
        listNames:
          items:
            type: string
          type: array
        rowCount:
          type: integer
        separator:
          type: string
        layout:
          type: string
    File:
      description: A file associated with an import data source, import failure dump, or export
      properties:
        chunkCount:
          type: integer
        code:
          type: string
        country:
          type: string
        delimiter:
          type: string
        encoding:
          type: string
          description: 'Character encoding of the file. Observed values: ISO-8859-1, UTF-16LE, UTF-8.'
        firstDataRow:
          type: integer
          description: Row number of the first data row. 0 means no data rows are configured; otherwise 1-based (row 1 = first
            row of the file).
        format:
          type: string
        headerRow:
          type: integer
          description: 1-based row number of the column-header row in a delimited file.
        id:
          type: string
          description: 12-digit numeric identifier. Import source files use the prefix 113; export output files use 116, matching
            their parent export's ID.
        language:
          type: string
        name:
          type: string
        origin:
          type: string
          description: 'Source type of the file: ''NATIVE_ANAPLAN'' for Anaplan-owned files, ''FILE_BASED'' for externally
            uploaded import sources.'
          example: NATIVE_ANAPLAN
        separator:
          type: string
    Import:
      properties:
        code:
          type: string
        id:
          type: string
          description: 12-digit numeric identifier. The prefix 112 marks this as an import definition.
        importDataSource:
          properties:
            importDataSourceId:
              type: string
            sourceModelId:
              type: string
            sourceModelName:
              type: string
            sourceWorkspaceId:
              type: string
            type:
              type: string
          type: object
        importDataSourceId:
          type: string
        importType:
          type: string
          description: Category of data the import processes.
          enum:
          - HIERARCHY_DATA
          - LINE_ITEM_DEFINITION
          - MODULE_DATA
          - USERS
        name:
          type: string
    ImportMetadata:
      description: Metadata about an import definition
      properties:
        name:
          type: string
          description: Display name of the import definition
        type:
          type: string
          description: 'Data source type for this import: ''FILE'' for file-based imports, ''MODEL'' for model-to-model imports.'
          enum:
          - FILE
          - MODEL
        source:
          type: object
          description: Source file configuration for file-based imports
          properties:
            columnCount:
              type: integer
            columnSeparator:
              type: string
            decimalSeparator:
              type: string
            firstDataRow:
              type: integer
            headerNames:
              type: array
              items:
                type: string
            headerRow:
              type: integer
            textDelimiter:
              type: string
            textEncoding:
              type: string
    LineItem:
      properties:
        appliesTo:
          type: array
        breakback:
          type: boolean
        broughtForward:
          type: boolean
        cellCount:
          type: integer
        code:
          type: string
        dataTags:
          type: array
        format:
