      description: "## Retrieve list metadata\n\n`/workspaces/{workspaceId}/models/{modelId}/lists/{listId}`\n\nUse this call\
        \ to retrieve the following metadata for a specified list:\n\n| **Metadata** | **Description** |\n| --- | --- |\n\
        | `category` | The category to which the list is assigned. |\n| `dataTags` | The data tags associated with the list.\
        \ |\n| `hasSelectiveAccess` | If the value is true, this list uses [selective access](https://help.anaplan.com/anapedia/Content/Modeling/Users/Selective_Access.html).\
        \ |\n| `id` | The list ID.  This corresponds to the `listId` parameter. |\n| `itemCount` | The number of list items\
        \ present in the list. |\n| `managedBy` | Not currently used. |\n| `name` | The list name. |\n| `nextitemIndex` |\
        \ Contains the index of the next new item in the list. Used only by numbered lists. |\n| `numberedList` | A true value\
        \ indicates this is a numbered list. |\n| `parent` | <br><br>The parent hierarchy, which includes this information\
        \ for the parent list:  <br><br>*   `id`<br>*   `name`<br><br> |\n| `permittedItems` | Indicates how many more items\
        \ you can add to the existing list. This value changes when the number of items in the list change. |\n| `productionData`\
        \ | A true value indicates this is a production list in [Application Lifecycle Management (ALM)](https://help.anaplan.com/anapedia/Content/ALM/Application_Lifecycle_Management.htm).\
        \ |\n| `properties` | <br><br>The list properties, which include:  <br><br>*   `dataTags`<br>*   `format`<br>*   `formula`<br>*\
        \   `notes`<br>*   `referencedBy`<br><br> |\n| `subsets` | <br><br>A list of subsets associated with the list hierarchy,\
        \ which includes the following information for the parent list:  <br><br>*   `id`<br>*   `name`<br><br> |\n| `topLevelItem`\
        \ | If present, indicates the top level item in a hierarchy. |\n| `useTopLevelAsPageDefault` | A true value indicates\
        \ this list is the default item in a page selector. |\n| `workflowEnabled` | A true value indicates this list is enabled\
        \ for [Workflow](https://help.anaplan.com/anapedia/Content/Modeling/Manage_Models/Workflow.html). |\n\nIf any of the\
        \ metadata values are not set for a list (for example, no parent or no top level item), then the result omits the\
        \ metadata entry.\n\n**Notes**:\n\n*   To use this call, you must be a [Workspace Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html).\n\
        *   Use of this call may be rate limited. If you call too frequently, you may receive a `429` response.\n    \n\n\
        ### Request\n\n```\ncurl -X GET 'https://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/lists/{listId}'\
        \ \\\n-H 'Accept: application/json' \\\n-H 'Authorization: AnaplanAuthToken {anaplan_auth_token}' \\\n-H 'Content-Type:\
        \ application/json'\n```\n\n### Request headers\n\n| **Header** | **Details** |\n| --- | --- |\n| `Authorization:\
        \ AnaplanAuthToken {anaplan_auth_token}` | <br><br>*   Required<br>*   Description: the Anaplan authentication token<br><br>\
        \ |\n| `Accept: application/json` | <br><br>*   Required<br>*   Description: This indicates the preferred response\
        \ is `application/json` format.<br><br> |\n| `Content-Type: application/json` | <br><br>*   Optional<br>*   Description:\
        \ The endpoint uses a content type of `application/json`.<br><br> |\n\n### Request parameters\n\n| **Parameter** |\
        \ **Details** |\n| --- | --- |\n| `{workspaceId}` | <br><br>*   Required<br>*   Type: String<br>*   Description: The\
        \ workspace ID<br>*   Example: `8a8196b15b7dbae6015b8694411d13fe`<br><br> |\n| `{modelId}` | <br><br>*   Required<br>*\
        \   Type: String<br>*   Description: the ID for the model<br>*   Example: `75A40874E6B64FA3AE074327899685`<br><br>\
        \ |\n| `{listId}` | <br><br>*   Required<br>*   Type: string<br>*   Description: The list ID.<br>*   Example: `101000000001`<br><br>\
        \ |"
    parameters:
    - name: workspaceId
      in: path
      required: true
      schema:
        type: string
        pattern: ^[0-9a-f]{32}$
      example: 8a868cda7c8b28f5017c9a4b2d8341cd
