                  taskId: 2846F8E2FD624F7FA91EC6E2F6E318C0
                  currentStep: Complete.
                  progress: 1
                  result:
                    failureDumpAvailable: false
                    nestedResults:
                    - failureDumpAvailable: false
                      objectId: '117000000015'
                      successful: true
                    objectId: '118000000002'
                    successful: true
