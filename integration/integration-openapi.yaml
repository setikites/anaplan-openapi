        | **Parameter** | **Details** |
        | --- | --- |
        | `{modelId}` | <br><br>*   Required<br>*   Type: `String`<br>*   Description: the ID for the model<br>*   Example: `75A40874E6B64FA3AE0743278996850F`<br><br> |
        | `{lineItemId}` | <br><br>*   Required<br>*   Type: `Number`<br>*   Description: the line item ID<br>*   Example: `208000000000`<br><br> |
        | `{dimensionId}` | <br><br>*   Required<br>*   Type: `Number`<br>*   Description: the dimension ID<br>*   Example: `101000000028`<br><br> |
      tags:
      - Model Metadata
      - Line Item Metadata
      responses:
        '200':
          description: Response 200
          headers:
            Content-Type:
              schema:
                type: string
              example: application/json
          content:
            application/json:
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/objects/dimension
                status:
                  code: 200
                  message: Success
                items:
                - id: '220000000001'
                  name: England
                - id: '220000000002'
                  name: Wales
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Dimension'
    parameters:
    - name: modelId
      in: path
      description: Model identifier (32-character uppercase hex string).
      required: true
      schema:
        type: string
        pattern: ^[0-9A-F]{32}$
      example: 4261ECE4389B45E18915B5EB72F7510B
    - name: lineItemId
      in: path
