      description: "## Initiate large read request\n\nUse this call to initiate a large volume read request of view data.\
        \ This enables you to read data from views that are larger than a million cell count.\n\n**Note:**\n\n*   To use this\
        \ call, you must be a [Workspace Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html).\n\
        *   As a best practice, use the [Delete read requests](https://anaplanbulkapi20.docs.apiary.io/#DeleteReadRequestsVD)\
        \ call to clear all pages from completed exports as soon as you download all pages. Doing so will make space available\
        \ for future exports.\n    \n\n### Request supporting this feature\n\n* * *\n\n```\ncurl --location --request POST\
        \ 'https://api.anaplan.com/2/0/workspaces/2c9ba1b673981e510173d99b11722e1e/models/61F974EB186D40C1A66B7D309AD714B8/views/101000000000/readRequests/'\
        \ \\\n--header 'Authorization: AnaplanAuthToken AnaplanToken' \\\n--data-raw '{\n\"exportType\" : \"TABULAR_MULTI_COLUMN\"\
        \n}'\n\n```\n\n### Request Body\n\n* * *\n\nThis API supports exporting data in the following formats:\n\n| **Type**\
        \ | **Description** | **More information** |\n| --- | --- | --- |\n| `GRID_ALL_PAGES` | This layout respects the existing\
        \ sorting and filtering you have imposed on a data grid before you launch the export. | [Export grid](https://help.anaplan.com/Import_and_Export/Export_Layouts/Export_Data_in_Grid_Layout.html)\
        \ |\n| `TABULAR_SINGLE_ITEMS` | This layout takes all dimensions and puts them in columns, with the final column reserved\
        \ for data. | [Export tabular single column](https://help.anaplan.com/Import_and_Export/Export_Layouts/Export_Data_in_Tabular_Single_Column_Layout.html)\
        \ |\n| `TABULAR_MULTI_COLUMN` | This layout enables you to export multiple data columns. If you set up a Boolean line\
        \ item, you can use it as a filter to control which data is exported. This is especially useful when exporting from\
        \ large modules. It saves the manual task of marking data cells for export. | [Export Tabular Multiple Column](https://help.anaplan.com/Import_and_Export/Export_Layouts/Export_Data_in_Tabular_Multiple_Column_Layout.html)\
        \ |\n\n```\n{\n    \"exportType\" : \"{TABULAR_SINGLE_ITEMS || TABULAR_MULTI_COLUMN || GRID_ALL_PAGES}\"\n}\n\n```\n\
        \n### Request headers\n\n* * *\n\n| **Header** | **Details** |\n| --- | --- |\n| `Authorization: AnaplanAuthToken\
        \ {anaplan_auth_token}` | <br><br>*   Required<br>*   Description: the Anaplan authentication token<br><br> |\n| `Content-Type:\
        \ application/json` | <br><br>*   Required<br>*   Description: This indicates the request format is `application/json`.<br><br>\
        \ |\n| `Accept: application/json` | <br><br>*   Optional<br>*   Description: This indicates the preferred response\
        \ is `application/json` format.<br><br> |\n\n### Request parameters\n\n* * *\n\n| **Parameters** | **Details** |\n\
        | --- | --- |\n| `{workspaceId}` | <br><br>*   Required in the first supported request (see Requests supporting this\
        \ feature)<br>*   Type: `String`<br>*   Description: The workspace ID<br>*   Example: `8a8196b15b7dbae6015b8694411d13fe`<br><br>\
        \ |\n| `{modelId}` | <br><br>*   Required<br>*   Type: `String`<br>*   Description: The model ID<br>*   Example: `75A40874E6B64FA3AE0743278996850F`<br><br>\
        \ |\n| `{viewId}` | <br><br>*   Required<br>*   Type: `Number`<br>*   Description: The view ID.<br>*   Example: `101000000001`<br><br>\
        \ |"
    parameters:
