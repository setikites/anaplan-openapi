    WriteCellDataResponse:
      type: object
      properties:
        numberOfCellsChanged:
          type: number
        failures:
          description: An array of cell write failures; empty when all cells updated successfully.
          type: array
          items:
            type: object
            properties:
              requestIndex:
                description: Index of the cell write request from the request array.
                type: number
              failureType:
                description: Failure reason.
                type: string
              failureMessageDetails:
                description: Details on the failure reason.
                type: string
    Period:
      properties:
        date:
          type: string
        periodText:
          type: string
    Task:
      description: A task tracking the execution of a process/import/export/action
      properties:
        creationTime:
          type: integer
          description: Task creation time in milliseconds since epoch
        currentStep:
          type: string
          description: Human-readable description of the current execution step
        progress:
          type: number
          description: Execution progress as a fraction (0.0–1.0); typically 1.0 on completion
        result:
          $ref: '#/components/schemas/TaskResult'
          description: Task result object, populated after the task reaches a terminal state (COMPLETE or CANCELLED). Absent
            while the task is NOT_STARTED or IN_PROGRESS.
        taskId:
          type: string
        taskState:
          description: Lifecycle state of the task
          enum:
          - NOT_STARTED
          - IN_PROGRESS
          - COMPLETE
          - CANCELLING
          - CANCELLED
    TaskResult:
      description: The result of a completed task
      properties:
        details:
          items:
            properties:
              localMessageText:
                type: string
              occurrences:
                type: integer
              type:
                type: string
              values:
                items:
                  type: string
                type: array
            type: object
          type: array
        duration:
          type: string
        failureDumpAvailable:
          type: boolean
          description: Whether a failure dump file was generated for this task. When true, the dump can be downloaded via
            the failure dump endpoint for this object type.
        nestedResults:
          items:
            $ref: '#/components/schemas/TaskResult'
          type: array
        objectId:
          type: string
          description: Numeric ID of the Anaplan object (import, export, process, or action) that this task executed against.
        objectName:
          type: string
          description: Display name of the Anaplan object that this task executed against.
        startTime:
          type: string
        successful:
          type: boolean
    TaskWithUrl:
      description: Initial task reference returned by POST .../tasks. Contains the taskId and a URL for polling status.
      properties:
        creationTime:
          type: integer
          description: Task creation time in milliseconds since epoch.
        taskId:
          type: string
          description: Unique identifier for the task; use this to poll GET .../tasks/{taskId}.
        taskState:
          enum:
          - NOT_STARTED
          - IN_PROGRESS
          - COMPLETE
          - CANCELLING
          - CANCELLED
          description: Lifecycle state of the task.
        taskUrl:
          type: string
          description: URL for polling task status via GET.
    Paging:
      type: object
      required:
      - currentPageSize
      - totalSize
      - offset
      properties:
        currentPageSize:
          type: integer
        totalSize:
          type: integer
        offset:
          type: integer
    Status:
      description: Response status object present in every Anaplan API response envelope. `code` is the Anaplan-specific status
        code (not the HTTP status code); `message` is the human-readable outcome.
      type: object
      properties:
        code:
          type: integer
          description: Anaplan API status code for this response. Distinct from the HTTP status code.
          example: 200
        message:
          type: string
          description: Human-readable description of the status outcome.
          example: Success
    Meta:
      description: Response metadata envelope present in paginated Anaplan API responses. `schema` is a URL to the JSON schema
        definition for the response body; `paging` holds cursor-based navigation state.
      type: object
      required:
      - schema
      properties:
        schema:
          type: string
          description: URL to the JSON schema definition for this response body. A URL string, not an inline JSON Schema object.
        paging:
          $ref: '#/components/schemas/Paging'
    DateRequest:
      properties:
        date:
          format: date
          type: string
      type: object
