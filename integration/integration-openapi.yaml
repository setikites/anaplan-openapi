        #### Parameters

        | **Parameter** | **Description** |
        | --- | --- |
        | `workspaceId` | <br><br>*   Required<br>*   Type: string<br>*   Description: The workspace ID<br>*   Example: `8a8b8c8d8e8f8g8i`<br><br> |
        | `modelId` | <br><br>*   Required<br>*   Type: string<br>*   Description: The model ID<br>*   Example: `75A40874E6B64FA3AE0743278996850F`<br><br> |
        | `importId` | <br><br>*   Required<br>*   Type: number<br>*   Description: The model ID<br>*   Example: `112000000007`<br><br> |

        #
      tags:
      - Model Metadata
      - Action Metadata
      parameters:
      - name: sort
        in: query
        description: 'Sort order for the task list. Format: [prefix]field where prefix is - (descending), + (ascending), or
          omitted (ascending). Documented sortable fields: creationDate, taskId, taskState, progress. Example: -creationDate
          (newest first), +taskId, taskState. The API does not validate the field name — unknown fields are silently accepted
          and appear to fall back to default ordering.'
        required: false
        schema:
          type: string
        example: -creationDate
      responses:
        '200':
          description: Response 200
          content:
            application/json:
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/models/F1111111C11111111B11111F1111E11F/objects/task
                status:
                  code: 200
                  message: Success
                task:
                  taskId: 9530E1C5CAEB440DAC4E669178787160
                  taskState: COMPLETE
                  creationTime: 1535145471641
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  task:
                    $ref: '#/components/schemas/Task'
    parameters:
    - name: workspaceId
      in: path
      description: Workspace identifier (32-character lowercase hex string).
      required: true
      schema:
        type: string
        pattern: ^[0-9a-f]{32}$
      example: 8a868cda7c8b28f5017c9a4b2d8341cd
    - name: modelId
      in: path
      description: Model identifier (32-character uppercase hex string).
      required: true
      schema:
        type: string
        pattern: ^[0-9A-F]{32}$
      example: 4261ECE4389B45E18915B5EB72F7510B
    - name: importId
      in: path
      required: true
      schema:
        type: string
      example: '{{importId}}'
    post:
      summary: Start the import
      description: |-
        ## Start the import

        `/workspaces/{workspaceId}/models/{modelId}/imports/{importId}/tasks/`

        You start the import using the POST command. This also receives the task ID value as a JSON object. Once you have started the import, you can use GET to receive a list of the import tasks as a JSON array. You can use this to monitor the status of the import tasks.

        **Note:** If GET does not return any tasks, the import is not running or might have completed. Tasks sort in ascending order of creation time, with the newest task at the top of the list. To sort in descending order, append `?sort =- creationTime` to the URL.

        ### Run the import

        *   Request


        ```
        curl -X POST \
        https://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/imports/{importId}/tasks \
        -H 'authorization: AnaplanAuthToken {anaplan_auth_token}' \
        -H "Content-Type:application/json" \
        -d "{\"localeName\": \"en_US\"}"
        ```

        #### Request headers

        | **Header** | **Details** |
        | --- | --- |
        | `Authorization:AnaplanAuthToken {anaplan_auth_token}` | <br><br>*   Required<br>*   Description: The Anaplan authentication token<br><br> |
        | `Content-Type:application/json` | <br><br>*   Required<br>*   Description: Specifies the content type as `application/json`<br><br> |

        #### Request Parameters

        | **Parameter** | **Description** |
        | --- | --- |
        | `workspaceId` | <br><br>*   Required<br>*   Type: string<br>*   Description: The workspace ID<br>*   Example: `8a8b8c8d8e8f8g8i`<br><br> |
        | `modelId` | <br><br>*   Required<br>*   Type: string<br>*   Description: The model ID<br>*   Example: `75A40874E6B64FA3AE0743278996850F`<br><br> |
        | `importId` | <br><br>*   Required<br>*   Type: number<br>*   Description: The model ID<br>*   Example: `112000000007`<br><br> |

        #### Request Body

        | **Body** | **Description** |
        | --- | --- |
        | `{"localeName": "en_US"}` | <br><br>*   Required<br>*   Description: Specifies the language to use for task status and error messages. `en_US` is the only supported language type.<br><br> |

        #
      tags:
      - Bulk Write
      responses:
        '200':
          description: Response 200
          content:
            application/json:
              example:
                taskId: 5E6331685CC648A29B725923B8FAEA1C
