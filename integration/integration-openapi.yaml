      example: '{{versionId}}'
  /models/{modelId}/currentPeriod:
    put:
      summary: Set current period
      description: |-
        ## Set current period

        `/workspaces/{workspaceId}/models/{modelId}/currentPeriod`

        Use this call to change or reset the current period in Anaplan. When this call contains a specified date (for example, 2020-05-20), the API determines what period range contains the specified data and sets that range as the current period.  When the date value is set to blank in this call, the API resets the current period to blank.

        **Warning**: A change to your time settings is a potentially destructive action and may lead to data loss.  The new range of time periods may not include previous time periods. Any data in the removed time periods is deleted from the model.

        **Notes**:

        *   To use this call, you must be a [Workspace Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html)
        *   Use of this call may be rate limited. If you call too frequently, you may receive a `429` response


        ### Request

        ```
        curl -X PUT https://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/currentPeriod\
        -H 'Accept: application/json' \
        -H 'Authorization: AnaplanAuthToken {anaplan_auth_token}' \
        -H 'Content-Type: application/json'

        ```

        ### Request headers

        | **Header** | **Details** |
        | --- | --- |
        | `Authorization: AnaplanAuthToken {anaplan_auth_token}` | <br><br>*   Required<br>*   Description: the Anaplan authentication token<br><br> |
        | `Accept: application/json` | <br><br>*   Required<br>*   Description: This indicates the preferred response is `application/json` format.<br><br> |
        | `Content-Type: application/json` | <br><br>*   Required<br>*   Description: This indicates the call uses a content type of `application/json`.<br><br> |

        ### Request parameter

        | **Parameter** | **Details** |
        | --- | --- |
        | `{workspaceId}` | <br><br>*   Required<br>*   Type: String<br>*   Description: The workspace ID<br>*   Example: `8a8196b15b7dbae6015b8694411d13fe`<br><br> |
        | `{modelId}` | <br><br>*   Required<br>*   Type: String<br>*   Description: the ID for the model<br>*   Example: `75A40874E6B64FA3AE074327899685`<br><br> |

        ### Request body

        | **Body** | **Details** |
        | --- | --- |
        | `{date}` | <br><br>*   Required<br>*   Type: String<br>*   Description: The date to use to set, or reset, the current period. The date format is YYYY-MM-DD.  <br>    If the `date` parameter is left blank (for example, `/currentperiod?date=`) the current period resets.  <br>    If the date is not provided in the YYYY-MM-DD format, the call returns a `400 Bad Request` response with this message: `Invalid ISO date format '{date}'. Date should match format YYYY-MM-DD`  <br>    If this value falls outside of a valid range, the call returns a `400 Bad Request` response with this message: `Specified date '{date}' is out of timescale range {start of timescale} - {end of timescale}`.<br>*   Example: 2010-05-20<br><br> |

        ### Example of request body

        ```
        {
               "date":"2020-05-20"
            }

        ```
      tags:
      - Transactional Write
      parameters:
      - name: date
        in: query
        description: The date used to set the current period (YYYY-MM-DD). Leave blank (?date=) to reset the current period.
          Accepted as either a query parameter or a request body field, but not both simultaneously. Returns 400 if the format
          is invalid or the date falls outside the model timescale.
        required: false
        schema:
          type: string
          format: date
          pattern: ^\d{4}-\d{2}-\d{2}$
        example: '2020-05-20'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Schema2'
            example:
              date: '2020-07-03'
      responses:
        '200':
          description: Response 200
          headers:
            Content-Type:
              schema:
                type: string
              example: application/json
          content:
            application/json:
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/objects/currentPeriod
                status:
                  code: 200
                  message: Success
                currentPeriod:
                  periodText: May 20
                  lastDay: '2020-05-31'
                  calendarType: Calendar Months/Quarters/Years
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  currentPeriod:
                    $ref: '#/components/schemas/CurrentPeriod'
        '429':
          description: more detail in path description
        '400':
          description: 'Bad request. Occurs when: (1) the date is not in YYYY-MM-DD format — "Invalid ISO date format ''{date}''.
            Date should match format YYYY-MM-DD"; (2) the date falls outside the model timescale — "Specified date ''{date}''
            is out of timescale range {start} - {end}"; (3) date is supplied as both a query parameter and a request body
            field simultaneously.'
    parameters:
    - name: modelId
      in: path
      description: Model identifier (32-character uppercase hex string).
      required: true
      schema:
        type: string
        pattern: ^[0-9A-F]{32}$
      example: 4261ECE4389B45E18915B5EB72F7510B
    get:
      summary: Get current period (model-scoped)
      tags:
      - Model Settings
      responses:
        '200':
          description: Response 200
          content:
            application/json:
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/objects/currentPeriod
                status:
                  code: 200
                  message: Success
                currentPeriod:
                  periodText: May 20
                  lastDay: '2020-05-31'
                  calendarType: Calendar Months/Quarters/Years
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  currentPeriod:
                    $ref: '#/components/schemas/CurrentPeriod'
  /models/{modelId}/modelCalendar/fiscalYear:
    put:
      summary: Update current fiscal year
      description: |-
        ## Update current fiscal year

        `/workspaces/{workspaceId}/models/{modelId}/modelCalendar/fiscalYear`

        Use this call to update the current fiscal year for the model calendar. The year input value has to be a valid fiscal year supported by the model calendar in Anaplan. If successful, this call returns the updated fiscal year with start and end date associated with current model calendar type. This call returns a `400 bad request` message if the input value is out of range or model calendar type does not have an available fiscal year (for example, Weeks General).

        ### Request

        ```
        curl -X PUT 'https://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/modelCalendar/fiscalYear' \
        -H 'Authorization: AnaplanAuthToken {anaplan_auth_token}' \
        -H 'Accept: application/json' \
        -H 'Content-Type: application/json' \
        --data-raw '{
            "year": "{fiscal year}"
        }'
        ```

        ### Request headers

        | **Header** | **Details** |
        | --- | --- |
        | `Authorization: AnaplanAuthToken {anaplan_auth_token}` | <br><br>*   Required<br>*   Description: the Anaplan authentication token<br><br> |
        | `Accept: application/json` | <br><br>*   Optional<br><br> |
        | `Content-Type: application/json` | <br><br>*   Required<br><br> |

        ### Request parameters

        | **Parameter** | **Details** |
        | --- | --- |
        | `{workspaceId}` | <br><br>*   Required<br>*   Type: String<br>*   Description: The workspace ID<br>*   Example: `8a8196b15b7dbae6015b8694411d13fe`<br><br> |
        | `{modelId}` | <br><br>*   Required<br>*   Type: String<br>*   Description: the model ID<br>*   Example: `75A40874E6B64FA3AE074327899685`<br><br> |

        ### Example: Out of range error

        Input value for `year`

        ```
        {
            "year": "FY40"
        }

        ```

        Response

        ```
        {
            "status": {
                "code": 400,
                "message": "Specified year is out of range: 2040"
            }
        }

        ```
      tags:
      - Transactional Write
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                year:
                  type: string
                  format: utc-millisec
            example:
              year: '2020'
      responses:
        '200':
          description: Response 200
          headers:
            Content-Type:
              schema:
                type: string
              example: application/json
          content:
            application/json:
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/objects/modelCalendar
                status:
                  code: 200
                  message: Success
                modelCalendar:
                  fiscalYear:
                    year: FY21
                    startDate: '2021-01-01'
                    endDate: '2021-12-31'
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  modelCalendar:
                    $ref: '#/components/schemas/ModelCalendar'
    parameters:
