        \   Example: `8a8b8c8d8e8f8g8i`<br><br> |\n| `modelId` | <br><br>*   Required<br>*   Type: string<br>*   Description:\
        \ The model ID<br>*   Example: `75A40874E6B64FA3AE0743278996850F`<br><br> |\n| `fileId` | <br><br>*   Required<br>*\
        \   Type: number<br>*   Description: The file ID<br>*   Example: `113000000002`<br><br> |\n\n#"
    parameters:
