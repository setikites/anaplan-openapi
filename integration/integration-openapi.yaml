  /models/{modelId}/versions/{versionId}/switchover:
    put:
      summary: Set version switchover date
      description: |-
        ## Set version switchover date

        `/models/{modelId}/versions/{versionId}/switchover`

        Use this call to set the switchover date for a version. The response contains the response code, as well as the date and human-readable date period as shown in the UI.

        **Notes:**

        *   To use this call, you must be a [Workspace Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html).
        *   To apply a switchover date, ensure the `versionID` corresponds to a version in Anaplan that is set to either `forecast` or `variance`.
        *   Ensure the switchover date is after the existing version switchover date.
        *   To reset the switchover date to Blank, pass an empty string in the request body.
        *   In the future, use of this call may be rate limited.


        ### Request

        ```
        curl -X PUT 'https://api.anaplan.com/2/0/models/{modelId}/versions/{versionId}/switchover' \
        -H 'Authorization: AnaplanAuthToken {anaplan_auth_token}' \
        -H 'Accept: application/json' \
        -H 'Content-Type: application/json' \
        -d '{"date":"{newSwitchoverDate}"}'
        ```

        ### Request body

        ```
        {
            "date" : "{date}"
        }

        ```

        | **JSON element** | **Details** |
        | --- | --- |
        | `date` | <br><br>*   Required<br>*   Description: An ISO-formatted (YYYY-MM-DD) date string is used to set the switchover date. An empty string resets the switchover date.  <br>    Dates earlier than the current switchover date (for example, `2021-01-01` when the current switchover is `2021-06-01`) or dates outside the current model year return a `400 Bad Request` response.<br>*   Example: `2021-06-01`<br><br> |

        ### Request headers

        | **Header** | **Details** |
        | --- | --- |
        | `Authorization: AnaplanAuthToken {anaplan_auth_token}` | <br><br>*   Required<br>*   Description: the Anaplan authentication token<br><br> |
        | `Content-Type: application/json` | <br><br>*   Required<br>*   Description: This indicates the request format is `application/json`.<br><br> |
        | `Accept: application/json` | <br><br>*   Required<br>*   Description: This indicates the preferred response is either `application/json` format. Note that this call only outputs in `application/json` format.<br><br> |

        ### Request parameters

        | **Parameter** | **Details** |
        | --- | --- |
        | `{modelId}` | <br><br>*   Required<br>*   Type: String<br>*   Description: the model ID<br>*   Example: `75A40874E6B64FA3AE074327899685`<br><br> |
        | `{versionId}` | <br><br>*   Required<br>*   Type: String<br>*   Description: the version ID. The ID of the actual version returns a `400 Bad Request` response<br>*   Example: `107000000002`<br><br> |

        ### Response header

        `Content-Type: application/json`
      tags:
      - Transactional Write
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Schema2'
            example:
              date: '2021-06-03'
      responses:
        '200':
          description: Response 200
          content:
            application/json:
