  /workspaces/{workspaceId}/models/{modelId}/lists/{listId}:
    get:
      summary: Retrieve list metadata
      description: |-
        ## Retrieve list metadata

        `/workspaces/{workspaceId}/models/{modelId}/lists/{listId}`

        Use this call to retrieve the following metadata for a specified list:

        | **Metadata** | **Description** |
        | --- | --- |
        | `category` | The category to which the list is assigned. |
        | `dataTags` | The data tags associated with the list. |
        | `hasSelectiveAccess` | If the value is true, this list uses [selective access](https://help.anaplan.com/anapedia/Content/Modeling/Users/Selective_Access.html). |
        | `id` | The list ID.  This corresponds to the `listId` parameter. |
        | `itemCount` | The number of list items present in the list. |
        | `managedBy` | Not currently used. |
        | `name` | The list name. |
        | `nextitemIndex` | Contains the index of the next new item in the list. Used only by numbered lists. |
        | `numberedList` | A true value indicates this is a numbered list. |
        | `parent` | <br><br>The parent hierarchy, which includes this information for the parent list:  <br><br>*   `id`<br>*   `name`<br><br> |
        | `permittedItems` | Indicates how many more items you can add to the existing list. This value changes when the number of items in the list change. |
        | `productionData` | A true value indicates this is a production list in [Application Lifecycle Management (ALM)](https://help.anaplan.com/anapedia/Content/ALM/Application_Lifecycle_Management.htm). |
        | `properties` | <br><br>The list properties, which include:  <br><br>*   `dataTags`<br>*   `format`<br>*   `formula`<br>*   `notes`<br>*   `referencedBy`<br><br> |
        | `subsets` | <br><br>A list of subsets associated with the list hierarchy, which includes the following information for the parent list:  <br><br>*   `id`<br>*   `name`<br><br> |
        | `topLevelItem` | If present, indicates the top level item in a hierarchy. |
        | `useTopLevelAsPageDefault` | A true value indicates this list is the default item in a page selector. |
        | `workflowEnabled` | A true value indicates this list is enabled for [Workflow](https://help.anaplan.com/anapedia/Content/Modeling/Manage_Models/Workflow.html). |

        If any of the metadata values are not set for a list (for example, no parent or no top level item), then the result omits the metadata entry.

        **Notes**:

        *   To use this call, you must be a [Workspace Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html).
        *   Use of this call may be rate limited. If you call too frequently, you may receive a `429` response.


        ### Request

        ```
        curl -X GET 'https://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/lists/{listId}' \
        -H 'Accept: application/json' \
        -H 'Authorization: AnaplanAuthToken {anaplan_auth_token}' \
        -H 'Content-Type: application/json'
        ```

        ### Request headers

        | **Header** | **Details** |
        | --- | --- |
        | `Authorization: AnaplanAuthToken {anaplan_auth_token}` | <br><br>*   Required<br>*   Description: the Anaplan authentication token<br><br> |
        | `Accept: application/json` | <br><br>*   Required<br>*   Description: This indicates the preferred response is `application/json` format.<br><br> |
        | `Content-Type: application/json` | <br><br>*   Optional<br>*   Description: The endpoint uses a content type of `application/json`.<br><br> |

        ### Request parameters

        | **Parameter** | **Details** |
        | --- | --- |
        | `{workspaceId}` | <br><br>*   Required<br>*   Type: String<br>*   Description: The workspace ID<br>*   Example: `8a8196b15b7dbae6015b8694411d13fe`<br><br> |
        | `{modelId}` | <br><br>*   Required<br>*   Type: String<br>*   Description: the ID for the model<br>*   Example: `75A40874E6B64FA3AE074327899685`<br><br> |
        | `{listId}` | <br><br>*   Required<br>*   Type: string<br>*   Description: The list ID.<br>*   Example: `101000000001`<br><br> |
      tags:
      - Model Metadata
      - List Metadata
      responses:
        '200':
          description: Response 200
          headers:
            Content-Type:
              schema:
                type: string
              example: application/json
          content:
            application/json:
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/models/102B/objects/list
                status:
                  code: 200
                  message: Success
                metadata:
                  id: '101000000001'
                  name: Sales Reps
                  properties:
                  - name: Salesforce
                    format: TEXT
                    notes: ''
                    referencedBy: ''
                  - name: Mail
                    format: TEXT
                    notes: ''
                    referencedBy: ''
                  hasSelectiveAccess: false
                  parent:
                    id: '101000000000'
                    name: Organization
                  managedBy: ''
                  numberedList: false
                  useTopLevelAsPageDefault: false
                  itemCount: 1
                  workflowEnabled: false
                  productionData: false
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  metadata:
                    $ref: '#/components/schemas/List'
        '429':
          description: more detail in path description
    parameters:
    - name: workspaceId
      in: path
      description: Workspace identifier (32-character lowercase hex string).
      required: true
      schema:
        type: string
        pattern: ^[0-9a-f]{32}$
