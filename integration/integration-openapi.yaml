  /workspaces/{workspaceId}/models/{modelId}/modelCalendar:
    get:
      summary: Get current fiscal year
      description: |-
        ## Get current fiscal year

        `/workspaces/{workspaceId}/models/{modelId}/modelCalendar`

        Use this call to get the current fiscal year with the start and end date from the model calendar. The value of the start and end date is determined by the calendar type set in the model. This value is not always a range from Jan 1 to Dec 31. The API returns an empty value If the calendar type does not have an available fiscal year (for example, Weeks General).

        ### Request

        ```
        curl -X GET 'https://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/modelCalendar' \
        -H 'Authorization: AnaplanAuthToken {anaplan_auth_token}' \
        -H 'Accept: application/json'
        ```

        ### Request headers

        | **Header** | **Details** |
        | --- | --- |
        | `Authorization: AnaplanAuthToken {anaplan_auth_token}` | <br><br>*   Required<br>*   Description: the Anaplan authentication token<br><br> |
        | `Accept: application/json` | <br><br>*   Optional<br><br> |

        ### Request parameters

        | **Parameter** | **Details** |
        | --- | --- |
        | `{workspaceId}` | <br><br>*   Required<br>*   Type: String<br>*   Description: The workspace ID<br>*   Example: `8a8196b15b7dbae6015b8694411d13fe`<br><br> |
        | `{modelId}` | <br><br>*   Required<br>*   Type: String<br>*   Description: the model ID<br>*   Example: `75A40874E6B64FA3AE074327899685`<br><br> |

        ### Example 1: Calendar Type: weeks 4-4-5,4-5-4 or 5-4-4

        #### Model Calendar

        In Anaplan, the **Current Fiscal Year** in the **Model Calendar** is set to *FY21: 29 Mar 2020 - 27 Mar 2021*.

        #### Response

        ```
        {
            "meta": {
                "schema": "https://api.anaplan.com/2/0/objects/modelCalendar"
            },
            "status": {
                "code": 200,
                "message": "Success"
            },
            "modelCalendar": {
                "fiscalYear": {
                    "year": "FY21",
                    "startDate": "2020-03-29",
                    "endDate": "2021-03-27"
                }
            }
        }

        ```

        #### Example 2: Calendar Type: weeks general

        #### Model Calendar

        In Anaplan, the **Calendar Type** in the **Model Calendar** is set to *weeks general*.

        #### Response

        ```
        {
            "meta": {
                "schema": "https://api.anaplan.com/2/0/objects/modelCalendar"
            },
            "status": {
                "code": 200,
                "message": "Success"
            },
            "modelCalendar": {}
        }

        ```
      tags:
      - Model Metadata
      - Model Setting Metadata
      responses:
        '200':
          description: Response 200
          headers:
            Content-Type:
              schema:
                type: string
              example: application/json
          content:
            application/json:
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/objects/modelCalendar
                status:
                  code: 200
