openapi: 3.0.0
info:
  title: Official Anaplan Collection
  version: 1.0.0
  description: |-
    **Welcome to the Anaplan Integration v2 Official Postman Collection**

    **Organization**

    > This collection is organized into
    > logical groupings of requests. There are several common sequences of requests to achieve an outcome in Anaplan. The folders ending in "Flow" contain redundant requests organized sequentially.

    **Variables**

    > Collection level variables. These are set at the
    > collection level and are available within each request. These include elements
    > such as base URLs, model Id and workspace Id. Be sure to click "Save" when changing collection level variables.

    > Request specific variables. For variables
    > specific to a request, we have provided an array in the pre-request script area
    > for you to enter in request specific variables. These will be set prior to the
    > request running.

    **Authentication**

    > There are three methods provided to
    > authenticate into Anaplan. Once authenticated a Tests script sets the value of
    > the generated token to a variable named “anaplan_auth_token”. You may choose to
    > enter in username/password combination or conversely choose to generate CA
    > certificate signed string and public key combination.
