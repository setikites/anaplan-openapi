      description: "## Retrieve metadata for a process\n\n`/models/{modelId}/processes/{processId}`  \n\nUse this call to\
        \ retrieve the names and actions for a given Process in an Anaplan model.\n\n**Notes**:\n\n*   Actions which are imports\
        \ or exports (`actionType` field is `IMPORT` or `EXPORT`) contain additional fields in the response (see below). Other\
        \ actions just contain the `id`, `name`, and `actionType`.\n*   Actions are ordered in the sequence that they run\
        \ when the Process itself is executed.\n*   In the future, use of this call may be rate limited.\n*   For an action\
        \ with `actionType` of `IMPORT`, you can use the `importDataSourceId` value as the ID of a file for the `fileId` parameter\
        \ when you [upload or download files](https://anaplanbulkapi20.docs.apiary.io/#reference/upload-files)\n*   For actions\
        \ with `actionType` of `EXPORT` or `IMPORT`, you can find more information about them if you use the IDs as `exportId`\
        \ or `importId` in the [export](https://anaplanbulkapi20.docs.apiary.io/#reference/export) and [import](https://anaplanbulkapi20.docs.apiary.io/#reference/import)\
        \ metadata endpoints.\n*   The possible values for actionType (non-exhaustive list):\n    *   IMPORT\n    *   EXPORT\n\
        \    *   DELETE_BY_SELECTION\n    *   ORDER_HIERARCHY\n    *   OPTIMIZER\n*   To include additional information regarding\
        \ the import data source in an import action, add the `?showImportDataSource=true` query parameter to the request.\n\
        \    \n\n### Request\n\n```\ncurl -X GET 'https://api.anaplan.com/2/0/models/{modelId}/processes/{processId}' \\\n\
        -H 'Authorization: AnaplanAuthToken {anaplan_auth_token}'\\\n-H 'Accept: application/json'\n```\n\n### Request headers\n\
        \n| **Header** | **Details** |\n| --- | --- |\n| `Authorization: AnaplanAuthToken {anaplan_auth_token}` | <br><br>*\
        \   Required<br>*   Description: the Anaplan authentication token<br><br> |\n| `Accept: application/json` | <br><br>*\
        \   Optional<br>*   Description: This indicates the preferred response is either `application/json` format. Note that\
        \ this call only outputs in `application/json` format.<br><br> |\n\n### Request parameters\n\n| **Parameter** | **Details**\
        \ |\n| --- | --- |\n| `{modelId}` | <br><br>*   Required<br>*   Type: String<br>*   Description: the ID for the model<br>*\
        \   Example: `75A40874E6B64FA3AE0743278996850F`<br><br> |\n| `{processId}` | <br><br>*   Required<br>*   Type: Number<br>*\
        \   Description: the ID for the process<br>*   Example: `118000000001`<br>*   Note that you can get the process ID\
        \ from the list of process for a model API<br><br> |\n| `{showImportDataSource}` | <br><br>*   Optional<br>*   Type:\
        \ Boolean<br>*   Description: defines whether the response should include additional information regarding the import\
        \ data source. The field is interpreted as `false` if anything other than `true` is specified.<br>*   Example: `?showImportDataSource=true`<br><br>\
        \ |"
    parameters:
    - name: modelId
      in: path
      required: true
      schema:
        type: string
        pattern: ^[0-9A-F]{32}$
      example: 4261ECE4389B45E18915B5EB72F7510B
      description: Model identifier (32-character uppercase hex string).
    - name: processId
      in: path
      required: true
      schema:
        type: string
      example: '{{processId}}'
