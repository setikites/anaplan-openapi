  /workspaces/{workspaceId}/models/{modelId}/views:
    get:
      summary: Retrieve IDs and names for all views in a model
      description: |-
        ## Retrieve IDs and names for all views in a model

        `/models/{modelId}/views`

        Use this call to retrieve the ID and name of all views for a model. The results include default and saved views. If you add the query parameter `includesubsidiaryviews=true`, this includes unsaved subsidiary views in the results. This call also retrieves the ID of the module that the views belong to.

        **Notes**:

        *   To use this call, you must be a [Workspace Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html)
        *   Single quotes enclose the module and view names that have special characters
        *   Use of this call may be rate limited. If you call too frequently, you may receive a `429` response


        ### Default views

        For default views:

        *   The value of the {viewId} is identical to the value of the {moduleId}
        *   The value of the name is identical to the value of the module


        ### Saved views

        For saved views:

        *   The `name` consists of the module name, a period, and the saved view name. For example, `REP01 Profit & Loss Report.P & L by Country`


        For unsaved subsidiary views:

        *   The name consists of the module name and the line item name that the subsidiary view is created from
        *   These are separated by a period(.)


        ### Request

        ```
        curl -X GET
        'https://api.anaplan.com/2/0/models/{modelId}/views' \
        -H 'Authorization: AnaplanAuthToken {anaplan_auth_token}' \
        -H 'Accept: application/json'
        ```

        ### Request headers

        | **Header** | **Details** |
        | --- | --- |
        | `Authorization: AnaplanAuthToken {anaplan_auth_token}` | <br><br>*   Required<br>*   Description: the Anaplan authentication token<br><br> |
        | `Accept: application/json` | <br><br>*   Required<br>*   Description: This indicates the preferred response is `application/json` format.<br><br> |

        ### Request parameters

        | **Parameter** | **Details** |
        | --- | --- |
        | `{modelId}` | <br><br>*   Required<br>*   Type: String<br>*   Description: the ID for the model<br>*   Example: `75A40874E6B64FA3AE074327899685`<br><br> |

        ### Query parameter

        | **Parameter** | **Details** |
        | --- | --- |
        | `{includesubsidiaryviews}` | <br><br>*   Optional (default false)<br>*   Type: String<br>*   Description: Whether the response should include unsaved subsidiary views. The field is interpreted as false if anything other than `true` is specified<br>*   Example: `?includesubsidiaryviews=true`<br><br> |

        ### Response header

        `Content-Type: application/json`
      tags:
      - Model Metadata
      - Module & Saved View Metadata
      parameters:
      - name: includesubsidiaryviews
        in: query
        description: When set to "true", includes unsaved subsidiary views in the results. Any value other than "true" is
          interpreted as false.
        schema:
          type: string
        example: 'true'
      responses:
        '200':
          description: Response 200
          content:
            application/json:
              example:
                meta:
                  paging:
