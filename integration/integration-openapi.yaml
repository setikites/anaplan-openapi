  /2/0/models/{modelId}/modules/{moduleId}/data:
    post:
      summary: Write cell data by coordinate to module
      parameters: []
      responses:
        '200':
          description: 'TODO: document response'
      tags:
      - Transactional Write
      description: "## Write cell data by coordinate to module\n\n`/models/{modelId}/modules/{moduleId}/data`  \n\nUse this\
        \ call to set cell values in a module.\n\nEnsure the request body is an array of `CellWrite` objects. Each object\
        \ is for an updated individual cell and its full set of dimensions.\n\nThe response contains a summary of the number\
        \ of cells updated successfully and the details of why some cells that could not be updated.\n\n**Notes:**\n\n*  \
        \ Ensure the user has write access enabled.\n*   Ensure the request includes all of the required fields.\n*   Ensure\
        \ the request has a `value` field that is either a string, number or boolean and is compatible with the line item\
        \ format/data type.\n*   If one cell cannot update, the other cells in the request still continue to update.\n*  \
        \ To use this call, you must be a [Workspace Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html).\n\
        *   Workspace administrators can import data into any cell (except aggregate cells, see below), including read-only\
        \ and invisible cells.\n*   You can update a maximum of 1000 cells per request. For larger scale writes we recommend\
        \ you use the [import API](https://anaplanbulkapi20.docs.apiary.io/#reference).\n*   Write cell data does not apply\
        \ to aggregate cells.\n    *   An aggregate cell is a cell where one of its dimension items has it’s own child items\n\
        \    *   This includes aggregate cells for line Items with breakback enabled\n    *   For a line Item that is dimensioned\
        \ by a composite list, the only writeable cells are the child items, that are defined directly in the dimension list\
        \ and not defined in a parent list.\n*   In the future, use of this call may be rate limited.\n    \n\n## Request\n\
        \n```\ncurl -X POST 'https://api.anaplan.com/2/0/models/{modelId}/modules/{moduleId}/data' \\\n-H 'Authorization:\
        \ AnaplanAuthToken {anaplan_auth_token}'\\\n-H 'Accept: application/json'-H 'Content-Type: application/json'--data-raw\
        \ ''\n```\n\n## Request Body\n\nAn example request body using IDs:\n\n```\n[\n    {\n      \"lineItemId\": \"206000000000\"\
        ,\n      \"dimensions\": [\n          { \"dimensionId\": \"101000000001\", \"itemId\": \"202000000001\" },\n     \
        \     { \"dimensionId\": \"20000000003\", \"itemId\": \"5438300031\" },\n          { \"dimensionId\": \"20000000020\"\
        , \"itemId\": \"107000000001\" }\n      ],\n      \"value\": 1111\n    },\n    {\n      \"lineItemId\": \"206000000001\"\
        ,\n      \"dimensions\": [\n          { \"dimensionId\": \"101000000001\", \"itemId\": \"202000000001\" },\n     \
        \     { \"dimensionId\": \"20000000003\", \"itemId\": \"5438300031\" },\n          { \"dimensionId\": \"20000000020\"\
        , \"itemId\": \"107000000001\" }\n      ],\n      \"value\": \"Some text value\"\n    }\n]\n\n\n```\n\nAn example\
        \ request body using names:\n\n```\n[\n    {\n      \"lineItemName\": \"Products\",\n      \"dimensions\": [\n   \
        \       { \"dimensionName\": \"Product\", \"itemCode\": \"SKU1234\" },\n          { \"dimensionName\": \"Time\", \"\
        itemName\": \"Jan 21\" },\n          { \"dimensionName\": \"Version\", \"itemName\": \"Actual\" }\n      ],\n    \
        \  \"value\": 1111\n    },\n    {\n      \"lineItemName\": \"Sales\",\n      \"dimensions\": [\n          { \"dimensionName\"\
        : \"Region\", \"itemName\": \"UK\" },\n          { \"dimensionName\": \"Time\", \"itemName\": \"Dec 21\" },\n    \
        \      { \"dimensionName\": \"Version\", \"itemName\": \"Forecast\" }\n      ],\n      \"value\": \"Some text value\"\
        \n    }\n]\n\n```\n\n### The `CellWrite` Object\n\nEach `CellWrite` Object is a request to set a value in a cell.\
        \ A cell is identified by the line item it belongs to as well as an item for each of the dimensions that apply to\
        \ the line item (this includes **Time** and **Versions**).\n\nThis table details the fields that are in a cell write\
        \ object:\n\n| **Field** | **Details** |\n| --- | --- |\n| `lineItemId` | <br><br>*   Required<br>*   Ensure you specify\
        \ a `lineItemId` or `lineItemName` Description: The ID of the line item that belongs to the module<br><br> |\n| `lineItemName`\
        \ | <br><br>*   Ensure you specify a `lineItemId` or `lineItemName`<br>*   Description: The name of the line item\
        \ that belongs to the module<br><br> |\n| `dimensions` | <br><br>*   This field can be omitted if the line item is\
        \ a single cell without any dimensions applied to it.<br>*   Description: An array of dimension coordinates<br><br>\
        \ |\n| `dimensionId` | <br><br>*   Required  <br>    Ensure you specify a `dimensionId` or `dimensionName`<br>*  \
        \ Description: The ID of the dimension that is on the line item<br><br> |\n| `dimensionName` | <br><br>*   Ensure\
        \ you specify a `dimensionId` or `dimensionName`<br>*   Description: The name of the dimension that is on the line\
        \ item<br><br> |\n| `itemId` | <br><br>*   Required<br>*   Description: The ID of the dimension item that is on the\
        \ dimension<br><br> |\n| `itemName` | <br><br>*   Ensure you specify a `itemId`, `itemName` or `itemCode`<br>*   Description:\
        \ The name of the item on the dimension<br><br> |\n| `itemCode` | <br><br>*   Ensure you specify a `itemId`, `itemName`\
        \ or `itemCode`<br>*   Description: The name of the item on the dimension<br><br> |\n| `value` | <br><br>*   Required<br>*\
        \   Description: The value to set for the cell<br>*   Cannot be `null`<br><br> |"
    parameters:
    - name: modelId
      in: path
      required: true
      schema:
        type: string
        pattern: ^[0-9A-F]{32}$
      example: 4261ECE4389B45E18915B5EB72F7510B
      description: Model identifier (32-character uppercase hex string).
    - name: moduleId
      in: path
      required: true
      schema:
        type: string
      example: '{{moduleId}}'
  /2/0/workspaces/{workspaceId}/models/{modelId}/lists/{listId}/items:
    post:
      summary: Add list items
      parameters:
      - name: action
        in: query
        schema:
          type: string
        example: add
      responses:
        '200':
          description: Response 200
          content:
            application/json:
              example:
                meta:
                  schema: https://anaplan.api.com/2/0/objects/item
                status:
                  code: 200
                  message: Success
                added: 1
                ignored: 1
                total: 2
                failures:
                - requestIndex: 1
                  failureType: INCORRECT_FORMAT
                  failureMessageDetails: incorrect format -- column name:p-number, value:wrong value for number
      tags:
      - Transactional Write
      description: "## Add list items\n\n`/workspaces/{workspaceId}/models/{modelId}/lists/{listId}/items?action=add'`\n\n\
        Use this call to add items to a list. You must provide the list ID and data for each item. You can add one or more\
        \ items in each request.\n\n**Notes:**\n\n*   To use this call, you must be a [Workspace Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html).\n\
        *   A maximum of 100,000 list items can be added with a single call.\n    \n\n### Requests that support this feature\n\
        \n```\ncurl -X POST 'https://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/lists/{listId}/items?action=add'\
        \ \\\n-H 'Authorization: AnaplanAuthToken {anaplan_auth_token}' \\\n-H 'Content-Type: application/json' \\\n-H 'Accept:\
        \ application/json'\n```\n\n### Request headers\n\n| **Header** | **Details** |\n| --- | --- |\n| `Authorization:\
        \ AnaplanAuthToken {anaplan_auth_token}` | <br><br>*   Required<br>*   Description: the Anaplan authentication token<br><br>\
        \ |\n| `Content-Type: application/json` | <br><br>*   Required<br>*   Description: This indicates the request format\
        \ is `application/json`.<br><br> |\n| `Accept: application/json` | <br><br>*   Required<br>*   Description: This indicates\
        \ the preferred response is either `application/json` format. Note that this call only outputs in `application/json`\
        \ format.<br><br> |\n\n### Request parameters\n\n| **Parameter** | **Details** |\n| --- | --- |\n| `{workspaceId}`\
        \ | <br><br>*   Required<br>*   Type: String<br>*   Description: The workspace ID<br>*   Example: `8a8196b15b7dbae6015b8694411d13fe`<br><br>\
        \ |\n| `{modelId}` | <br><br>*   Required<br>*   Type: String<br>*   Description: the model ID<br>*   Example: `75A40874E6B64FA3AE074327899685`<br><br>\
        \ |\n| `{listId}` | <br><br>*   Required<br>*   Type: Number<br>*   Description: the list ID<br>*   Example: `101000000001`<br><br>\
        \ |\n| `action=add` | <br><br>*   Required<br>*   Type: query parameter<br>*   Description: The Anaplan Add action.\
        \ This query parameter must be included in the URL as shown in the Requests section above.<br>*   Example: `action=addRequest`<br><br>\
        \ |\n\n### Request body\n\n| **List Data** | **Description** |\n| --- | --- |\n| `{name}` | The name value for the\
        \ item in the list. |\n| `{code}` | The code value for the item in the list. |\n| `{parent}` | The name of the parent\
        \ item in the list |\n| `{properties}` | The value of each custom list property. |\n| `{subsets}` | The value of each\
        \ custom list subset. |\n\nExample:\n\n```\n{\n  \"items\": [\n    {\n      \"name\": \"mike\",\n      \"code\": \"\
        id1\",\n      \"parent\": \"west\",\n      \"properties\": {\n        \"p-text\":\"hello world\",\n        \"p-number\"\
        :\"123456\",\n        \"p-boolean\": \"true\",\n        \"p-list\": \"east\",\n        \"p-period\": \"Sep 20\"\n\
        \      },\n    \"subsets\": {\n      \"s11\": true\n    }\n  },\n    {\n      \"name\": \"cindy\",\n      \"code\"\
        : \"id2\",\n      \"properties\": {\n        \"p-text\":\"hello world\",\n        \"p-number\":\"wrong format for\
        \ number\",\n        \"p-boolean\": \"true\",\n        \"p-list\": \"east\",\n        \"p-period\": \"Sep 20\"\n \
        \     },\n      \"subsets\": {\n        \"s11\": true\n      }\n    }\n  ]\n}\n\n```\n\n### Logic for add items\n\n\
        The add list items behavior uses specific logic with names and codes. This logic varies between [general lists](https://help.anaplan.com/f7f01453-71bc-4046-935a-b9d7cb47d15a-General-Lists)\
        \ and [numbered lists](https://help.anaplan.com/54b75174-848f-482b-a051-a9a063ece50c-Numbered-Lists) in Anaplan.\n\
        \n#### Add items to a general list\n\n| **Scenario** | **Existing** | **Input in API** | **Behavior** | **Result**\
        \ |\n| --- | --- | --- | --- | --- |\n| Add a new list Item | There are no existing items | name=n1  <br>code=c1 |\
        \ Success.  <br>A new list item is created. | name=n1  <br>code=c1 |\n| Add list item with name conflicts | name=n1\
        \  <br>code=c1 | name=n1  <br>code=c2 | There is a duplicate name. A new list item is not added. | An error message\
        \ returns. |\n| Add list item with code conflicts | name=n1  <br>code=c1 | name=n2  <br>code=c1 | There is a duplicate\
        \ name. A new list item is not added. | An error message returns. |\n| Add list item without name | There are no existing\
        \ items | code=c1 | There is a missing name. A new list item is not added. | An error message returns. |\n\n#### Add\
        \ items to a numbered list\n\nFor a numbered list, the name column is used for the index. The name is automatically\
        \ generated. When you add an item, the API does not allow a name as an input.\n\n| **Scenario** | **Existing** | **Input\
        \ in API** | **Behavior** | **Result** |\n| --- | --- | --- | --- | --- |\n| Add a new list Item | There are no existing\
        \ items | name=n1  <br>code=c1 | A name is not a valid input. A new list item is not added. | An error message returns.\
        \ |\n| Add a new list item | There are no existing items | code=c1 | Success.  <br>A new item is added. | success\
        \ code=c1 |\n| Add a list item with a conflicting code | code=c1 | code=c1 | There is a duplicate code. A new list\
        \ item is not added. | An error message returns. |"
    parameters:
    - name: workspaceId
      in: path
      required: true
      schema:
        type: string
        pattern: ^[0-9a-f]{32}$
      example: 8a868cda7c8b28f5017c9a4b2d8341cd
      description: Workspace identifier (32-character lowercase hex string).
    - name: modelId
      in: path
      required: true
      schema:
        type: string
        pattern: ^[0-9A-F]{32}$
      example: 4261ECE4389B45E18915B5EB72F7510B
      description: Model identifier (32-character uppercase hex string).
