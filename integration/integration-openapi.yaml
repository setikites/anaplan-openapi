                type: object
                properties:
                  meta:
                    type: object
                  status:
                    type: object
                  file:
                    $ref: '#/components/schemas/File'
      tags:
      - Bulk Write
      description: "## Set the Chunk Count\n\n`/workspaces/{workspaceId}/models/{modelId}/files/{fileId}`  \n\nTo upload a\
        \ file, we recommend setting the `chunkcount` metadata of an upload so that the server knows how many chunks to process\
        \ during an upload. Set the `chunkcount` to -1 if you do not know how many chunks there will be and will be [marking\
        \ the upload complete](https://anaplanbulkapi20.docs.apiary.io/#Mark-upload-complete) when all chunks have been uploaded.\
        \ If you want to upload the file in a single chunk, see [Upload file as a single chunk](https://anaplanbulkapi20.docs.apiary.io/#Uploading-single-file).\n\
        \nUse chunking:\n\n*   If you want to be able to resume the transfer after the connection is lost during an upload.\n\
        *   If you are extracting data from a database and want to push it to the server without holding all the results in\
        \ memory.\n    \n\nTo avoid consuming large amounts of memory on the server, a chunk is expected to be between 1 and\
        \ 50 MB. The chunk count might change if the file to upload has become larger or smaller than the server's version\
        \ of that file:\n\n*   `id` is the ID of the file for which the chunk count is to be updated.\n*   `name` is the filename\
        \ of the file.\n*   `chunkCount` is the number of chunks in the file.\n*   `delimiter` is double-quotes for columns\
        \ and fields. For example, \"Versions\",\"Opportunities\",\" \"Version 1\",\"Opportunity 0001\".\n*   `encoding` determines\
        \ the way in which bytes in a file map to Unicode character code points. See [Common Character Encodings](https://en.wikipedia.org/wiki/Character_encoding#Common_character_encodings)\
        \ on Wikipedia.\n*   `firstDataRow` is the first row after the row containing column names.\n*   `format` is text,\
        \ as opposed to a binary stream.\n*   `headerRow` is the row that contains column names.\n*   `separator` is the token\
        \ that separates fields. This is typically a comma, for example, \"Versions\",\"Opportunities\",\" \"Version 1\",\"\
        Opportunity 0001\".\n    \n\n### Post the chunk count\n\n#### Request\n\n```\ncurl -X POST \\\nhttps://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/files/{fileId}\
        \ \\\n-H 'Authorization: AnaplanAuthToken auth_token' \\\n-H 'Content-Type: application/json' \\\n-d '{\"chunkCount\"\
        :1}'\n```\n\n#### Headers\n\n*   `Authorization:AnaplanAuthToken {anaplan_auth_token}`\n*   `Content-Type:application/json`\n\
        \    \n\n#### Parameters\n\n| **Parameter** | **Description** |\n| --- | --- |\n| `workspaceId` | <br><br>*   Required<br>*\
        \   Type: string<br>*   Description: The workspace ID<br>*   Example: `8a8b8c8d8e8f8g8i`<br><br> |\n| `modelId` |\
        \ <br><br>*   Required<br>*   Type: string<br>*   Description: The model ID<br>*   Example: `FC12345678912343455667`<br><br>\
        \ |\n| `fileId` | <br><br>*   Required<br>*   Type: number<br>*   Description: The file ID<br>*   Example: `113000000008`<br><br>\
        \ |\n\n#"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                chunkCount:
                  type: integer
            example:
              chunkCount: -1
    put:
      summary: Upload file as a single chunk
      parameters: []
      responses:
        '200':
          description: 'TODO: document response'
