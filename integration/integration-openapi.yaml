        type: string
      example: ''
  /workspaces/{workspaceId}/models/{modelId}/views/{viewId}/readRequests/{requestId}:
    get:
      summary: Retrieve status of large read request
      description: |-
        ## Retrieve status of large read request

        Use this call to check the status of an export action after a bulk data long request is initiated. You can use it to check how many pages are available to download.

        **Note:** To use this call, you must be a [Workspace Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html).

        ### Request

        * * *

        ```
        curl -X GET /
        'https://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/views/{viewId}/readRequests/{requestId}' \
        -H 'Authorization: AnaplanAuthToken {anaplan_auth_token}' \
        -H 'Accept: application/json'

        ```

        ### Request headers

        * * *

        | **Header** | **Details** |
        | --- | --- |
        | `Authorization: AnaplanAuthToken {anaplan_auth_token}` | <br><br>*   Required<br>*   Description: the Anaplan authentication token<br><br> |
        | `Accept: application/json` | <br><br>*   Optional<br>*   Description: This indicates the preferred response is `application/json` format.<br><br> |

        ### Request parameters

        * * *

        | **Parameters** | **Details** |
        | --- | --- |
        | `{workspaceId}` | <br><br>*   Required<br>*   Type: `String`<br>*   Description: The workspace ID<br>*   Example: `8a8196b15b7dbae6015b8694411d13fe`<br><br> |
        | `{modelId}` | <br><br>*   Required<br>*   Type: `String`<br>*   Description: The model ID<br>*   Example: `75A40874E6B64FA3AE0743278996850F`<br><br> |
        | `{viewId}` | <br><br>*   Required<br>*   Type: `Number`<br>*   Description: The view ID.<br>*   Example: `101000000001`<br><br> |
        | `{requestId}` | <br><br>*   Required<br>*   Type: `String`<br>*   Description: The request ID<br>*   Example: `0A06B0739F0E47BB92E2326C603D86EC`<br><br> |

        ### Response scenarios

        * * *

        *   When `requestState` is `COMPLETE` and `successful` is `true` , the export has completed successfully and the user can download all the pages.
        *   When `requestState` is `IN_PROGRESS` and `successful` is `false`, the export has not yet completed. You can download the available pages indicated by the `availablePages` field.
        *   When `requestState` is `COMPLETE` and `successful` is `false`, this means the export failed. Retry and initiate a new export.
        *   When 'requestState' is 'NOT_STARTED' then simply check the status again.
        *   When requestState' is 'CANCELLED' then this request is completed by a 'DELETE' call.


        We recommend you delete the last failed export before initiating a new export, using the delete export endpoint.
      tags:
      - Transactional Read
      responses:
        '200':
          description: Response 200
          content:
            application/json:
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/objects/viewReadRequest
                status:
                  code: 200
                  message: Success
                viewReadRequest:
                  requestId: 0A06B0739F0E47BB92E2326C603D86EC
                  viewId: 101000000014
                  requestState: COMPLETE
                  url: https://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/views/{viewId}/readRequests/{requestId}
                  availablePages: 100
                  successful: true
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  viewReadRequest:
                    $ref: '#/components/schemas/ViewReadRequest'
    parameters:
    - name: workspaceId
      in: path
      description: Workspace identifier (32-character lowercase hex string).
      required: true
      schema:
        type: string
        pattern: ^[0-9a-f]{32}$
      example: 8a868cda7c8b28f5017c9a4b2d8341cd
    - name: modelId
      in: path
      description: Model identifier (32-character uppercase hex string).
      required: true
      schema:
        type: string
        pattern: ^[0-9A-F]{32}$
      example: 4261ECE4389B45E18915B5EB72F7510B
    - name: viewId
      in: path
