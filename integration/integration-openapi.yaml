openapi: 3.0.0
info:
  title: Official Anaplan Collection
  version: 1.0.0
  description: "**Welcome to the Anaplan Integration v2 Official Postman Collection**\n\n**Organization**\n\n> This collection\
    \ is organized into  \n> logical groupings of requests. There are several common sequences of requests to achieve an outcome\
    \ in Anaplan. The folders ending in \"Flow\" contain redundant requests organized sequentially.\n\n**Variables**\n\n>\
    \ Collection level variables. These are set at the  \n> collection level and are available within each request. These\
    \ include elements  \n> such as base URLs, model Id and workspace Id. Be sure to click \"Save\" when changing collection\
    \ level variables.\n\n> Request specific variables. For variables  \n> specific to a request, we have provided an array\
    \ in the pre-request script area  \n> for you to enter in request specific variables. These will be set prior to the \
    \ \n> request running.\n\n**Authentication**\n\n> There are three methods provided to  \n> authenticate into Anaplan.\
    \ Once authenticated a Tests script sets the value of  \n> the generated token to a variable named “anaplan_auth_token”.\
    \ You may choose to  \n> enter in username/password combination or conversely choose to generate CA  \n> certificate signed\
    \ string and public key combination."
servers:
- url: https://api.anaplan.com
  description: US1, US2, US5, US7, EU1, EU2, EU4, AP1
- url: https://us9.api.anaplan.com
  description: US9
- url: https://eu3.api.anaplan.com
  description: EU3
- url: https://eu5.api.anaplan.com
  description: EU5
- url: https://gb1.api.anaplan.com
  description: GB1
- url: https://ca1a.api.anaplan.com
  description: CA1
- url: https://sg1.api.anaplan.com
  description: SG1
- url: https://ae1.api.anaplan.com
  description: AE1
- url: https://in1.api.anaplan.com
  description: IN1
- url: https://id1.api.anaplan.com
  description: ID1
- url: https://me1.api.anaplan.com
  description: ME1
- url: https://au1a.api2.anaplan.com
  description: AU1
paths:
  /2/0/users/me:
    get:
      summary: Retrieve your user
      parameters: []
      responses:
        '200':
          description: Response 200
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    type: object
                  status:
                    type: object
                  user:
                    $ref: '#/components/schemas/User'
      tags:
      - User Data
      description: "## Retrieve your user\n\n`/users/me`  \n\nRetrieves your user based on your Anaplan authentication token.\n\
        \n### Request\n\n```\ncurl -X GET \\\nhttps://api.anaplan.com/2/0/users/me \\\n-H 'authorization: AnaplanAuthToken\
        \ {anaplan_auth_token}' \\\n-H \"Content-Type:application/json\"\n```\n\n### Request headers\n\n| **Header** | **Details**\
        \ |\n| --- | --- |\n| `Authorization: AnaplanAuthToken {anaplan_auth_token}` | <br><br>*   Required<br>*   Description:\
        \ the Anaplan authentication token<br><br> |\n| `Accept: application/json` | <br><br>*   Required<br>*   Description:\
        \ This indicates the preferred response is either `application/json` format. Note that this call only outputs in `application/json`\
        \ format.<br><br> |"
  /2/0/users/{userId}:
    get:
      summary: Retrieve user information
      parameters: []
      responses:
        '200':
          description: Response 200
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    type: object
                  status:
                    type: object
                  user:
                    $ref: '#/components/schemas/User'
      tags:
      - User Data
      description: "## Retrieve user information\n\n`/users/{userId}`  \nRetrieves information about the specified user.\n\
        \n### Request\n\n```\ncurl -X GET \\\nhttps://api.anaplan.com/2/0/users/{userId} \\\n-H 'authorization: AnaplanAuthToken\
        \ {anaplan_auth_token}' \\\n-H \"Content-Type:application/json\"\n```\n\n### Headers\n\n*   `Authorization:AnaplanAuthToken\
        \ {anaplan_auth_token}`\n*   `Content-Type:application/json`\n    \n\n### Parameters\n\n| **Parameter** | **Description**\
        \ |\n| --- | --- |\n| `userId` | <br><br>*   Required<br>*   Type: string<br>*   Description: The user ID<br>*   Example:\
        \ `8a8196a55b193fa0015b1e57f3da172c`<br><br> |"
    parameters:
    - name: userId
      in: path
      required: true
      schema:
        type: string
      example: '{{userId}}'
  /2/0/models:
    get:
      summary: List user models
      parameters:
      - name: modelDetails
        in: query
        schema:
          type: boolean
        example: true
        description: When true, includes available model memory usage in bytes in the response.
      responses:
        '200':
          description: Response 200
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    type: object
                  status:
                    type: object
                  models:
                    type: array
                    items:
                      $ref: '#/components/schemas/Model'
      tags:
      - General Workspace & Model Metadata
      description: "## Retrieve models\n\n`/models`  \nRetrieves information about all models in the user's default tenant.\n\
        \n### Request\n\n```\ncurl -X GET \\\nhttps://api.anaplan.com/2/0/models \\\n-H 'authorization: AnaplanAuthToken {anaplan_auth_token}'\n\
        ```\n\n### Request headers\n\n`Authorization:AnaplanAuthToken {anaplan_auth_token}`\n\n### Request parameters\n\n\
        | **Parameter** | **Description** |\n| --- | --- |\n| `{modelDetails}` | <br><br>*   Optional<br>*   Type: Boolean<br>*\
        \   Description: When set to `true`, this call returns the available model memory usage in bytes. When set to `false`,\
        \ or not defined, this call does not return the model memory usage.<br>*   Example: `?modelDetails=true`<br><br> |\n\
        \n### Response 200 (application/json)\n\n```\n{\n  \"meta\": {\n    \"schema\": \"https://api.anaplan.com/2/0/objects/model\"\
        ,\n    \"paging\": {\n      \"currentPageSize\": 1,\n      \"totalSize\": 1,\n      \"offset\": 0\n    }\n  },\n \
        \ \"status\": {\n    \"code\": 200,\n    \"message\": \"Success\"\n  },\n  \"models\": [{\n      id\": \"FC12345678912343455667\"\
        ,\n      \"activeState\": \"UNLOCKED\",\n      \"name\": \"FP&A\",\n      \"currentWorkspaceId\": \"8a8b8c8d8e8f8g8i\"\
        ,\n      \"currentWorkspaceName\": \"Financial Planning\",\n      \"modelUrl\": \"https://rt.anaplan.com/anaplan/rt?selectedWorkspaceId\\\
        8a8b8c8d8e8f8g8i\\u0026selectedModelId\\FC12345678912343455667\",\n      \"categoryValues\": []\n   }]\n}\n```"
  /2/0/workspaces:
    get:
      summary: List user workspaces
      parameters:
      - name: tenantDetails
        in: query
        schema:
          type: boolean
        example: true
      responses:
        '200':
          description: Response 200
          headers:
            Content-Type:
              schema:
                type: string
              example: application/json
          content:
            application/json:
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/objects/workspace
                  paging:
                    currentPageSize: 1
                    totalSize: 1
                    offset: 0
                status:
                  code: 200
                  message: Success
                workspaces:
                - id: 8a8b8c8d8e8f8g8i
                  name: Financial Planning
                  active: true
                  sizeAllowance: 1073741824
                  currentSize: 873741824
              schema:
                type: object
                properties:
                  meta:
                    type: object
                  status:
                    type: object
                  workspaces:
                    type: array
                    items:
                      $ref: '#/components/schemas/Workspace'
      tags:
      - General Workspace & Model Metadata
      description: "## List user workspaces\n\n`/workspaces`  \n\nRetrieves all workspaces a user has access to within the\
        \ user's default tenant\n\n### Request\n\n```\ncurl -X GET \\\nhttps://api.anaplan.com/2/0/workspaces?tenantDetails=true\
        \ \\\n-H 'authorization: AnaplanAuthToken {anaplan_auth_token}'\n```\n\n### Request headers\n\n| **Header** | **Details**\
        \ |\n| --- | --- |\n| `Authorization: AnaplanAuthToken {anaplan_auth_token}` | <br><br>*   Required<br>*   Description:\
        \ the Anaplan authentication token<br><br> |\n\n### Request parameters\n\n| **Parameter** | **Details** |\n| --- |\
        \ --- |\n| `tenantDetails` | <br><br>*   Optional<br>*   Type: Boolean<br>*   Description: When set to true, this\
        \ call returns an estimate of the current size of the workspace from all the models it contains. When set to false,\
        \ or not defined, this call does not return an estimated current size of the workspace.<br>*   Example: true<br><br>\
        \ |"
  /2/0/workspaces/{workspaceId}:
    get:
      summary: Get single workspace metadata
      parameters:
      - name: tenantDetails
        in: query
        schema:
          type: boolean
        example: true
      responses:
        '200':
          description: Response 200
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    type: object
                  status:
                    type: object
                  workspace:
                    $ref: '#/components/schemas/Workspace'
        '404':
          description: Workspace not found or caller lacks Workspace Administrator role
      tags:
      - General Workspace & Model Metadata
    parameters:
    - name: workspaceId
      in: path
      required: true
      schema:
        type: string
        pattern: ^[0-9a-f]{32}$
      example: 8a868cda7c8b28f5017c9a4b2d8341cd
      description: Workspace identifier (32-character lowercase hex string).
  /2/0/models/{modelId}:
    get:
      summary: Get single model metadata
      parameters:
      - name: modelDetails
        in: query
        schema:
          type: boolean
        example: true
      responses:
        '200':
          description: Response 200
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    type: object
                  status:
                    type: object
                  model:
                    $ref: '#/components/schemas/Model'
      tags:
      - General Workspace & Model Metadata
    parameters:
    - name: modelId
      in: path
      required: true
      schema:
        type: string
        pattern: ^[0-9A-F]{32}$
      example: 4261ECE4389B45E18915B5EB72F7510B
      description: Model identifier (32-character uppercase hex string).
  /2/0/workspaces/{workspaceId}/models:
    get:
      summary: List workspace models
      description: 'Returns models accessible to the calling user within the specified workspace. The response shape is identical
        to `GET /2/0/models` but filtered to models within the given workspace. Confirmed via live testing (issue #25).'
      parameters: []
      responses:
        '200':
          description: Response 200
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    type: object
                  status:
                    type: object
                  models:
                    type: array
                    items:
                      $ref: '#/components/schemas/Model'
      tags:
      - General Workspace & Model Metadata
    parameters:
    - name: workspaceId
      in: path
      required: true
      schema:
        type: string
        pattern: ^[0-9a-f]{32}$
      example: 8a868cd885f53bd201860f5a4fea1ff1
      description: Workspace identifier (32-character lowercase hex string).
  /2/0/workspaces/{workspaceId}/models/{modelId}/dimensions/{dimensionId}/items:
    post:
      summary: Lookup dimension items by name or code
      parameters: []
      responses:
        '200':
          description: Response 200
          content:
            application/json:
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/objects/dimension
                status:
                  code: 200
                  message: Success
                items:
                - name: South
                  id: '208000000001'
                  code: S
                - name: West
                  id: '208000000004'
                  code: W
              schema:
                type: object
                properties:
                  meta:
                    type: object
                  status:
                    type: object
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Dimension'
        '404':
          description: more detail in path description
        '400':
          description: more detail in path description
      tags:
      - Model Metadata
      - List Metadata
      description: "## Lookup dimension items by name or code\n\nRetrieve the items from a dimension that match one of a list\
        \ of names or a list or codes.\n\n** Notes: **\n\n*   To use this call, you must be a [Workspace Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html).\n\
        *   This call does not return results for names or codes for which an item does not exist.\n*   If the given workspace,\
        \ model, or dimension do not exist, this call returns a `404` code.\n*   If the dimension does not support codes and\
        \ codes are provided, this call returns a `400` code.\n*   In the future, use of this call may be rate limited.\n\
        \    \n\n### Requests that support this feature\n\n```\ncurl -X POST https://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/dimensions/{dimensionId}/items\
        \ \\\n-H ‘Authorization: AnaplanAuthToken {anaplan_auth_token}' \\\n-H 'Content-Type: application/json' \\\n-H 'Accept:\
        \ application/json' --data-raw ''\n\n```\n\n### Request headers\n\n| **Header** | **Details** |\n| --- | --- |\n|\
        \ `Authorization: AnaplanAuthToken {anaplan_auth_token}` | <br><br>*   Required<br>*   Description: the Anaplan authentication\
        \ token<br><br> |\n| `Content-Type: application/json` | <br><br>*   Required<br>*   Description: This indicates the\
        \ request format is `application/json`.<br><br> |\n| `Accept: application/json` | <br><br>*   Optional<br>*   Description:\
        \ This indicates the preferred response is either `application/json` format. Note that this call only outputs in `application/json`\
        \ format.<br><br> |\n\n### Request parameters\n\n| **Parameter** | **Details** |\n| --- | --- |\n| `{workspaceId}`\
        \ | <br><br>*   Required in the supported request<br>*   Type: String<br>*   Description: The workspace ID<br>*  \
        \ Example: `8a8196b15b7dbae6015b8694411d13fe`<br><br> |\n| `{modelId}` | <br><br>*   Required<br>*   Type: String<br>*\
        \   Description: the model ID<br>*   Example: `75A40874E6B64FA3AE074327899685`<br><br> |\n| `{dimensionId}` | <br><br>*\
        \   Required<br>*   Type: Number<br>*   Description: the dimension ID. This value must be the ID for any of these\
        \ dimension types:<br>    *   Lists<br>    *   Time periods<br>    *   Users<br>    *   Versions<br>*   Example: `101000000001`<br><br>\
        \ |\n\n### Request body\n\n| **JSON Element** | **Description** |\n| --- | --- |\n| `names` | The case-insensitive\
        \ strings that match the name of a returned item. |\n| `codes` | The case-insensitive strings that match the code\
        \ of a returned item. |\n\nExample:\n\n```\n{\n    \"names\": [\"South\", \"East\"],\n    \"codes\": [\"N\", \"W\"\
        ]\n}\n\n```\n\nNote that the `names`, `codes`, or both fields in the request body must contain a non-empty value.\
        \ If the request body does not include at least one of these fields, the response returns an error."
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                codes:
                  type: array
                  items:
                    type: string
                    format: utc-millisec
                names:
                  type: array
                  items:
                    type: string
            example:
              codes:
              - '2'
              names:
              - Test1
    parameters:
    - name: workspaceId
      in: path
      required: true
      schema:
        type: string
        pattern: ^[0-9a-f]{32}$
      example: 8a868cda7c8b28f5017c9a4b2d8341cd
      description: Workspace identifier (32-character lowercase hex string).
    - name: modelId
      in: path
      required: true
      schema:
        type: string
        pattern: ^[0-9A-F]{32}$
      example: 4261ECE4389B45E18915B5EB72F7510B
      description: Model identifier (32-character uppercase hex string).
    - name: dimensionId
      in: path
      required: true
      schema:
        type: string
      example: '{{dimensionId}}'
    get:
      summary: Retrieve all items in a dimension
      parameters: []
      responses:
        '200':
          description: Response 200
          headers:
            Content-Type:
              schema:
                type: string
              example: application/json
          content:
            application/json:
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/objects/dimension
                status:
                  code: 200
                  message: Success
                items:
                - code: N
                  id: '200000000001'
                  name: North
                - code: E
                  id: '200000000002'
                  name: East
                - code: S
                  id: '200000000003'
                  name: South
                - code: W
                  id: '200000000004'
                  name: West
                - id: '200000000000'
                  name: Total Company
              schema:
                type: object
                properties:
                  meta:
                    type: object
                  status:
                    type: object
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Dimension'
        '400':
          description: more detail in path description
        '429':
          description: more detail in path description
      tags:
      - Model Metadata
      - List Metadata
      description: "## Retrieve all items in a dimension\n\n`/models/{modelGuid}/dimensions/{dimensionId}/items`\n\nUse this\
        \ call to retrieve the IDs, codes, and names for items in a specified dimension. The dimension must be a list, a list\
        \ subset, a line item subset, or the Users dimension.\n\nCalls at model-level do not support the Time dimension. The\
        \ calls return a `400` response. To avoid this, use the view dimension instead.\n\n**Notes**:\n\n*   To use this call,\
        \ you must be a [Workspace Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html).\n\
        *   This call is on the model-level. It returns all dimension items as it does not have view-level hiding, filtering,\
        \ or [Selective Access](https://help.anaplan.com/anapedia/Content/Modeling/Users/Selective_Access.html). For the view-level\
        \ endpoint, see [Retrieve selected items in a dimension](https://anaplanbulkapi20.docs.apiary.io/#RetrieveSelectedItemsDimension).\n\
        *   If codes have not been set for an item, then the response excludes the `code` field.\n*   This call only supports\
        \ the retrieval of dimensions and items from a dimension that contains a maximum of 1,000,000 items.  \n    The call\
        \ returns a `400` response for any more than that number of items.\n*   Use of this call may be rate limited. If you\
        \ call too frequently, you may receive a `429` response.\n    \n\n### Request\n\n```\ncurl -X GET\n'https://api.anaplan.com/2/0/models/{modelGuid}/dimensions/{dimensionId}/items'\\\
        \n-H 'Authorization: AnaplanAuthToken {anaplan_auth_token}'\\\n-H 'Accept: application/json'\n```\n\n### Request headers\n\
        \n| **Header** | **Details** |\n| --- | --- |\n| `Authorization: AnaplanAuthToken {anaplan_auth_token}` | <br><br>*\
        \   Required<br>*   Description: the Anaplan authentication token<br><br> |\n| `Accept: application/json` | <br><br>*\
        \   Required<br>*   Description: This indicates the preferred response is `application/json` format.<br><br> |\n\n\
        ### Request parameters\n\n| **Parameter** | **Details** |\n| --- | --- |\n| `{modelId}` | <br><br>*   Required<br>*\
        \   Type: String<br>*   Description: the ID for the model<br>*   Example: `75A40874E6B64FA3AE074327899685`<br><br>\
        \ |\n| `{dimensionId}` | <br><br>*   Required<br>*   Type: Number<br>*   Description: the ID for the dimension<br>*\
        \   Example: `101000000028`<br><br> |"
  /2/0/models/{modelId}/views/{viewId}/dimensions/{dimensionId}/items:
    get:
      summary: Retrieve selected items in a dimension
      parameters: []
      responses:
        '200':
          description: Response 200
          content:
            application/json:
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/objects/dimension
                status:
                  code: 200
                  message: Success
                items:
                - id: '220000000001'
                  name: England
                - id: '220000000002'
                  name: Wales
              schema:
                type: object
                properties:
                  meta:
                    type: object
                  status:
                    type: object
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Dimension'
        '429':
          description: more detail in path description
      tags:
      - Model Metadata
      - List Metadata
      description: "## Retrieve selected items in a dimension\n\n`/models/{modelId}/views/{viewId}/dimensions/{dimensionId}/items`\n\
        \nUse this call to retrieve selected IDs, codes, and names for items in a specified dimension. This call returns data\
        \ as filtered by the page builder when they configure the view. This call respects hidden items, filtering selections,\
        \ and [Selective Access](https://help.anaplan.com/anapedia/Content/Modeling/Users/Selective_Access.html). If the view\
        \ contains hidden or filtered items, these do not display in the response.\n\n**Notes**:\n\n*   To use this call,\
        \ you must be a [Workspace Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html)\n\
        *   This call works with any dimension type\n*   The items in the response may not be ordered\n*   The response returns\
        \ Items within a [flat list](https://help.anaplan.com/anapedia/Content/Modeling/Dimensions/Lists.html) (no hierarchy)\n\
        *   This is a view-level call. For the model-level call, see [Retrieve all data for items in a dimension](https://anaplanbulkapi20.docs.apiary.io/#RetrieveItemsDimension)\n\
        *   This call only supports the retrieval of dimension items within a view that contains a maximum of 1,000,000 cells.\
        \ If the specified view contains more than 1,000,000 dimension items, then the call returns a `400 Bad Request` HTTP\
        \ status, instead of a subset of the dimension items. Use the [quick sum bar](https://help.anaplan.com/anapedia/Content/New_User_Experience/Use/Worksheets/Grid/Quick-sum-bar.htm)\
        \ in Anaplan to identify the number of dimension items in a view\n*   Use of this call may be rate limited. If you\
        \ call too frequently, you may receive a `429` response\n*   The `viewId` in this request can also be replaced by\
        \ any valid `lineItemId`. If the Line Item has a changed dimensionality (has a Subsidiary View), the response returns\
        \ the applicable dimension items for the given dimension. Otherwise, the response returns all default applicable dimension\
        \ items for the given dimension\n    \n\n### Request\n\n```\ncurl -X GET 'https://api.anaplan.com/2/0/models/{modelId}/views/{viewId}/dimensions/{dimensionId}/items'\
        \ \\\n-H 'Authorization: AnaplanAuthToken {anaplan_auth_token}' \\\n-H 'Accept: application/json'\n```\n\n### Request\
        \ headers\n\n| **Header** | **Details** |\n| --- | --- |\n| `Authorization: AnaplanAuthToken {anaplan_auth_token}`\
        \ | <br><br>*   Required<br>*   Description: the Anaplan authentication token<br><br> |\n| `Accept: application/json`\
        \ | <br><br>*   Required<br>*   Description: This indicates the preferred response is `application/json` format.<br><br>\
        \ |\n\n### Request parameters\n\n| **Parameter** | **Details** |\n| --- | --- |\n| `{modelId}` | <br><br>*   Required<br>*\
        \   Type: String<br>*   Description: the ID for the model<br>*   Example: `75A40874E6B64FA3AE074327899685`<br><br>\
        \ |\n| `{viewId}` | <br><br>*   Required<br>*   Type: Number<br>*   Description: the ID for the view<br>*   Example:\
        \ `102000000000`<br><br> |\n| `{dimensionId}` | <br><br>*   Required<br>*   Type: Number<br>*   Description: the ID\
        \ for the dimension<br>*   Example: `101000000028`<br><br> |\n\n### Response header\n\n`Content-Type: application/json`"
    parameters:
    - name: modelId
      in: path
      required: true
      schema:
        type: string
        pattern: ^[0-9A-F]{32}$
      example: 4261ECE4389B45E18915B5EB72F7510B
      description: Model identifier (32-character uppercase hex string).
    - name: viewId
      in: path
      required: true
      schema:
        type: string
      example: ''
    - name: dimensionId
      in: path
      required: true
      schema:
        type: string
      example: '{{dimensionId}}'
  /2/0/workspaces/{workspaceId}/models/{modelId}/lists:
    get:
      summary: Retrieve Lists
      parameters: []
      responses:
        '200':
          description: Response 200
          content:
            application/json:
              example:
                meta:
                  paging:
