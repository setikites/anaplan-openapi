  /models/{modelId}/processes/{processId}:
    get:
      summary: Retrieve metadata for a process
      description: |-
        ## Retrieve metadata for a process

        `/models/{modelId}/processes/{processId}`

        Use this call to retrieve the names and actions for a given Process in an Anaplan model.

        **Notes**:

        *   Actions which are imports or exports (`actionType` field is `IMPORT` or `EXPORT`) contain additional fields in the response (see below). Other actions just contain the `id`, `name`, and `actionType`.
        *   Actions are ordered in the sequence that they run when the Process itself is executed.
        *   In the future, use of this call may be rate limited.
        *   For an action with `actionType` of `IMPORT`, you can use the `importDataSourceId` value as the ID of a file for the `fileId` parameter when you [upload or download files](https://anaplanbulkapi20.docs.apiary.io/#reference/upload-files)
        *   For actions with `actionType` of `EXPORT` or `IMPORT`, you can find more information about them if you use the IDs as `exportId` or `importId` in the [export](https://anaplanbulkapi20.docs.apiary.io/#reference/export) and [import](https://anaplanbulkapi20.docs.apiary.io/#reference/import) metadata endpoints.
        *   The possible values for actionType (non-exhaustive list):
            *   IMPORT
            *   EXPORT
            *   DELETE_BY_SELECTION
            *   ORDER_HIERARCHY
            *   OPTIMIZER
        *   To include additional information regarding the import data source in an import action, add the `?showImportDataSource=true` query parameter to the request.


        ### Request

        ```
        curl -X GET 'https://api.anaplan.com/2/0/models/{modelId}/processes/{processId}' \
        -H 'Authorization: AnaplanAuthToken {anaplan_auth_token}'\
        -H 'Accept: application/json'
        ```

        ### Request headers

        | **Header** | **Details** |
        | --- | --- |
        | `Authorization: AnaplanAuthToken {anaplan_auth_token}` | <br><br>*   Required<br>*   Description: the Anaplan authentication token<br><br> |
        | `Accept: application/json` | <br><br>*   Optional<br>*   Description: This indicates the preferred response is either `application/json` format. Note that this call only outputs in `application/json` format.<br><br> |

        ### Request parameters

        | **Parameter** | **Details** |
        | --- | --- |
        | `{modelId}` | <br><br>*   Required<br>*   Type: String<br>*   Description: the ID for the model<br>*   Example: `75A40874E6B64FA3AE0743278996850F`<br><br> |
        | `{processId}` | <br><br>*   Required<br>*   Type: Number<br>*   Description: the ID for the process<br>*   Example: `118000000001`<br>*   Note that you can get the process ID from the list of process for a model API<br><br> |
        | `{showImportDataSource}` | <br><br>*   Optional<br>*   Type: Boolean<br>*   Description: defines whether the response should include additional information regarding the import data source. The field is interpreted as `false` if anything other than `true` is specified.<br>*   Example: `?showImportDataSource=true`<br><br> |
      tags:
      - Model Metadata
      - Action Metadata
      parameters:
      - name: showImportDataSource
        in: query
        description: When set to "true", includes additional information about the import data source. Any value other than
          "true" is interpreted as false.
        schema:
          type: string
        example: 'true'
      responses:
        '200':
          description: Response 200
          headers:
            Content-Type:
              schema:
                type: string
              example: application/json
          content:
            application/json:
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/objects/process
                status:
                  code: 200
                  message: Success
                processMetadata:
                  name: ProcessWithActions
                  actions:
                  - id: '112000000000'
                    name: Sales from import-sales.csv
                    actionType: IMPORT
                    importDataSourceId: '113000000000'
                    importType: MODULE_DATA
                    importDataSource:
                      importDataSourceId: '113000000000'
                      type: FILE
                  - id: '116000000000'
                    name: Sales - Revenue.xls
                    actionType: EXPORT
                    exportType: GRID_CURRENT_PAGE
                    exportFormat: application/vnd.ms-excel
                    layout: GRID_CURRENT_PAGE
                  - id: '117000000000'
                    name: Delete from Products
                    actionType: DELETE_BY_SELECTION
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  processMetadata:
                    $ref: '#/components/schemas/Process'
    parameters:
    - name: modelId
      in: path
      description: Model identifier (32-character uppercase hex string).
      required: true
      schema:
        type: string
        pattern: ^[0-9A-F]{32}$
      example: 4261ECE4389B45E18915B5EB72F7510B
    - name: processId
      in: path
      required: true
      schema:
        type: string
      example: '{{processId}}'
