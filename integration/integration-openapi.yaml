  /2/0/workspaces/{workspaceId}/models/{modelId}/imports/{importId}/tasks/{taskId}/dump:
    get:
      summary: Check dump file for failures
      parameters: []
      responses:
        '200':
          description: 'TODO: document response'
      tags:
      - Bulk Write
      description: "## Check dump file for failures\n\n`/workspaces/{workspaceId}/models/{modelId}/imports/{importId}/tasks/{taskId}/dump`\
        \  \n\nIf data could not be imported for an import task, a 'dump' file is created depending on the failure. This contains\
        \ details of the failures that occurred. Use this information to fix the problems and then try the import again.\n\
        \n**Note:** To prevent timeouts on large files, download the dump file in chunks. It is possible to download dump\
        \ files without chunking, but it is strongly recommended that chunking is used instead.\n\n1.  Query the number of\
        \ chunks in a dump file.  \n    \n2.  Download the chunks sequentially.  \n    \n3.  Concatenate the chunks on your\
        \ host.\n    \n\nDump files are:\n\n*   Removed 48 hours after the last access of the file or the next time an import\
        \ task successfully executes with no errors.\n*   Maintained on a user-by-user basis and overwritten when the user\
        \ performs the same import.\n    \n\nWhen an import task has errors, the API maintains a dump file for the task ID\
        \ with the error.  Any earlier task IDs are erased, though `failureDumpAvailable` can be True for those task IDs.\
        \  If a dump file is removed or replaced, then attempting to download the dump file via the API results in a 404 (Not\
        \ found) HTTP status.\n\nIf you use `/tasks?sort=-creationDate` in the URL, it is possible for tasks created by other\
        \ users to appear first for which the dump file is unavailable to the accessing user.  It is also possible that a\
        \ task that the accessing user ran, and for which a dump file is still available, to be further down on the same list.\n\
        \n**Note:** The `taskID` is the last task of the user who carried out the specified import."
    parameters:
    - name: workspaceId
      in: path
      required: true
      schema:
        type: string
        pattern: ^[0-9a-f]{32}$
      example: 8a868cda7c8b28f5017c9a4b2d8341cd
      description: Workspace identifier (32-character lowercase hex string).
    - name: modelId
