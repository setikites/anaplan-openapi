security:
- AnaplanAuthToken: []
- BearerAuth: []
paths:
  /users:
    get:
      summary: List users
      description: Retrieves all users within the tenant.
      tags:
      - User Data
      parameters:
      - name: s
        in: query
        description: Search string
        schema:
          type: string
      - name: sort
        in: query
        description: Sort results by object properties. Prefix with `+` for ascending or `-` for descending order.
        schema:
          type: string
        example: +firstName
      responses:
        '200':
          description: Response 200
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
  /users/me:
    get:
      summary: Retrieve your user
      description: |-
        ## Retrieve your user

        `/users/me`

        Retrieves your user based on your Anaplan authentication token.

        ### Request

        ```
        curl -X GET \
        https://api.anaplan.com/2/0/users/me \
        -H 'authorization: AnaplanAuthToken {anaplan_auth_token}' \
        -H "Content-Type:application/json"
        ```

        ### Request headers

        | **Header** | **Details** |
        | --- | --- |
        | `Authorization: AnaplanAuthToken {anaplan_auth_token}` | <br><br>*   Required<br>*   Description: the Anaplan authentication token<br><br> |
        | `Accept: application/json` | <br><br>*   Required<br>*   Description: This indicates the preferred response is either `application/json` format. Note that this call only outputs in `application/json` format.<br><br> |
      tags:
      - User Data
      parameters: []
      responses:
        '200':
          description: Response 200
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  user:
                    $ref: '#/components/schemas/User'
  /users/{userId}:
    get:
      summary: Retrieve user information
      description: |-
        ## Retrieve user information

        `/users/{userId}`
        Retrieves information about the specified user.

        ### Request

        ```
        curl -X GET \
        https://api.anaplan.com/2/0/users/{userId} \
        -H 'authorization: AnaplanAuthToken {anaplan_auth_token}' \
        -H "Content-Type:application/json"
        ```

        ### Headers

        *   `Authorization:AnaplanAuthToken {anaplan_auth_token}`
        *   `Content-Type:application/json`


        ### Parameters

        | **Parameter** | **Description** |
        | --- | --- |
        | `userId` | <br><br>*   Required<br>*   Type: string<br>*   Description: The user ID<br>*   Example: `8a8196a55b193fa0015b1e57f3da172c`<br><br> |
      tags:
      - User Data
      responses:
        '200':
          description: Response 200
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  user:
                    $ref: '#/components/schemas/User'
    parameters:
    - name: userId
      in: path
      required: true
      schema:
        type: string
      example: '{{userId}}'
  /models:
    get:
      summary: List user models
      description: |-
        ## Retrieve models

        `/models`
        Retrieves information about all models in the user's default tenant.

        ### Request

        ```
        curl -X GET \
        https://api.anaplan.com/2/0/models \
        -H 'authorization: AnaplanAuthToken {anaplan_auth_token}'
        ```

        ### Request headers

        `Authorization:AnaplanAuthToken {anaplan_auth_token}`

        ### Request parameters

        | **Parameter** | **Description** |
        | --- | --- |
        | `{modelDetails}` | <br><br>*   Optional<br>*   Type: Boolean<br>*   Description: When set to `true`, this call returns the available model memory usage in bytes. When set to `false`, or not defined, this call does not return the model memory usage.<br>*   Example: `?modelDetails=true`<br><br> |

        ### Response 200 (application/json)

        ```
        {
          "meta": {
            "schema": "https://api.anaplan.com/2/0/objects/model",
            "paging": {
              "currentPageSize": 1,
              "totalSize": 1,
              "offset": 0
            }
          },
          "status": {
            "code": 200,
            "message": "Success"
          },
          "models": [{
              id": "FC12345678912343455667",
              "activeState": "UNLOCKED",
              "name": "FP&A",
              "currentWorkspaceId": "8a8b8c8d8e8f8g8i",
              "currentWorkspaceName": "Financial Planning",
              "modelUrl": "https://rt.anaplan.com/anaplan/rt?selectedWorkspaceId\8a8b8c8d8e8f8g8i\u0026selectedModelId\FC12345678912343455667",
              "categoryValues": []
           }]
        }
        ```
      tags:
      - General Workspace & Model Metadata
      parameters:
      - name: modelDetails
        in: query
        description: When true, includes available model memory usage in bytes in the response.
        schema:
          type: boolean
        example: true
      - name: s
        in: query
        description: Search string
        schema:
          type: string
      - name: sort
        in: query
        description: Sort results by object properties. Prefix with `+` for ascending or `-` for descending order.
        schema:
          type: string
        example: +name
      responses:
        '200':
          description: Response 200
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  models:
                    type: array
                    items:
                      $ref: '#/components/schemas/Model'
  /workspaces:
    get:
      summary: List user workspaces
      description: |-
        ## List user workspaces

        `/workspaces`

        Retrieves all workspaces a user has access to within the user's default tenant

        ### Request

        ```
        curl -X GET \
        https://api.anaplan.com/2/0/workspaces?tenantDetails=true \
        -H 'authorization: AnaplanAuthToken {anaplan_auth_token}'
        ```

        ### Request headers

        | **Header** | **Details** |
        | --- | --- |
        | `Authorization: AnaplanAuthToken {anaplan_auth_token}` | <br><br>*   Required<br>*   Description: the Anaplan authentication token<br><br> |

        ### Request parameters

        | **Parameter** | **Details** |
        | --- | --- |
        | `tenantDetails` | <br><br>*   Optional<br>*   Type: Boolean<br>*   Description: When set to true, this call returns an estimate of the current size of the workspace from all the models it contains. When set to false, or not defined, this call does not return an estimated current size of the workspace.<br>*   Example: true<br><br> |
      tags:
      - General Workspace & Model Metadata
      parameters:
      - name: tenantDetails
        in: query
        schema:
          type: boolean
        example: true
      - name: s
        in: query
        description: Search string
        schema:
          type: string
      - name: sort
        in: query
        description: Sort results by object properties. Prefix with `+` for ascending or `-` for descending order.
        schema:
          type: string
        example: +name
      responses:
        '200':
          description: Response 200
          headers:
            Content-Type:
              schema:
                type: string
              example: application/json
          content:
            application/json:
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/objects/workspace
                  paging:
                    currentPageSize: 1
                    totalSize: 1
                    offset: 0
                status:
                  code: 200
                  message: Success
                workspaces:
                - id: 8a8b8c8d8e8f8g8i
                  name: Financial Planning
                  active: true
                  sizeAllowance: 1073741824
                  currentSize: 873741824
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  workspaces:
                    type: array
                    items:
                      $ref: '#/components/schemas/Workspace'
  /workspaces/{workspaceId}:
    get:
      summary: Get single workspace metadata
      tags:
      - General Workspace & Model Metadata
      parameters:
      - name: tenantDetails
        in: query
        schema:
          type: boolean
        example: true
      responses:
        '200':
          description: Response 200
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  workspace:
                    $ref: '#/components/schemas/Workspace'
        '404':
          description: Workspace not found or caller lacks Workspace Administrator role
    parameters:
    - name: workspaceId
      in: path
      description: Workspace identifier (32-character lowercase hex string).
      required: true
      schema:
        type: string
        pattern: ^[0-9a-f]{32}$
      example: 8a868cda7c8b28f5017c9a4b2d8341cd
  /models/{modelId}:
    get:
      summary: Get single model metadata
      tags:
      - General Workspace & Model Metadata
      parameters:
      - name: modelDetails
        in: query
        schema:
          type: boolean
        example: true
      responses:
        '200':
          description: Response 200
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  model:
                    $ref: '#/components/schemas/Model'
    parameters:
    - name: modelId
      in: path
      description: Model identifier (32-character uppercase hex string).
      required: true
      schema:
        type: string
        pattern: ^[0-9A-F]{32}$
      example: 4261ECE4389B45E18915B5EB72F7510B
  /workspaces/{workspaceId}/models:
    get:
      summary: List workspace models
      description: 'Returns models accessible to the calling user within the specified workspace. The response shape is identical
        to `GET /2/0/models` but filtered to models within the given workspace. Confirmed via live testing (issue #25).'
      tags:
      - General Workspace & Model Metadata
      responses:
        '200':
          description: Response 200
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  models:
                    type: array
                    items:
                      $ref: '#/components/schemas/Model'
    parameters:
    - name: workspaceId
      in: path
      description: Workspace identifier (32-character lowercase hex string).
      required: true
      schema:
        type: string
        pattern: ^[0-9a-f]{32}$
      example: 8a868cd885f53bd201860f5a4fea1ff1
  /workspaces/{workspaceId}/models/{modelId}/dimensions/{dimensionId}/items:
    post:
      summary: Lookup dimension items by name or code
      description: |-
        ## Lookup dimension items by name or code

        Retrieve the items from a dimension that match one of a list of names or a list or codes.

        ** Notes: **

        *   To use this call, you must be a [Workspace Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html).
        *   This call does not return results for names or codes for which an item does not exist.
        *   If the given workspace, model, or dimension do not exist, this call returns a `404` code.
        *   If the dimension does not support codes and codes are provided, this call returns a `400` code.
        *   In the future, use of this call may be rate limited.


        ### Requests that support this feature

        ```
        curl -X POST https://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/dimensions/{dimensionId}/items \
        -H ‘Authorization: AnaplanAuthToken {anaplan_auth_token}' \
        -H 'Content-Type: application/json' \
        -H 'Accept: application/json' --data-raw ''

        ```

        ### Request headers

        | **Header** | **Details** |
        | --- | --- |
        | `Authorization: AnaplanAuthToken {anaplan_auth_token}` | <br><br>*   Required<br>*   Description: the Anaplan authentication token<br><br> |
        | `Content-Type: application/json` | <br><br>*   Required<br>*   Description: This indicates the request format is `application/json`.<br><br> |
        | `Accept: application/json` | <br><br>*   Optional<br>*   Description: This indicates the preferred response is either `application/json` format. Note that this call only outputs in `application/json` format.<br><br> |

        ### Request parameters

        | **Parameter** | **Details** |
        | --- | --- |
        | `{workspaceId}` | <br><br>*   Required in the supported request<br>*   Type: String<br>*   Description: The workspace ID<br>*   Example: `8a8196b15b7dbae6015b8694411d13fe`<br><br> |
        | `{modelId}` | <br><br>*   Required<br>*   Type: String<br>*   Description: the model ID<br>*   Example: `75A40874E6B64FA3AE074327899685`<br><br> |
        | `{dimensionId}` | <br><br>*   Required<br>*   Type: Number<br>*   Description: the dimension ID. This value must be the ID for any of these dimension types:<br>    *   Lists<br>    *   Time periods<br>    *   Users<br>    *   Versions<br>*   Example: `101000000001`<br><br> |

        ### Request body

        | **JSON Element** | **Description** |
        | --- | --- |
        | `names` | The case-insensitive strings that match the name of a returned item. |
        | `codes` | The case-insensitive strings that match the code of a returned item. |

        Example:

        ```
        {
            "names": ["South", "East"],
            "codes": ["N", "W"]
        }

        ```

        Note that the `names`, `codes`, or both fields in the request body must contain a non-empty value. If the request body does not include at least one of these fields, the response returns an error.
      tags:
      - Model Metadata
      - List Metadata
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                codes:
                  type: array
                  items:
                    type: string
                    format: utc-millisec
                names:
                  type: array
                  items:
                    type: string
            example:
              codes:
              - '2'
              names:
              - Test1
      responses:
        '200':
          description: Response 200
          content:
            application/json:
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/objects/dimension
                status:
                  code: 200
                  message: Success
                items:
                - name: South
                  id: '208000000001'
                  code: S
                - name: West
                  id: '208000000004'
                  code: W
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Dimension'
        '404':
          description: more detail in path description
        '400':
          description: more detail in path description
    parameters:
    - name: workspaceId
      in: path
      description: Workspace identifier (32-character lowercase hex string).
      required: true
      schema:
        type: string
        pattern: ^[0-9a-f]{32}$
      example: 8a868cda7c8b28f5017c9a4b2d8341cd
    - name: modelId
      in: path
      description: Model identifier (32-character uppercase hex string).
      required: true
      schema:
        type: string
        pattern: ^[0-9A-F]{32}$
      example: 4261ECE4389B45E18915B5EB72F7510B
    - name: dimensionId
      in: path
      required: true
      schema:
        type: string
      example: '{{dimensionId}}'
    get:
      summary: Retrieve all items in a dimension
      description: |-
        ## Retrieve all items in a dimension

        `/models/{modelGuid}/dimensions/{dimensionId}/items`

        Use this call to retrieve the IDs, codes, and names for items in a specified dimension. The dimension must be a list, a list subset, a line item subset, or the Users dimension.

        Calls at model-level do not support the Time dimension. The calls return a `400` response. To avoid this, use the view dimension instead.

        **Notes**:

        *   To use this call, you must be a [Workspace Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html).
        *   This call is on the model-level. It returns all dimension items as it does not have view-level hiding, filtering, or [Selective Access](https://help.anaplan.com/anapedia/Content/Modeling/Users/Selective_Access.html). For the view-level endpoint, see [Retrieve selected items in a dimension](https://anaplanbulkapi20.docs.apiary.io/#RetrieveSelectedItemsDimension).
        *   If codes have not been set for an item, then the response excludes the `code` field.
        *   This call only supports the retrieval of dimensions and items from a dimension that contains a maximum of 1,000,000 items.
            The call returns a `400` response for any more than that number of items.
        *   Use of this call may be rate limited. If you call too frequently, you may receive a `429` response.


        ### Request

        ```
        curl -X GET
        'https://api.anaplan.com/2/0/models/{modelGuid}/dimensions/{dimensionId}/items'\
        -H 'Authorization: AnaplanAuthToken {anaplan_auth_token}'\
        -H 'Accept: application/json'
        ```

        ### Request headers

        | **Header** | **Details** |
        | --- | --- |
        | `Authorization: AnaplanAuthToken {anaplan_auth_token}` | <br><br>*   Required<br>*   Description: the Anaplan authentication token<br><br> |
        | `Accept: application/json` | <br><br>*   Required<br>*   Description: This indicates the preferred response is `application/json` format.<br><br> |

        ### Request parameters

        | **Parameter** | **Details** |
        | --- | --- |
        | `{modelId}` | <br><br>*   Required<br>*   Type: String<br>*   Description: the ID for the model<br>*   Example: `75A40874E6B64FA3AE074327899685`<br><br> |
        | `{dimensionId}` | <br><br>*   Required<br>*   Type: Number<br>*   Description: the ID for the dimension<br>*   Example: `101000000028`<br><br> |
      tags:
      - Model Metadata
      - List Metadata
      responses:
        '200':
          description: Response 200
          headers:
            Content-Type:
              schema:
                type: string
              example: application/json
          content:
            application/json:
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/objects/dimension
                status:
                  code: 200
                  message: Success
                items:
                - code: N
                  id: '200000000001'
                  name: North
                - code: E
                  id: '200000000002'
                  name: East
                - code: S
                  id: '200000000003'
                  name: South
                - code: W
                  id: '200000000004'
                  name: West
                - id: '200000000000'
                  name: Total Company
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Dimension'
        '400':
          description: more detail in path description
        '429':
          description: more detail in path description
  /models/{modelId}/views/{viewId}/dimensions/{dimensionId}/items:
    get:
      summary: Retrieve selected items in a dimension
      description: |-
        ## Retrieve selected items in a dimension

        `/models/{modelId}/views/{viewId}/dimensions/{dimensionId}/items`

        Use this call to retrieve selected IDs, codes, and names for items in a specified dimension. This call returns data as filtered by the page builder when they configure the view. This call respects hidden items, filtering selections, and [Selective Access](https://help.anaplan.com/anapedia/Content/Modeling/Users/Selective_Access.html). If the view contains hidden or filtered items, these do not display in the response.

        **Notes**:

        *   To use this call, you must be a [Workspace Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html)
        *   This call works with any dimension type
        *   The items in the response may not be ordered
        *   The response returns Items within a [flat list](https://help.anaplan.com/anapedia/Content/Modeling/Dimensions/Lists.html) (no hierarchy)
        *   This is a view-level call. For the model-level call, see [Retrieve all data for items in a dimension](https://anaplanbulkapi20.docs.apiary.io/#RetrieveItemsDimension)
        *   This call only supports the retrieval of dimension items within a view that contains a maximum of 1,000,000 cells. If the specified view contains more than 1,000,000 dimension items, then the call returns a `400 Bad Request` HTTP status, instead of a subset of the dimension items. Use the [quick sum bar](https://help.anaplan.com/anapedia/Content/New_User_Experience/Use/Worksheets/Grid/Quick-sum-bar.htm) in Anaplan to identify the number of dimension items in a view
        *   Use of this call may be rate limited. If you call too frequently, you may receive a `429` response
        *   The `viewId` in this request can also be replaced by any valid `lineItemId`. If the Line Item has a changed dimensionality (has a Subsidiary View), the response returns the applicable dimension items for the given dimension. Otherwise, the response returns all default applicable dimension items for the given dimension


        ### Request

        ```
        curl -X GET 'https://api.anaplan.com/2/0/models/{modelId}/views/{viewId}/dimensions/{dimensionId}/items' \
        -H 'Authorization: AnaplanAuthToken {anaplan_auth_token}' \
        -H 'Accept: application/json'
        ```

        ### Request headers

        | **Header** | **Details** |
        | --- | --- |
        | `Authorization: AnaplanAuthToken {anaplan_auth_token}` | <br><br>*   Required<br>*   Description: the Anaplan authentication token<br><br> |
        | `Accept: application/json` | <br><br>*   Required<br>*   Description: This indicates the preferred response is `application/json` format.<br><br> |

        ### Request parameters

        | **Parameter** | **Details** |
        | --- | --- |
        | `{modelId}` | <br><br>*   Required<br>*   Type: String<br>*   Description: the ID for the model<br>*   Example: `75A40874E6B64FA3AE074327899685`<br><br> |
        | `{viewId}` | <br><br>*   Required<br>*   Type: Number<br>*   Description: the ID for the view<br>*   Example: `102000000000`<br><br> |
        | `{dimensionId}` | <br><br>*   Required<br>*   Type: Number<br>*   Description: the ID for the dimension<br>*   Example: `101000000028`<br><br> |

        ### Response header

        `Content-Type: application/json`
      tags:
      - Model Metadata
      - List Metadata
      responses:
        '200':
          description: Response 200
          content:
            application/json:
              example:
                meta:
                  schema: https://api.anaplan.com/2/0/objects/dimension
                status:
                  code: 200
                  message: Success
                items:
                - id: '220000000001'
                  name: England
                - id: '220000000002'
                  name: Wales
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  status:
                    $ref: '#/components/schemas/Status'
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Dimension'
        '429':
          description: more detail in path description
    parameters:
    - name: modelId
      in: path
