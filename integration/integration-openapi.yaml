                metadata:
                  id: '101000000001'
                  name: Sales Reps
                  properties:
                  - name: Salesforce
                    format: TEXT
                    notes: ''
                    referencedBy: ''
                  - name: Mail
                    format: TEXT
                    notes: ''
                    referencedBy: ''
                  hasSelectiveAccess: false
                  parent:
                    id: '101000000000'
                    name: Organization
                  managedBy: ''
                  numberedList: false
                  useTopLevelAsPageDefault: false
                  itemCount: 1
                  workflowEnabled: false
                  productionData: false
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
