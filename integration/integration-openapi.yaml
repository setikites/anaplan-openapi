      description: "## Retrieve IDs and names for all views in a model\n\n`/models/{modelId}/views`\n\nUse this call to retrieve\
        \ the ID and name of all views for a model. The results include default and saved views. If you add the query parameter\
        \ `includesubsidiaryviews=true`, this includes unsaved subsidiary views in the results. This call also retrieves the\
        \ ID of the module that the views belong to.\n\n**Notes**:\n\n*   To use this call, you must be a [Workspace Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html)\n\
        *   Single quotes enclose the module and view names that have special characters\n*   Use of this call may be rate\
        \ limited. If you call too frequently, you may receive a `429` response\n    \n\n### Default views\n\nFor default\
        \ views:\n\n*   The value of the {viewId} is identical to the value of the {moduleId}\n*   The value of the name is\
        \ identical to the value of the module\n    \n\n### Saved views\n\nFor saved views:\n\n*   The `name` consists of\
        \ the module name, a period, and the saved view name. For example, `REP01 Profit & Loss Report.P & L by Country`\n\
        \    \n\nFor unsaved subsidiary views:\n\n*   The name consists of the module name and the line item name that the\
        \ subsidiary view is created from\n*   These are separated by a period(.)\n    \n\n### Request\n\n```\ncurl -X GET\n\
        'https://api.anaplan.com/2/0/models/{modelId}/views' \\\n-H 'Authorization: AnaplanAuthToken {anaplan_auth_token}'\
        \ \\\n-H 'Accept: application/json'\n```\n\n### Request headers\n\n| **Header** | **Details** |\n| --- | --- |\n|\
        \ `Authorization: AnaplanAuthToken {anaplan_auth_token}` | <br><br>*   Required<br>*   Description: the Anaplan authentication\
        \ token<br><br> |\n| `Accept: application/json` | <br><br>*   Required<br>*   Description: This indicates the preferred\
        \ response is `application/json` format.<br><br> |\n\n### Request parameters\n\n| **Parameter** | **Details** |\n\
        | --- | --- |\n| `{modelId}` | <br><br>*   Required<br>*   Type: String<br>*   Description: the ID for the model<br>*\
        \   Example: `75A40874E6B64FA3AE074327899685`<br><br> |\n\n### Query parameter\n\n| **Parameter** | **Details** |\n\
        | --- | --- |\n| `{includesubsidiaryviews}` | <br><br>*   Optional (default false)<br>*   Type: String<br>*   Description:\
        \ Whether the response should include unsaved subsidiary views. The field is interpreted as false if anything other\
        \ than `true` is specified<br>*   Example: `?includesubsidiaryviews=true`<br><br> |\n\n### Response header\n\n`Content-Type:\
        \ application/json`"
    parameters:
    - name: workspaceId
      in: path
      required: true
      schema:
        type: string
        pattern: ^[0-9a-f]{32}$
      example: 8a868cda7c8b28f5017c9a4b2d8341cd
      description: Workspace identifier (32-character lowercase hex string).
    - name: modelId
      in: path
      required: true
      schema:
        type: string
        pattern: ^[0-9A-F]{32}$
      example: 4261ECE4389B45E18915B5EB72F7510B
      description: Model identifier (32-character uppercase hex string).
