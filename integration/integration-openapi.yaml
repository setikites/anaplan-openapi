                status:
                  code: 200
                  message: Success
                modelCalendar:
                  fiscalYear:
                    year: FY21
                    startDate: '2021-01-01'
                    endDate: '2021-12-31'
              schema:
                type: object
                properties:
                  meta:
                    type: object
                  status:
                    type: object
                  modelCalendar:
                    $ref: '#/components/schemas/ModelCalendar'
      tags:
      - Model Metadata
      - Model Setting Metadata
      description: "## Get current fiscal year\n\n`/workspaces/{workspaceId}/models/{modelId}/modelCalendar`\n\nUse this call\
        \ to get the current fiscal year with the start and end date from the model calendar. The value of the start and end\
        \ date is determined by the calendar type set in the model. This value is not always a range from Jan 1 to Dec 31.\
        \ The API returns an empty value If the calendar type does not have an available fiscal year (for example, Weeks General).\n\
        \n### Request\n\n```\ncurl -X GET 'https://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/modelCalendar'\
        \ \\\n-H 'Authorization: AnaplanAuthToken {anaplan_auth_token}' \\\n-H 'Accept: application/json'\n```\n\n### Request\
        \ headers\n\n| **Header** | **Details** |\n| --- | --- |\n| `Authorization: AnaplanAuthToken {anaplan_auth_token}`\
        \ | <br><br>*   Required<br>*   Description: the Anaplan authentication token<br><br> |\n| `Accept: application/json`\
        \ | <br><br>*   Optional<br><br> |\n\n### Request parameters\n\n| **Parameter** | **Details** |\n| --- | --- |\n|\
        \ `{workspaceId}` | <br><br>*   Required<br>*   Type: String<br>*   Description: The workspace ID<br>*   Example:\
        \ `8a8196b15b7dbae6015b8694411d13fe`<br><br> |\n| `{modelId}` | <br><br>*   Required<br>*   Type: String<br>*   Description:\
        \ the model ID<br>*   Example: `75A40874E6B64FA3AE074327899685`<br><br> |\n\n### Example 1: Calendar Type: weeks 4-4-5,4-5-4\
        \ or 5-4-4\n\n#### Model Calendar\n\nIn Anaplan, the **Current Fiscal Year** in the **Model Calendar** is set to *FY21:\
        \ 29 Mar 2020 - 27 Mar 2021*.\n\n#### Response\n\n```\n{\n    \"meta\": {\n        \"schema\": \"https://api.anaplan.com/2/0/objects/modelCalendar\"\
        \n    },\n    \"status\": {\n        \"code\": 200,\n        \"message\": \"Success\"\n    },\n    \"modelCalendar\"\
        : {\n        \"fiscalYear\": {\n            \"year\": \"FY21\",\n            \"startDate\": \"2020-03-29\",\n    \
        \        \"endDate\": \"2021-03-27\"\n        }\n    }\n}\n\n```\n\n#### Example 2: Calendar Type: weeks general\n\
        \n#### Model Calendar\n\nIn Anaplan, the **Calendar Type** in the **Model Calendar** is set to *weeks general*.\n\n\
        #### Response\n\n```\n{\n    \"meta\": {\n        \"schema\": \"https://api.anaplan.com/2/0/objects/modelCalendar\"\
