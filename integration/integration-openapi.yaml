      description: "## Get the ID and information for the model file to upload\n\n`/workspaces/{workspaceId}/models/{modelId}/files`\
        \  \n\nTo upload a file, you need its ID in Anaplan:\n\n*   `id` is the ID that you need to upload the file.\n*  \
        \ `name` is the filename of the file.\n*   `chunkCount` is the number of chunks in the file.\n*   `delimiter` is double-quotes\
        \ for columns and fields. For example, \"Versions\",\"Opportunities\",\" \"Version 1\",\"Opportunity 0001\".\n*  \
        \ `encoding` determines the way in which bytes in a file map to Unicode character code points. See [Common Character\
        \ Encodings](https://en.wikipedia.org/wiki/Character_encoding#Common_character_encodings) on Wikipedia.\n*   `firstDataRow`\
        \ is the first row after the row containing column names.\n*   `format` is text, as opposed to a binary stream.\n\
        *   `headerRow` is the row that contains column names.\n*   `separator` is the token that separates fields. This is\
        \ typically a comma, for example, \"Versions\",\"Opportunities\",\" \"Version 1\",\"Opportunity 0001\".\n    \n\n\
        ### Request\n\n```\ncurl -X GET \\\nhttps://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/files \\\
        \n-H 'Authorization: AnaplanAuthToken {token_value}'\n-H 'Accept:application/json'\n\n\n\n```\n\n### Headers\n\n*\
        \   `Authorization:AnaplanAuthToken {anaplan_auth_token}`\n*   `Accept:application/json`\n    \n\n### Parameters\n\
        \n| **Parameter** | **Description** |\n| --- | --- |\n| `workspaceId` | <br><br>*   Required<br>*   Type: string<br>*\
        \   Description: The workspace ID<br>*   Example: `8a8b8c8d8e8f8g8i`<br><br> |\n| `modelId` | <br><br>*   Required<br>*\
        \   Type: string<br>*   Description: The model ID<br>*   Example: `FC12345678912343455667`<br><br> |"
    parameters:
    - name: modelId
      in: path
      required: true
      schema:
        type: string
        pattern: ^[0-9A-F]{32}$
      example: 4261ECE4389B45E18915B5EB72F7510B
      description: Model identifier (32-character uppercase hex string).
