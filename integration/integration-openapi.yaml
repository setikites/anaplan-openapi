                      - '0'
                      - totalUpdateCount
                      - '90'
                      - invalidCount
                      - '0'
                      - updatedCount
                      - '90'
                      - renamedCount
                      - '90'
                      - createdCount
                      - '0'
                    failureDumpAvailable: false
                    objectId: '112000000009'
                    successful: true
                  taskState: COMPLETE
                  creationTime: 1571258347545
              schema:
                type: object
