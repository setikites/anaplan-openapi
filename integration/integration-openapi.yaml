      description: "## Download pages\n\nUse this call to download the available pages, either when the read request is in\
        \ progress, or when the request is completed. This request returns a CSV format response of the export list items.\n\
        \nYou can download pages while the export is in progress. You can download up to `availablePages` number of pages\
        \ returned by the export status API.\n\nNote that page numbers start with zero. That means if 10 pages are available,\
        \ you can download from page=0 through page=9\n\n**Note:**\n\n*   To use this call, you must be a [**Workspace Administrator**](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html).\n\
        *   As a best practice, use the [**Delete read requests**](https://anaplanbulkapi20.docs.apiary.io/#DeleteReadRequestsVD)\
        \ call to clear all pages from completed exports as soon as you download all pages. Doing so will make space available\
        \ for future exports.\n    \n\n## Request supporting this feature\n\n```\ncurl --{location} \\\n-X GET 'http://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/views/{viewId}/readRequests/{requestId}/pages/{pageNo}'\
        \ \\\n-H 'Authorization: AnaplanAuthToken {anaplan_auth_token}' \\\n-H 'Accept-Encoding: gzip, deflate' \\\n-H 'Accept:\
        \ text/csv'\n```\n\n## Request headers\n\n| **Header** | **Details** |\n| --- | --- |\n| `Authorization: AnaplanAuthToken\
        \ {anaplan_auth_token}` | <br><br>*   Required<br>*   Description: the Anaplan authentication token.<br><br> |\n|\
        \ `Accept-Encoding: gzip` | <br><br>*   Optional<br>*   Description: You can use it to compress the response. This\
        \ usually improves performance, but then you may have to uncompress it before using it.<br><br> |\n| `Accept: text/csv`\
        \ | <br><br>*   Required<br>*   Description: This indicates the preferred response is `text/csv` format.<br><br> |\n\
        \n## Request parameters\n\n| **Parameters** | **Details** |\n| --- | --- |\n| `{workspaceId}` | <br><br>*   Required\
        \ in the first supported request (see Requests supporting this feature)<br>*   Type: String<br>*   Description: The\
