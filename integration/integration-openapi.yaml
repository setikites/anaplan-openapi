      description: "## Retrieve status of large read request\n\nUse this call to check the status of an export action after\
        \ a bulk data long request is initiated. You can use it to check how many pages are available to download.\n\n**Note:**\
        \ To use this call, you must be a [Workspace Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html).\n\
        \n### Request\n\n* * *\n\n```\ncurl -X GET /\n'https://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/views/{viewId}/readRequests/{requestId}'\
        \ \\\n-H 'Authorization: AnaplanAuthToken {anaplan_auth_token}' \\\n-H 'Accept: application/json'\n\n```\n\n### Request\
        \ headers\n\n* * *\n\n| **Header** | **Details** |\n| --- | --- |\n| `Authorization: AnaplanAuthToken {anaplan_auth_token}`\
        \ | <br><br>*   Required<br>*   Description: the Anaplan authentication token<br><br> |\n| `Accept: application/json`\
        \ | <br><br>*   Optional<br>*   Description: This indicates the preferred response is `application/json` format.<br><br>\
        \ |\n\n### Request parameters\n\n* * *\n\n| **Parameters** | **Details** |\n| --- | --- |\n| `{workspaceId}` | <br><br>*\
        \   Required<br>*   Type: `String`<br>*   Description: The workspace ID<br>*   Example: `8a8196b15b7dbae6015b8694411d13fe`<br><br>\
        \ |\n| `{modelId}` | <br><br>*   Required<br>*   Type: `String`<br>*   Description: The model ID<br>*   Example: `75A40874E6B64FA3AE0743278996850F`<br><br>\
        \ |\n| `{viewId}` | <br><br>*   Required<br>*   Type: `Number`<br>*   Description: The view ID.<br>*   Example: `101000000001`<br><br>\
        \ |\n| `{requestId}` | <br><br>*   Required<br>*   Type: `String`<br>*   Description: The request ID<br>*   Example:\
        \ `0A06B0739F0E47BB92E2326C603D86EC`<br><br> |\n\n### Response scenarios\n\n* * *\n\n*   When `requestState` is `COMPLETE`\
        \ and `successful` is `true` , the export has completed successfully and the user can download all the pages.\n* \
        \  When `requestState` is `IN_PROGRESS` and `successful` is `false`, the export has not yet completed. You can download\
        \ the available pages indicated by the `availablePages` field.\n*   When `requestState` is `COMPLETE` and `successful`\
        \ is `false`, this means the export failed. Retry and initiate a new export.\n*   When 'requestState' is 'NOT_STARTED'\
        \ then simply check the status again.\n*   When requestState' is 'CANCELLED' then this request is completed by a 'DELETE'\
        \ call.\n    \n\nWe recommend you delete the last failed export before initiating a new export, using the delete export\
        \ endpoint."
