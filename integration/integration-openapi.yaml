      description: "## Update list items\n\n`/workspaces/{workspaceId}/models/{modelId}/lists/{listId}/items`\n\nUse this\
        \ call to update items to a list. You must provide the model ID and list ID on the request URL. There are two kinds\
        \ of lists in Anaplan: standard list and numbered list. For a standard list, the API identifies the item using the\
        \ id, code, or name. For numbered list, the API uses the id or code. If property or subset is not specified in the\
        \ input, the existing value is not updated. You can update one or more items in each request.\n\nWhen you specify\
        \ the list item identifier, select one of the appropriate identifiers (id, code, or name). If the request contains\
        \ multiple identifiers, the API returns an error.\n\n**Notes:**\n\n*   To use this call, you must be a [Workspace\
        \ Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html).\n\
        *   A maximum of 100,000 list items can be updated with a single call.\n    \n\nNote: When an update to a list item\
        \ completes successfully, all downstream calculations are also complete. This includes cells linked by formulas to\
        \ the cells being updated.\n\n### Requests that support this feature\n\n```\ncurl -X PUT 'https://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/lists/{listId}/items'\
        \ \\\n-H 'Authorization: AnaplanAuthToken {anaplan_auth_token}' \\\n-H 'Content-Type: application/json' \\\n-H 'Accept:\
        \ application/json'\n```\n\n### Request headers\n\n| **Header** | **Details** |\n| --- | --- |\n| `Authorization:\
        \ AnaplanAuthToken {anaplan_auth_token}` | <br><br>*   Required<br>*   Description: the Anaplan authentication token<br><br>\
        \ |\n| `Content-Type: application/json` | <br><br>*   Required<br>*   Description: This indicates the request format\
        \ is `application/json`.<br><br> |\n| `Accept: application/json` | <br><br>*   Required<br>*   Description: This indicates\
        \ the preferred response is either `application/json` format. Note that this call only outputs in `application/json`\
        \ format.<br><br> |\n\n### Request parameters\n\n| **Parameter** | **Details** |\n| --- | --- |\n| `{workspaceId}`\
        \ | <br><br>*   Required<br>*   Type: String<br>*   Description: The workspace ID<br>*   Example: `8a8196b15b7dbae6015b8694411d13fe`<br><br>\
        \ |\n| `{modelId}` | <br><br>*   Required<br>*   Type: String<br>*   Description: the model ID<br>*   Example: `75A40874E6B64FA3AE074327899685`<br><br>\
        \ |\n| `{listId}` | <br><br>*   Required<br>*   Type: Number<br>*   Description: the list ID<br>*   Example: `101000000001`<br><br>\
        \ |\n\n### Request body\n\n| **List Data** | **Description** |\n| --- | --- |\n| `{name}` | The name value for the\
        \ item in the list. |\n| `{code}` | The code value for the item in the list. |\n| `{id}` | The Anaplan ID of the item\
        \ in the list. |\n| `{parent}` | The name of the parent item in the list |\n| `{properties}` | The value of each custom\
        \ list property. |\n| `{subsets}` | The value of each custom list subset. |\n\nExample:\n\n```\n{\n  \"items\": [\n\
        \    {\n      \"name\": \"n1\",\n      \"code\": \"c1\",\n      \"properties\": {\n        \"p-text\":\"hello world\"\
        ,\n        \"p-number\":\"1111\",\n        \"p-boolean\": \"true\",\n        \"p-list\": \"east\",\n        \"p-period\"\
        : \"Sep 21\"\n      },\n    \"subsets\": {\n      \"s11\": true\n    }\n  },\n    {\n      \"name\": \"n1\",\n   \
        \   \"code\": \"c2\",\n      \"properties\": {\n        \"p-text\":\"hello world\",\n        \"p-number\":\"wrong\
        \ format for number\",\n        \"p-boolean\": \"true\",\n        \"p-list\": \"east\",\n        \"p-period\": \"\
        Sep 21\"\n      },\n      \"subsets\": {\n        \"s11\": true\n      }\n    }\n  ]\n}\n\n```\n\n### Update logic\n\
        \nThe update list item endpoint logic varies by the update scenario.\n\n| **Scenario** | **Existing** | **Input in\
        \ API** | **Behavior** | **Result** |\n| --- | --- | --- | --- | --- |\n| Update list item | name=n1  <br>code=c1\
        \ | name=n1  <br>code=c1 | Success | name=n1  <br>code=c1 |\n| Update name | name=n1  <br>code=c1 | name=n2  <br>code=c1\
        \ | Success | name=n2  <br>code=c1 |\n| Update code | id=id1  <br>name=n1  <br>code=c1 | id=id1  <br>name=n1  <br>code=c2\
        \ | Success | id=id1  <br>name=n1  <br>code=c2 |\n| Update code without existing code | id=id1  <br>name=n1 | id=id1\
        \  <br>name=n1  <br>code=c2 | Success | id=id1  <br>name=n1  <br>code=c2 |\n| Update code  <br>(removing existing\
        \ code) | id=id1  <br>name=n1  <br>code=c1 | id=id1  <br>name=n1  <br>code=\"\" | This scenario does not provide a\
        \ new code to replace the existing value. An error returns. | error: `INCOMPLETE_DATA` |\n| Update code without an\
        \ existing code  <br>(assign a code without the id) | name=n1 | name=n1  <br>code=c1 | Success | name=n1  <br>code=c1\
        \ |\n| Update code with same name | name=n1  <br>code=c1 | name=n1  <br>code=c2 | The name is already used. An error\
        \ returns. | error: `INCOMPLETE_DATA` |\n| Update value with code only | name=n1  <br>code=c1  <br>properties{p1=1234}\
        \ | code=c1  <br>properties{p1=1234} | Success  <br>It's valid to use the code to identify the record. | code=c1 \
        \ <br>properties {p1=4321} |\n| Update value with name only.  <br>Do not specify the code | name=n1  <br>code=c1 \
        \ <br>properties{p1=1234} | name=n1  <br>properties{p1=1234} | The code is required to identify the record. An error\
        \ returns. | error: `INCOMPLETE_DATA` |\n| Update value with name only | name=n1  <br>properties{p1=1234} | name=n1\
        \  <br>properties{p1=4321} | Success  <br>When the code is not defined, the API can still update with the name. |\
        \ name=n1  <br>properties{p1=4321} |\n\n### Response 200 body\n\nThe response body contains a JSON object that contains\
        \ `total` (total number of items in request), `updated` (number of items updated), `ignored` (number of items ignored),\
        \ and `failures` fields. On `failures`, each field contains information about any errors encountered while performing\
        \ the update action. `requestIndex` is the index in the input items array.\n\n```\n{\n    \"meta\": {\n        \"\
        schema\": \"https://anaplan.api.com/2/0/objects/list\"\n    },\n    \"status\": {\n        \"code\": 200,\n      \
        \  \"message\": \"Success\"\n    },\n    \"total\": 2,\n    \"ignored\": 1,\n    \"updated\": 1,\n    \"failures\"\
        : {\n       {\n          \"failureType\": \"INCORRECT_FORMAT\",\n          \"failureMessageDetails\": \"incorrect\
        \ format -- column name:p-number, value:wrong format for number\",\n          \"requestIndex\": 1\n       }\n    }\n\
        }\n\n```"
    get:
      summary: Retrieve list data
      parameters:
      - name: includeAll
        in: query
        schema:
          type: boolean
        example: true
      responses:
        '429':
          description: more detail in path description
      tags:
      - Transactional Read
      description: "## Retrieve list data\n\n`/workspaces/{workspaceId}/models/{modelId}/lists/{listId}/items`\n\nUse this\
        \ call to retrieve list data for the items in a specified list.\n\nYou can filter on optional fields by setting the\
        \ `includeAll` query parameter.\n\n**Notes:**\n\n*   To use this call, you must be a [Workspace Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html).\n\
        *   Use of this call may be rate limited. If you call too frequently, you may receive a `429` response.\n    \n\n\
        The following list data always displays in the query response:\n\n| **Default List Data** | **Description** |\n| ---\
        \ | --- |\n| `id` | The Anaplan ID of the item in the list. |\n| `name` | The name of the item in the list. |\n| `code`\
        \ | The code value for an item in the list (if specified) |\n| `parent` | The name of the parent item in the list.\
        \ |\n| `parentId` | The Anaplan ID of the parent item in the list. |\n| `listId` | The Anaplan ID of the list to which\
        \ the parent item belongs. This ID displays if the list has a **Parent Hierarchy** set under the **Configure** tab\
        \ in Anaplan. |\n| `listName` | The name of list to which the parent item belongs. The name displays if the list has\
        \ a **Parent Hierarchy** set under the **Configure** tab in Anaplan. |\n\nSet the `includeAll` query parameter to\
        \ true to display the following optional list data fields in the response.\n\n| **Optional List Data** | **Description**\
        \ |\n| --- | --- |\n| `write` | If [Selective Access](https://help.anaplan.com/anapedia/Content/Modeling/Users/Selective_Access.html)\
        \ is enabled for the list, you can add individual users to provide `write` access. Users with `write` access can view\
        \ and edit data associated with the list items. |\n| `read` | If [Selective Access](https://help.anaplan.com/anapedia/Content/Modeling/Users/Selective_Access.html)\
        \ is enabled for the list, you can add individual users to provide `read` access. Users with `read` access can view\
        \ the data associated with the list items but not edit it. |\n| `subsets` | If the value of the subset column is true,\
        \ the associated item belongs to that subset.  You can view subsets under **Subsets** tab in Anaplan. |\n| `properties`\
        \ | The value of each custom list property. |\n\n### Request\n\n```\ncurl -X GET 'https://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/lists/{listId}/items?includeAll=true'\
        \ \\\n-H 'Accept: application/json' \\\n-H 'Authorization: AnaplanAuthToken {anaplan_auth_token}'\n\n```\n\nor\n\n\
        ```\ncurl -X GET 'https://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/lists/{listId}/items?includeAll=true'\
        \ \\\n-H 'Accept: text/csv' \\\n-H 'Authorization: AnaplanAuthToken {anaplan_auth_token}'\n\n```\n\n### Request headers\n\
        \n| **Header** | **Details** |\n| --- | --- |\n| `Authorization: AnaplanAuthToken {anaplan_auth_token}` | <br><br>*\
        \   Required<br>*   Description: the Anaplan authentication token<br><br> |\n| `Accept: application/json`  <br>or\
        \  <br>'Accept: text/csv' | <br><br>*   Optional<br>*   Description: This indicates the preferred response is either\
        \ `application/json` or `text/csv` format.<br><br> |\n\n### Request parameters\n\n| **Parameter** | **Details** |\n\
        | --- | --- |\n| `{workspaceId}` | <br><br>*   Required<br>*   Type: String<br>*   Description: The workspace ID<br>*\
        \   Example: `8a8196b15b7dbae6015b8694411d13fe`<br><br> |\n| `{modelId}` | <br><br>*   Required<br>*   Type: String<br>*\
        \   Description: the model ID<br>*   Example: `75A40874E6B64FA3AE074327899685`<br><br> |\n| `{listId}` | <br><br>*\
        \   Required<br>*   Type: string<br>*   Description: determines if optional query fields should display in the response.\
        \  <br>    When true, the endpoint returns all the data, including optional fields for the specified list ID.  <br>\
        \    When false, the endpoint does not include the optional data fields in the response for the specified list ID.<br>*\
        \   Example: `101000000001`<br><br> |\n\n### Query parameters\n\n| **Parameter** | **Details** |\n| --- | --- |\n\
        | `{includeAll}` | <br><br>*   Required<br>*   Type: Boolean<br>*   Description: The workspace ID<br>*   Example:\
        \ `true`<br><br> |\n\n### Example with application/json and includeAll=false\n\n```\n{\n    \"meta\": {\n        \"\
        schema\": \"https://api.anaplan.com/2/0/objects/list\"\n    },\n    \"status\": {\n        \"code\": 200,\n      \
        \  \"message\": \"Success\"\n    },\n    \"listItems\": [\n      {\n        \"id\": \"206000000001\",\n        \"\
        name\": \"cake\",\n        \"code\": \"c1\"\n      },\n      {\n        \"id\": \"206000000002\",\n        \"name\"\
        : \"bread\",\n        \"code\": \"b2\"\n      },\n      {\n        \"id\": \"206000000003\",\n        \"name\": \"\
        pastry\",\n        \"code\": \"p3\"\n      }\n    ]\n  }\n\n```\n\n#### Example with text/csv and includeAll=false\n\
        \n```\nid,name,code,parent,parentId,listId,listName\n206000000001,cake,c1,,,,\n206000000002,bread,b2,,,,\n206000000003,pastry,p3,,,,\n\
        \n```\n\n#### Example with application/json and includeAll=true\n\n```\n{\n    \"meta\": {\n        \"schema\": \"\
        https://api.anaplan.com/2/0/objects/list\"\n    },\n    \"status\": {\n        \"code\": 200,\n        \"message\"\
        : \"Success\"\n    },\n    \"listItems\": [\n      {\n        \"id\": \"206000000001\",\n        \"name\": \"cake\"\
        ,\n        \"code\": \"c1\",\n        \"subsets\": {\n          \"favourite\": true\n        },\n        \"properties\"\
        : {\n          \"count\": \"1.0\"\n        }\n      },\n      {\n        \"id\": \"206000000002\",\n        \"name\"\
        : \"bread\",\n        \"code\": \"b2\",\n        \"subsets\": {\n          \"favourite\": false\n        },\n    \
        \    \"properties\": {\n          \"count\": \"4.0\"\n        }\n      },\n      {\n        \"id\": \"206000000003\"\
        ,\n        \"name\": \"pastry\",\n        \"code\": \"p3\",\n        \"subsets\": {\n          \"favourite\": true\n\
        \        },\n        \"properties\": {\n          \"count\": \"5.0\"\n        }\n      }\n    ]\n  }\n\n```\n\n####\
        \ Example with text/csv and includeAll=true\n\n```\nid,name,code,parent,parentId,listId,listName,favourite,count\n\
        206000000001,cake,c1,,,,true,1.0206000000002,bread,b2,,,,false,4.0206000000003,pastry,p3,,,,true,5.0\n```"
