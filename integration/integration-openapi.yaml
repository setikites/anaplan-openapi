      description: "## Update current fiscal year\n\n`/workspaces/{workspaceId}/models/{modelId}/modelCalendar/fiscalYear`\n\
        \nUse this call to update the current fiscal year for the model calendar. The year input value has to be a valid fiscal\
        \ year supported by the model calendar in Anaplan. If successful, this call returns the updated fiscal year with start\
        \ and end date associated with current model calendar type. This call returns a `400 bad request` message if the input\
        \ value is out of range or model calendar type does not have an available fiscal year (for example, Weeks General).\n\
        \n### Request\n\n```\ncurl -X PUT 'https://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/modelCalendar/fiscalYear'\
        \ \\\n-H 'Authorization: AnaplanAuthToken {anaplan_auth_token}' \\\n-H 'Accept: application/json' \\\n-H 'Content-Type:\
        \ application/json' \\\n--data-raw '{\n    \"year\": \"{fiscal year}\"\n}'\n```\n\n### Request headers\n\n| **Header**\
        \ | **Details** |\n| --- | --- |\n| `Authorization: AnaplanAuthToken {anaplan_auth_token}` | <br><br>*   Required<br>*\
        \   Description: the Anaplan authentication token<br><br> |\n| `Accept: application/json` | <br><br>*   Optional<br><br>\
        \ |\n| `Content-Type: application/json` | <br><br>*   Required<br><br> |\n\n### Request parameters\n\n| **Parameter**\
        \ | **Details** |\n| --- | --- |\n| `{workspaceId}` | <br><br>*   Required<br>*   Type: String<br>*   Description:\
        \ The workspace ID<br>*   Example: `8a8196b15b7dbae6015b8694411d13fe`<br><br> |\n| `{modelId}` | <br><br>*   Required<br>*\
        \   Type: String<br>*   Description: the model ID<br>*   Example: `75A40874E6B64FA3AE074327899685`<br><br> |\n\n###\
        \ Example: Out of range error\n\nInput value for `year`\n\n```\n{\n    \"year\": \"FY40\"\n}\n\n```\n\nResponse\n\n\
        ```\n{\n    \"status\": {\n        \"code\": 400,\n        \"message\": \"Specified year is out of range: 2040\"\n\
        \    }\n}\n\n```"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                year:
                  type: string
                  format: utc-millisec
            example:
              year: '2020'
