        ```
        curl -X GET \
        https://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/exports/{exportId}/tasks/{taskId} \
        -H 'authorization: AnaplanAuthToken {anaplan_auth_token}' \
        -H "Content-Type:application/json"
