          description: Rate limited — too many requests. Retry after a delay.
  /workspaces/{workspaceId}/models/{modelId}/views/{viewId}:
    parameters:
    - $ref: '#/components/parameters/WorkspaceId'
    - $ref: '#/components/parameters/ModelId'
