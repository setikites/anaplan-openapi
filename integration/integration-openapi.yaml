  /2/0/models/{modelId}/views/{viewId}/data:
    get:
      summary: Retrieve cell data for a view
      parameters:
      - name: format
        in: query
        schema:
          type: string
        example: v1
      - name: pages
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: array
          items:
            type: string
        description: Page selector values, each in the form dimensionId:itemId. Selects which item to display for each page-axis
          dimension. Both repeated-key form (pages=a:b&pages=c:d) and comma-separated form (pages=a:b,c:d) are accepted. Dimension
          items can be retrieved from GET /workspaces/{workspaceId}/models/{modelId}/dimensions/{dimensionId}/items.
        example: 101000000026:330000000028
      responses:
        '429':
          description: more detail in path description
      tags:
      - Transactional Read
      description: "## Retrieve cell data for a view\n\nUse this call to retrieve the cell data for a view. You can either\
        \ query for the default page, or provide page selectors to query for other pages. This call returns data in either\
        \ a CSV grid response or as JSON.\n\n**Notes:**\n\n*   To use this call, you must be a [Workspace Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html).\n\
        *   This call only supports the retrieval of cells from a view that contains a maximum of 1,000,000 cells. If the\
        \ specified view contains more than 1,000,000 cells, then the call returns a `400 Bad Request` HTTP status, instead\
        \ of a subset of the cells. Use the [quick sum bar](https://help.anaplan.com/anapedia/Content/New_User_Experience/Use/Worksheets/Grid/Quick-sum-bar.htm)\
        \ in Anaplan to identify the number of cells in a view.\n*   If you call several times in a short amount of time,\
        \ you may receive a `429` response.\n*   You can replace the `viewId` with any valid `lineItemId`. If the line item\
        \ has a subsidiary view, the response returns the data as seen in that subsidiary view.\n*   For line items without\
        \ a subsidiary view, the response returns data for the default view of the line item.\n    \n\n## CSV responses\n\n\
        The first line of the CSV response contains the values of the page selectors. The response omits this line when there\
        \ are no dimensions on pages.\n\nWhen there are multiple dimensions on columns, a line for each dimension follows\
        \ the first line that contains the values of the page selectors.\n\nWhen there are multiple dimensions on rows, a\
        \ column displays on the left, before the data, for each dimension on rows.\n\n## JSON responses\n\nTo receive a JSON-formatted\
        \ response instead of a CSV-formatted response:\n\n1.  Pass an `Accept` header of `application/json`.\n2.  Pass a\
        \ query parameter of `format` set to `v1`.\n    \n\nAll other parameters are the same as a CSV-formatted response.\n\
        \nThe response returns `Content-Type` `application/json` with this format:\n\n*   A `pages` key with a value that\
        \ is a list of the selected items for each page selector. If no page selectors exist for this view, the list displays\
        \ as empty or absent.\n*   A `columnCoordinates` key with a value that is a list of the coordinates for all values\
        \ in that column. Each list item is itself a list containing one or more values. The length of each list equals the\
        \ number of dimensions on columns.\n*   A `rows` key with a value that is a list of row objects. Each row object contains:\n\
        \    *   A `rowCoordinates` key with a value that is a list of the coordinates for all values in the current row.\
        \ Each list item is itself a list that contains one or more values. The length of each list equals the number of dimensions\
        \ on rows.\n    *   A `cells` key with a value, which is a list of all the cell values in the current row.\n\nTo get\
        \ the full coordinates for each cell, use the position of the cell value in the `cells` list, and find the column\
        \ coordinates at the same position in the `columnCoordinates` list. Then, to uniquely specify the cell, combine the\
        \ column coordinates with the `rowCoordinates` for the current row and any selected pages.\n\n## Request\n\n`curl\
        \ -X GET`  \n`'https://api.anaplan.com/2/0/models/{modelId}/views/{viewId}/data?pages={dimensionId:itemId}&format=v1'\
        \ \\`  \n`-H 'Authorization: AnaplanAuthToken {anaplan_auth_token}' \\`  \n`-H 'Accept: application/json'`\n\nor\n\
        \n```\ncurl -X GET\n'https://api.anaplan.com/2/0/models/{modelId}/views/{viewId}/data?pages={dimensionId:itemId}&format=v1'\
        \ \\\n-H 'Authorization: AnaplanAuthToken {anaplan_auth_token}' \\\n-H 'Accept: text/CSV'\n```\n\n## Request headers\n\
        \n| **Header** | **Details** |\n| --- | --- |\n| `Authorization: AnaplanAuthToken {anaplan_auth_token}` | * Required\
        \  <br>  <br>* Description: the Anaplan authentication token |\n| `Accept: application/json`  <br>  <br>or  <br> \
        \ <br>`Accept: text/csv`  <br>  <br>or  <br>  <br>`Accept: text/csv;escaped=true` | * Required  <br>  <br>* This call\
        \ can provide content type of `text/csv` or `application/json`.  <br>  <br>* In some cases, we do not allow standard\
        \ csv exports for security reasons - in those cases, calls to `text/csv` will result in an error message. Users can\
        \ request a csv with sensitive fields encapsulated in quotes by appending the ‘escaped’ parameter to the Accept csv\
        \ header - `text/csv;escaped=true` |\n\n## Request parameters\n\n| **Parameter** | **Details** |\n| --- | --- |\n\
        | `{modelId}` | <br><br>*   Required<br>*   Type: String<br>*   Description: the model ID<br>*   Example: `75A40874E6B64FA3AE0743278996850F`<br><br>\
        \ |\n| `{viewId}` | <br><br>*   Required<br>*   Type: Number<br>*   Description: the view ID<br>*   Example: `102000000000`<br><br>\
        \ |\n| `pages` | <br><br>*   Optional<br>*   Type: multi-valued, comma-separated<br>*   Description: the page selector\
        \ values that identify the page to retrieve<br>*   Example: `pages=101000000026:330000000028,20000000012:587000000000`\
        \ or `pages=101000000026:330000000028&pages=20000000012:587000000000`<br><br> |\n| `{dimensionId}` | <br><br>*   Optional<br>*\
        \   Type: Number<br>*   Description: the dimension ID<br>*   Example: `20000000003`<br><br> |\n| `{itemId}` | <br><br>*\
        \   Optional<br>*   Type: Number<br>*   Description: the item ID<br>*   Example: `5438900031`<br><br> |\n| `format`\
        \ | <br><br>*   Valid only when you query for JSON<br>*   Can currently only be set to `v1`<br><br> |\n\n## Responses\n\
        \n### CSV\n\n#### Response header\n\n`Content-Type: text/csv`\n\n#### Response body\n\n```\n| Yesterday   |      \
        \      |         |        |        |         |         |         |         |         |         |\n|             |\
        \            | Apples  | Apples | Apples | Bananas | Bananas | Bananas | Carrots | Carrots | Carrots |\n|        \
        \     |            | ENG | FRE | GER | ENG | FRE | GER | ENG | FRE | GER |\n| Line item 1 | Baguette   | 1       |\
        \ 2      | 3      | 5       | 6       | 7       | 9       | 10      | 11      |\n| Line item 1 | Large loaf | 12 \
        \     | 13     | 14     | 15      | 16      | 17      | 18      | 19      | 20      |\n| Line item 1 | Small loaf\
        \ | 0       | 0      | 0      | 0       | 0       | 0       | 0       | 0       | 0       |\n| Line item 2 | Baguette\
        \   | 0       | 0      | 0      | 0       | 0       | 0       | 0       | 0       | 0       |\n| Line item 2 | Large\
        \ loaf | 0       | 0      | 0      | 0       | 0       | 0       | 0       | 0       | 0       |\n| Line item 2 |\
        \ Small loaf | 0       | 0      | 0      | 0       | 0       | 0       | 0       | 0       | 0       |\n\n```\n\n\
        ### JSON\n\n#### Response header\n\n`Content-Type: application/json`\n\n#### Response body\n\n```\n{\n        \"pages\"\
        : [ \"Value\", \"23mm\" ],\n        \"columnCoordinates\": [ [\"Jan 13\"], [\"Feb 13\"], [\"Mar 13\"], [\"Q1 FY13\"\
        ], [\"Apr 13\"], [\"May 13\"], [\"Jun 13\"], [\"Q2 FY13\"], [\"H1 FY13\"], [\"Jul 13\"], [\"Aug 13\"], [\"Sep 13\"\
        ], [\"Q3 FY13\"], [\"Oct 13\"], [\"Nov 13\"], [\"Dec 13\"], [\"Q4 FY13\"], [\"H2 FY13\"], [\"FY13\"] ],\n        \"\
        rows\": [\n          {\n            \"rowCoordinates\": [ \"Durham\" ],\n            \"cells\": [\n              \"\
        64.6\", \"57.94\", \"108.36\", \"230.97\", \"173.46\", \"321.17\", \"398.7\", \"893.43\", \"1124.3\", \"433.05\",\
        \ \"435.52\", \"421.46\", \"1290.03\", \"300.11\", \"150.53\", \"70.23\", \"520.87\", \"1810.9\", \"2935.3\"\n   \
        \         ]\n          },\n          {\n            \"rowCoordinates\": [ \"Newcastle upon Tyne\" ],\n           \
        \ \"cells\": [\n              \"96.33\", \"92.69\", \"136.24\", \"325.27\", \"234.81\", \"468.96\", \"489.6\", \"\
        1193.38\", \"1518.65\", \"535.86\", \"531.8\", \"542.6\", \"1610.25\", \"346.22\", \"171.65\", \"84.72\", \"602.6\"\
        , \"2212.85\", \"3731.5\"\n            ]\n          },\n          {\n            \"rowCoordinates\": [ \"Sunderland\"\
        \ ],\n            \"cells\": [\n              \"57.06\", \"63.73\", \"56.33\", \"177.13\", \"124.52\", \"236.29\"\
        , \"286.86\", \"647.67\", \"824.8\", \"301.15\", \"302.13\", \"299.61\", \"902.9\", \"145.01\", \"115.58\", \"65.05\"\
        , \"325.65\", \"1228.55\", \"2053.35\"\n            ]\n          }\n        ]\n      }\n```"
