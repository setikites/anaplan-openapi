      description: "## Retrieve metadata for dimensions on a view\n\n`/models/{modelId}/views/{viewId}`\n\nUse this call to\
        \ retrieve the name, IDs, and lists of names for the dimensions (columns, pages, rows) on a specified view.\n\n**Notes**:\n\
        \n*   To use this call, you must be a [Workspace Administrator](https://help.anaplan.com/anapedia/Content/Administration_and_Security/Workspace_Administration.html)\n\
        *   If a view has no dimensions on an axis, the call omits the axis field (for example, no `“rows”` field at all instead\
        \ of `“rows”: []`)\n*   If a view is the default view, its `name` is set to be the same as the module name\n*   Use\
        \ of this call may be rate limited. If you call too frequently, you may receive a `429` response\n*   The `viewId`\
        \ in this request can also be replaced by any valid `lineItemId`. If the Line Item has a changed dimensionality (has\
        \ a Subsidiary View), the response returns the metadata applicable to that line item. Otherwise, the response returns\
        \ the default metadata\n    \n\nYou can use this API call to [map dimensions to cell data export headers](https://help.anaplan.com/43cd0223-edaa-4289-9833-eb9b73666aac-Map-dimensions-to-cell-data-export-headers)\
        \ or [transform grid CSV format to tabular single column format](https://help.anaplan.com/c8a665b9-6b23-4254-ac68-816657a6e878-Retrieve-the-view-metadata-and-grid-view-data).\n\
        \n### Request\n\n```\ncurl -X GET 'https://api.anaplan.com/2/0/models/{modelId}/views/{viewId}' \\\n-H 'Authorization:\
        \ AnaplanAuthToken {anaplan_auth_token}'\\\n-H 'Accept: application/json'\n```\n\n### Request headers\n\n| **Header**\
        \ | **Details** |\n| --- | --- |\n| `Authorization: AnaplanAuthToken {anaplan_auth_token}` | <br><br>*   Required<br>*\
        \   Description: the Anaplan authentication token<br><br> |\n| `Accept: application/json` | <br><br>*   Required<br>*\
        \   Description: This indicates the preferred response is `application/json` format.<br><br> |\n\n### Request parameters\n\
        \n| **Parameter** | **Details** |\n| --- | --- |\n| `{modelId}` | <br><br>*   Required<br>*   Type: String<br>*  \
        \ Description: the ID for the model<br>*   Example: `75A40874E6B64FA3AE074327899685`<br><br> |\n| `{viewId}` | <br><br>*\
        \   Required<br>*   Type: Number<br>*   Description: the ID for the view<br>*   Example: `102000000000`<br><br> |\n\
        \n### Response 200 Body\n\n```\n{\n  \"meta\": {\n    \"schema\": \"https://api.anaplan.com/2/0/objects/view\"\n \
        \ },\n  \"status\": {\n    \"code\": 200,\n    \"message\": \"Success\"\n  },\n  \"viewName\": \"REV01 Price Book\"\
        ,\n  \"viewId\" : \"102000000000\"\n  \"rows\": [\n    {\n      \"id\": \"101000000000\",\n      \"name\": \"Products\"\
