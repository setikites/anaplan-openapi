      description: "## Monitor the import tasks\n\n`/workspaces/{workspaceId}/models/{modelId}/imports/{importId}/tasks/{taskId}`\n\
        \n### Get the status of an import task\n\nIn the response:\n\n*   `currentStep` is the task associated with the specified\
        \ `taskID`.\n*   `taskState` is the status that import task.\n*   `progress` is a double that is typically 1.0.\n\
        *   `result` is a JSON object that indicates whether a failure dump file was created, the object ID, and whether the\
        \ task succeeded.\n*   `taskID` is the ID that you specified in the request.\n    \n\nHere is a list of each possible\
        \ `taskState`:\n\n| **Status** | **Description** |\n| --- | --- |\n| `NOT_STARTED` | The task is scheduled to run,\
        \ but has not started yet. |\n| `IN_PROGRESS` | The task is currently running. |\n| `COMPLETE` | The task has finished\
        \ running whether successful or not. |\n| `CANCELLING` | The task is currently being canceled. Cancellation is not\
        \ yet complete. |\n| `CANCELLED` | The task has been canceled and the changes have been rolled back. |\n\nIf failures\
        \ occur during the import task:\n\n*   `details` contains a JSON array that contains debug information\n*   If a dump\
        \ file is available, `failureDumpAvailable` is true and `objectId` contains the ID of the dump file. The dump file\
