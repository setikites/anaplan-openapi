      description: "## Upload file as a single chunk\n\n`/workspaces/{workspaceId}/models/{modelId}/files/{fileId} --upload-file\
        \ Tests.txt`  \n\nYou can upload a single file to the server.\n\n**Note:** You cannot compress a file that you are\
        \ uploading as a single file. If the file is smaller than 1 MB, we recommend you PUT it onto the server by streaming\
        \ it as an octet stream.\n\n### Upload a single chunk\n\n#### Request\n\n```\ncurl -X PUT \\\nhttps://api.anaplan.com/2/0/workspaces/{workspaceId}/models/{modelId}/files/{fileId}\
        \ \\\n-H 'authorization: AnaplanAuthToken {auth_token}' \\\n-H \"Content-Type:application/octet-stream\" --upload-file\
        \ Tests.txt\n\n```\n\n#### Headers\n\n*   `Authorization:AnaplanAuthToken {anaplan_auth_token}`\n*   `Content-Type:application/octet-stream`\n\
        \    \n\n#### Parameters\n\n| **Parameter** | **Description** |\n| --- | --- |\n| `workspaceId` | <br><br>*   Required<br>*\
        \   Type: string<br>*   Description: The workspace ID<br>*   Example: `8a8b8c8d8e8f8g8i`<br><br> |\n| `modelId` |\
        \ <br><br>*   Required<br>*   Type: string<br>*   Description: The model ID<br>*   Example: `FC12345678912343455667`<br><br>\
        \ |\n| `fileId` | <br><br>*   Required<br>*   Type: number<br>*   Description: The file ID<br>*   Example: `113000000008`<br><br>\
        \ |\n\n#"
