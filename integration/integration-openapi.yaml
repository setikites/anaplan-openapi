        | --- | --- |
        | `workspaceId` | <br><br>*   Required<br>*   Type: string<br>*   Description: The workspace ID<br>*   Example: `8a8b8c8d8e8f8g8i`<br><br> |
        | `modelId` | <br><br>*   Required<br>*   Type: string<br>*   Description: The model ID<br>*   Example: `FC12345678912343455667`<br><br> |
        | `fileId` | <br><br>*   Required<br>*   Type: number<br>*   Description: The file ID<br>*   Example: `113000000008`<br><br> |

