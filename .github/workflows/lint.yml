name: Lint

on:
  push:
    branches: [master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"

      - name: Validate OpenAPI specs (schema)
        run: uv run python scripts/validate.py

      - name: Check for unused components
        run: uv run python scripts/check_unused_components.py

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short -m "not live"
